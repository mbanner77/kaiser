<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KAISER — Retro-Wirtschaftssimulation</title>
<style>
  :root{
    --c64-border:#7869C4;
    --c64-bg:#40318D;
    --c64-txt:#7869C4;
    --c64-bright:#B8AEEA;
    --c64-white:#FFFFFF;
    --c64-yellow:#DFDF8B;
    --c64-green:#67B26F;
    --c64-red:#B86962;
    --c64-cyan:#84C5CC;
    --c64-orange:#C09B62;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--c64-border);
    font-family:"Courier New",Courier,monospace;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  #frame{
    background:var(--c64-bg);
    width:min(900px,100%);
    min-height:640px;
    padding:28px 30px;
    box-shadow:0 0 0 4px #2a1f63 inset;
    position:relative;
    overflow:hidden;
  }
  /* CRT-Scanlines */
  #frame::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.12) 0 1px,transparent 1px 3px);
  }
  #screen{color:var(--c64-txt);text-transform:uppercase;letter-spacing:1px;font-size:15px;line-height:1.55;position:relative;z-index:1;}
  h1,h2{color:var(--c64-white);font-weight:bold;letter-spacing:3px;margin-bottom:10px;}
  h1{font-size:22px;} h2{font-size:17px;border-bottom:2px solid var(--c64-txt);padding-bottom:4px;margin-bottom:12px;}
  .logo{color:var(--c64-yellow);white-space:pre;font-size:11px;line-height:1.15;text-align:center;margin:10px 0 18px;text-transform:none;}
  .dim{color:var(--c64-txt);} .hi{color:var(--c64-white);} .gold{color:var(--c64-yellow);}
  .grn{color:var(--c64-green);} .red{color:var(--c64-red);} .cyn{color:var(--c64-cyan);} .org{color:var(--c64-orange);}
  .center{text-align:center;}
  .row{display:flex;gap:18px;flex-wrap:wrap;}
  .col{flex:1;min-width:260px;}
  table{width:100%;border-collapse:collapse;margin:8px 0;}
  td,th{padding:2px 6px;text-align:left;font-size:14px;}
  td.r,th.r{text-align:right;}
  tr.line td{border-top:1px solid #5a4bab;}
  button{
    font-family:inherit;text-transform:uppercase;letter-spacing:1px;
    background:var(--c64-bg);color:var(--c64-yellow);
    border:2px solid var(--c64-txt);
    padding:7px 14px;font-size:14px;cursor:pointer;margin:4px 6px 4px 0;
  }
  button:hover:not(:disabled){background:var(--c64-txt);color:var(--c64-bg);}
  button:disabled{opacity:.35;cursor:default;}
  button.big{font-size:16px;padding:10px 22px;}
  button.warn{color:var(--c64-red);border-color:var(--c64-red);}
  button.warn:hover:not(:disabled){background:var(--c64-red);color:#fff;}
  input[type=text],input[type=number],select{
    font-family:inherit;font-size:15px;text-transform:uppercase;letter-spacing:1px;
    background:#2a1f63;color:var(--c64-white);border:2px solid var(--c64-txt);
    padding:5px 8px;width:130px;
  }
  input[type=text]{width:200px;}
  input[type=range]{width:180px;accent-color:var(--c64-yellow);vertical-align:middle;}
  .box{border:2px solid var(--c64-txt);padding:12px 14px;margin:10px 0;}
  .kbd{color:var(--c64-yellow);}
  .blink{animation:bl 1s steps(2) infinite;}
  @keyframes bl{50%{opacity:0;}}
  #map{display:flex;flex-wrap:wrap;gap:3px;margin:8px 0;}
  .tile{width:22px;height:22px;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:bold;border:1px solid #2a1f63;}
  .t-frei{background:#2f7d43;color:#2f7d43;}
  .t-acker{background:#8a7a2e;color:#8a7a2e;}
  .t-markt{background:#C09B62;color:#40318D;}
  .t-muehle{background:#84C5CC;color:#40318D;}
  .t-palast{background:#ffffff;color:#40318D;}
  .t-dom{background:#DFDF8B;color:#40318D;}
  .legend span{display:inline-block;margin-right:14px;font-size:13px;}
  .report td{font-size:14px;}
  .small{font-size:12px;letter-spacing:0;}
  #timer{position:absolute;top:8px;right:14px;font-size:12px;color:var(--c64-cyan);z-index:2;letter-spacing:0;}
</style>
</head>
<body>
<div id="frame">
  <div id="timer"></div>
  <div id="screen"></div>
</div>
<script>
"use strict";
/* ============================================================
   KAISER — Hommage an den C64-Klassiker von 1984
   Eigenständige Neu-Implementierung (Hotseat, 1-4 Spieler)
   ============================================================ */

const TITEL = [
  ["BÜRGER","BÜRGERIN"],
  ["BARON","BARONIN"],
  ["LANDGRAF","LANDGRÄFIN"],
  ["MARKGRAF","MARKGRÄFIN"],
  ["FÜRST","FÜRSTIN"],
  ["HERZOG","HERZOGIN"],
  ["KURFÜRST","KURFÜRSTIN"],
  ["KÖNIG","KÖNIGIN"],
  ["KAISER","KAISERIN"]
];

const KOSTEN = { markt:1000, muehle:2000, palastTeil:5000, domTeil:9000 };
const LAND   = { markt:1000, muehle:1000, palast:13000, dom:25000 };
const PALAST_TEILE = 16, DOM_TEILE = 14;
const JUSTIZ = ["","SEHR FAIR","FAIR","STRENG","GIERIG"];

const G = {
  spieler: [], aktiv: 0, jahr: 1700,
  tempo: 1,            // 1 = normal, 1.8 = kurzspiel-wachstum
  screen: "title",
  sieger: null
};

/* ---------- Hilfsfunktionen ---------- */
const $  = s => document.querySelector(s);
const fmt = n => Math.round(n).toLocaleString("de-DE");
const ri  = (a,b) => a + Math.floor(Math.random()*(b-a+1));
const rf  = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const cur = () => G.spieler[G.aktiv];
const titelName = p => TITEL[p.titel][p.w?1:0];
const anrede = p => (p.w?"IHRE":"SEINE") + " " + (p.titel>=7?"MAJESTÄT":p.titel>=4?"HOHEIT":"EXZELLENZ");

function neuerSpieler(name,w){
  return {
    name, w,
    geld:15000, land:10000, korn:400, pop:2500,
    maerkte:0, muehlen:0, palast:0, dom:0,
    zoll:10, einkSt:20, mwSt:15, justiz:2,
    titel:0, stimmung:60,
    kornPreis:ri(70,120), landPreis:ri(16,70),
    todesJahr: (G.tempo>1 ? ri(1739,1746) : ri(1760,1768)) + Math.random(),
    tot:false, todGemeldet:false,
    ausgabe:0, kriegGefuehrt:false,
    turnStart:0, report:null
  };
}

/* "Pro 1.000 ha Land kann ein Gebäude gebaut werden" — Besitz-Voraussetzung, kein Verbrauch.
   Palast erfordert ein Gut von 13.000 ha, die Kathedrale 25.000 ha. */
const bauplaetze = p => Math.floor(p.land/1000);
const minLand = p => Math.max((p.maerkte+p.muehlen)*1000, p.palast>0?LAND.palast:0, p.dom>0?LAND.dom:0);
const freiLand  = p => Math.max(0, p.land - minLand(p));   /* verkäufliches Land */
const staedte   = p => Math.min(Math.floor(p.maerkte/5), Math.floor(p.muehlen/3));
const noetigKorn = p => Math.ceil(p.pop/10);
const miliz     = p => p.maerkte*50;

/* Beförderungs-Bedingungen: Index = Ziel-Titel */
const BEDINGUNGEN = [
  null,
  { txt:"3.000 EINWOHNER",                          ok:p=>p.pop>=3000 },
  { txt:"4.000 EINWOHNER, 2 MÄRKTE",                ok:p=>p.pop>=4000 && p.maerkte>=2 },
  { txt:"5.000 EINWOHNER, 4 MÄRKTE, 1 MÜHLE",       ok:p=>p.pop>=5000 && p.maerkte>=4 && p.muehlen>=1 },
  { txt:"6.500 EINWOHNER, 1 STADT (5 MÄRKTE+3 MÜHLEN)", ok:p=>p.pop>=6500 && staedte(p)>=1 },
  { txt:"8.000 EINWOHNER, 2 STÄDTE",                ok:p=>p.pop>=8000 && staedte(p)>=2 },
  { txt:"10.000 EINWOHNER, 2 STÄDTE, 50.000 TALER", ok:p=>p.pop>=10000 && staedte(p)>=2 && p.geld>=50000 },
  { txt:"PALAST VOLLENDET (16 TEILE), 12.000 EINWOHNER", ok:p=>p.palast>=PALAST_TEILE && p.pop>=12000 },
  { txt:"KATHEDRALE VOLLENDET (14 TEILE), 25.000 HA LAND, 100.000 TALER",
    ok:p=>p.dom>=DOM_TEILE && p.land>=25000 && p.geld>=100000 }
];

function score(p){
  return p.titel*1e6 + p.geld + p.land*10 + p.pop*20 + (p.maerkte+p.muehlen)*2000
       + p.palast*5000 + p.dom*9000;
}

/* ---------- Jahresabschluss ---------- */
function jahresabschluss(p){
  const r = { ereignisse:[] };
  const noetig = noetigKorn(p);
  const f = noetig>0 ? p.ausgabe/noetig : 1;

  /* Ernte: das Volk bestellt das Land (max. 4 ha pro kopf) */
  const bearbeitet = Math.min(p.pop*4, p.land);
  let ertrag = rf(0.035,0.055) * (1 + Math.min(p.muehlen*0.05,0.6));

  /* Ereignisse */
  const ev = Math.random();
  if(ev < 0.07){
    const verlust = Math.round(p.korn * rf(0.2,0.4));
    p.korn -= verlust;
    r.ereignisse.push({t:`RATTEN IM KORNSPEICHER! ${fmt(verlust)} FUDER VERNICHTET.`,c:"red"});
  } else if(ev < 0.13){
    ertrag *= 0.5;
    r.ereignisse.push({t:"DÜRRE UND MISSERNTE! DIE ERNTE FÄLLT MAGER AUS.",c:"red"});
  } else if(ev < 0.19){
    ertrag *= 1.4;
    r.ereignisse.push({t:"PRÄCHTIGES WETTER — EINE REKORDERNTE!",c:"grn"});
  } else if(ev < 0.24 && p.pop > 1200){
    const opfer = Math.round(p.pop * rf(0.12,0.28));
    p.pop -= opfer;
    r.ereignisse.push({t:`DIE PEST WÜTET IM LAND! ${fmt(opfer)} UNTERTANEN STERBEN.`,c:"red"});
  } else if(ev < 0.28 && (p.maerkte>0 || p.muehlen>0)){
    if(p.maerkte>0 && (p.muehlen===0 || Math.random()<0.5)){ p.maerkte--; r.ereignisse.push({t:"FEUERSBRUNST! EIN MARKT BRENNT NIEDER.",c:"red"}); }
    else { p.muehlen--; r.ereignisse.push({t:"FEUERSBRUNST! EINE MÜHLE BRENNT NIEDER.",c:"red"}); }
  } else if(ev < 0.33){
    const zuzug = Math.round(p.pop * rf(0.02,0.05));
    p.pop += zuzug;
    r.ereignisse.push({t:`EIN TRECK VON SIEDLERN TRIFFT EIN: +${fmt(zuzug)} EINWOHNER.`,c:"grn"});
  }

  r.ernte = Math.round(bearbeitet * ertrag);
  p.korn += r.ernte;

  /* Steuern — märkte kurbeln die wirtschaft an */
  r.steuern = Math.round(p.pop*(p.einkSt*0.08 + p.mwSt*0.05)/10)*10
            + p.zoll*p.maerkte*6 + p.maerkte*150 + staedte(p)*2000;
  p.geld += r.steuern;

  /* Stimmung */
  p.stimmung = Math.round(clamp(
    90 - (p.einkSt+p.mwSt)*0.8 - p.zoll*0.4 - (p.justiz-2)*10 + (f-1)*40, 5, 100));

  /* Bevölkerung */
  const g = G.tempo;
  r.geburten   = Math.round(p.pop * 0.04 * (0.5 + p.stimmung/100) * g);
  r.tote       = Math.round(p.pop * 0.018);
  r.verhungert = f < 1 ? Math.round(p.pop * (1-f) * 0.5) : 0;
  r.migration  = Math.round(p.pop * 0.05 * (p.stimmung-50)/100 * g);
  p.pop = Math.max(50, p.pop + r.geburten - r.tote - r.verhungert + r.migration);

  /* Zeitfaktor: mehr als 90 sek pro zug kostet lebenszeit */
  const dauer = (Date.now() - p.turnStart)/1000;
  r.ueberzeit = Math.max(0, dauer - 90);
  if(r.ueberzeit > 0) p.todesJahr -= r.ueberzeit/180;

  r.f = f;
  p.report = r;
}

function pruefeBefoerderung(p){
  if(p.titel >= 8) return false;
  const b = BEDINGUNGEN[p.titel+1];
  if(p.geld > 0 && b.ok(p)){ p.titel++; return true; }
  return false;
}

/* ---------- Krieg ---------- */
function fuehreKrieg(p, ziel, inf, kav, art){
  const kosten = inf*100 + kav*250 + art*500;
  p.geld -= kosten;
  const angriff = (inf + kav*2.5 + art*4 + miliz(p)*0.8) * rf(0.7,1.3);
  const verteidigung = (miliz(ziel)*0.8 + ziel.pop*0.025) * 1.25 * rf(0.7,1.3);
  const sieg = angriff > verteidigung;
  let txt;
  if(sieg){
    const beute = Math.min(Math.round(ziel.land*0.15), Math.max(0,freiLand(ziel)));
    ziel.land -= beute; p.land += beute;
    const gefallene = Math.round(ziel.pop*0.03);
    ziel.pop -= gefallene;
    ziel.stimmung = clamp(ziel.stimmung-10,5,100);
    p.stimmung = clamp(p.stimmung-5,5,100);
    txt = `SIEG! EURE TRUPPEN EROBERN ${fmt(beute)} HA VON ${ziel.name}. ${fmt(gefallene)} FEINDE FALLEN.`;
  } else {
    const tribut = Math.round(Math.max(0,p.geld)*0.2);
    p.geld -= tribut; ziel.geld += tribut;
    p.stimmung = clamp(p.stimmung-15,5,100);
    txt = `NIEDERLAGE! EUER HEER WIRD GESCHLAGEN. IHR ZAHLT ${fmt(tribut)} TALER TRIBUT AN ${ziel.name}.`;
  }
  p.kriegGefuehrt = true;
  return {sieg, txt, kosten};
}

/* ---------- Ablaufsteuerung ---------- */
function starteSpiel(anzahl, namen, geschlechter, tempo){
  G.tempo = tempo; G.spieler = [];
  for(let i=0;i<anzahl;i++)
    G.spieler.push(neuerSpieler(namen[i]||("SPIELER "+(i+1)), geschlechter[i]));
  G.jahr = 1700; G.aktiv = 0; G.sieger = null;
  zeige("handoff");
}

function beginneZug(){
  const p = cur();
  let kp = p.kornPreis + (110 - p.kornPreis)*0.2 + rf(-45,45);
  if(Math.random() < 0.06) kp *= rf(1.6,2.6);      /* seltene preisspitzen bis 430 */
  p.kornPreis = clamp(Math.round(kp), 20, 430);
  p.landPreis = ri(16,70);
  p.kriegGefuehrt = false;
  p.ausgabe = 0;
  p.turnStart = Date.now();
  zeige("status");
}

function naechsterSpieler(){
  do {
    G.aktiv++;
    if(G.aktiv >= G.spieler.length){ G.aktiv = 0; G.jahr++; }
    const p = cur();
    if(G.jahr >= p.todesJahr && !p.tot){ p.tot = true; zeige("tod"); return; }
  } while(cur().tot && !alleTot());
  if(alleTot()){ zeige("ende"); return; }
  zeige("handoff");
}
const alleTot = () => G.spieler.every(p=>p.tot);

/* ---------- Anzeige ---------- */
let timerIv = null;
function zeige(s){ G.screen = s; render(); }

function render(){
  const el = $("#screen");
  clearInterval(timerIv); $("#timer").textContent = "";
  const R = SCREENS[G.screen];
  el.innerHTML = R ? R() : "FEHLER: UNBEKANNTER BILDSCHIRM";
  if(["status","korn","handel","steuern","bauen","krieg"].includes(G.screen)){
    timerIv = setInterval(()=>{
      const p = cur(); if(!p||!p.turnStart) return;
      const t = Math.floor((Date.now()-p.turnStart)/1000);
      $("#timer").textContent = "ZUGZEIT " + t + "S" + (t>90 ? " — EUER LEBEN VERRINNT!" : " / 90S");
      $("#timer").style.color = t>90 ? "var(--c64-red)" : "var(--c64-cyan)";
    }, 1000);
  }
}

const LOGO =
`██   ██  █████  ██ ███████ ███████ ██████
██  ██  ██   ██ ██ ██      ██      ██   ██
█████   ███████ ██ ███████ █████   ██████
██  ██  ██   ██ ██      ██ ██      ██   ██
██   ██ ██   ██ ██ ███████ ███████ ██   ██`;

const SCREENS = {

  /* ---- Titel ---- */
  title(){ return `
    <div class="center" style="padding-top:40px">
      <div class="logo">${LOGO}</div>
      <p class="hi">EIN WIRTSCHAFTSSPIEL AUS DEM 18. JAHRHUNDERT</p>
      <p class="dim small" style="margin-top:6px">HOMMAGE AN DEN C64-KLASSIKER VON 1984 · NEU-IMPLEMENTIERUNG · 1-4 SPIELER (HOTSEAT)</p>
      <div class="box" style="max-width:560px;margin:26px auto;text-align:left">
        <p>FÜHRT EUER VOLK VOM EINFACHEN BÜRGER ZUM <span class="gold">KAISER</span>:
        VERTEILT KORN, HANDELT MIT LAND, ERHEBT STEUERN, BAUT MÄRKTE, MÜHLEN,
        PALAST UND KATHEDRALE — UND FÜHRT NOTFALLS KRIEG.</p>
        <p style="margin-top:8px" class="cyn">ABER BEDENKT: EURE LEBENSZEIT IST BEGRENZT.
        WER LÄNGER ALS 90 SEKUNDEN PRO ZUG GRÜBELT, ALTERT SCHNELLER!</p>
      </div>
      <button class="big" onclick="zeige('setup')">SPIEL STARTEN <span class="blink">▮</span></button>
    </div>`;
  },

  /* ---- Setup ---- */
  setup(){
    let rows = "";
    for(let i=0;i<4;i++){
      rows += `<tr id="prow${i}" style="${i>0?'opacity:.35':''}">
        <td>SPIELER ${i+1}</td>
        <td><input type="text" id="pname${i}" maxlength="12" value="${["FRIEDRICH","ANNA","WILHELM","LUISE"][i]}" ${i>0?'disabled':''}></td>
        <td>
          <select id="pw${i}" ${i>0?'disabled':''}>
            <option value="0">HERR</option><option value="1" ${i%2?'selected':''}>DAME</option>
          </select>
        </td></tr>`;
    }
    return `
      <h2>NEUES SPIEL</h2>
      <div class="box">
        <p>ANZAHL DER SPIELER:
          <select id="anz" onchange="setupAnzahl()">
            <option>1</option><option selected>2</option><option>3</option><option>4</option>
          </select>
        </p>
        <table>${rows}</table>
      </div>
      <div class="box">
        <p>SPIELLÄNGE:
          <select id="tempo">
            <option value="1">ORIGINAL — LEBEN BIS CA. 1760-1768 (LANGES SPIEL)</option>
            <option value="1.8" selected>KURZSPIEL — SCHNELLERES WACHSTUM, LEBEN BIS CA. 1739-1746</option>
          </select>
        </p>
      </div>
      <p class="dim small">JEDER BEGINNT IM JAHR 1700 MIT 15.000 TALERN, 10.000 HEKTAR LAND, 400 FUDER KORN UND 2.500 UNTERTANEN.</p>
      <button class="big" onclick="setupStart()">LOS GEHT'S</button>
      <button onclick="zeige('title')">ZURÜCK</button>`;
  },

  /* ---- Übergabe ---- */
  handoff(){
    const p = cur();
    return `
      <div class="center" style="padding-top:120px">
        <h1>ANNO ${G.jahr}</h1>
        <p style="font-size:18px;margin:20px 0">
          <span class="gold">${titelName(p)} ${p.name}</span> IST AM ZUG
        </p>
        <p class="dim">BITTE AN DAS GERÄT TRETEN.</p>
        <br>
        <button class="big" onclick="beginneZug()">ZUG BEGINNEN</button>
      </div>`;
  },

  /* ---- Status ---- */
  status(){
    const p = cur();
    const ziel = p.titel<8 ? BEDINGUNGEN[p.titel+1].txt : "—";
    return `
      <h2>ANNO ${G.jahr} — ${anrede(p)}, ${titelName(p)} ${p.name}</h2>
      <div class="row">
        <div class="col box">
          <table>
            <tr><td>VERMÖGEN</td><td class="r ${p.geld<0?'red':'gold'}">${fmt(p.geld)} TALER</td></tr>
            <tr><td>LAND</td><td class="r hi">${fmt(p.land)} HA</td></tr>
            <tr><td class="dim">· BAUPLÄTZE (1/1.000 HA)</td><td class="r dim">${p.maerkte+p.muehlen} / ${bauplaetze(p)}</td></tr>
            <tr><td>KORNSPEICHER</td><td class="r hi">${fmt(p.korn)} FUDER</td></tr>
            <tr><td>UNTERTANEN</td><td class="r hi">${fmt(p.pop)}</td></tr>
            <tr><td>STIMMUNG DES VOLKES</td><td class="r ${p.stimmung>=60?'grn':p.stimmung>=35?'org':'red'}">${p.stimmung} / 100</td></tr>
          </table>
        </div>
        <div class="col box">
          <table>
            <tr><td>MÄRKTE</td><td class="r hi">${p.maerkte}</td></tr>
            <tr><td>KORNMÜHLEN</td><td class="r hi">${p.muehlen}</td></tr>
            <tr><td>STÄDTE</td><td class="r hi">${staedte(p)}</td></tr>
            <tr><td>PALAST</td><td class="r hi">${p.palast} / ${PALAST_TEILE} TEILE</td></tr>
            <tr><td>KATHEDRALE</td><td class="r hi">${p.dom} / ${DOM_TEILE} TEILE</td></tr>
          </table>
        </div>
      </div>
      <div class="box">
        <p class="cyn">NÄCHSTE BEFÖRDERUNG (${p.titel<8?TITEL[p.titel+1][p.w?1:0]:"—"}): ${ziel}</p>
        <p class="dim small">BEFÖRDERUNG NUR BEI POSITIVEM KONTOSTAND.</p>
      </div>
      <button class="big" onclick="zeige('korn')">WEITER: KORNAUSGABE</button>`;
  },

  /* ---- Kornausgabe ---- */
  korn(){
    const p = cur(), n = noetigKorn(p);
    return `
      <h2>KORNAUSGABE AN DAS VOLK</h2>
      <div class="box">
        <table>
          <tr><td>KORNSPEICHER</td><td class="r hi">${fmt(p.korn)} FUDER</td></tr>
          <tr><td>NÖTIGES KORN (${fmt(p.pop)} UNTERTANEN)</td><td class="r gold">${fmt(n)} FUDER</td></tr>
        </table>
        <p class="dim small">WER MEHR ALS DAS NÖTIGE KORN AUSGIBT, LOCKT EINWANDERER AN UND HEBT DIE STIMMUNG.
        WER WENIGER AUSGIBT, LÄSST SEIN VOLK HUNGERN.</p>
      </div>
      <p>AUSGABE:
        <input type="number" id="ausg" min="0" max="${p.korn}" value="${Math.min(n,p.korn)}">
        FUDER
        <button onclick="$('#ausg').value=${Math.min(n,p.korn)}">NÖTIG</button>
        <button onclick="$('#ausg').value=${Math.min(Math.ceil(n*1.25),p.korn)}">+25%</button>
        <button onclick="$('#ausg').value=${Math.min(Math.ceil(n*1.5),p.korn)}">+50%</button>
        <button onclick="$('#ausg').value=${p.korn}">ALLES</button>
      </p>
      <button class="big" onclick="kornAusgeben()">AUSGEBEN &amp; WEITER</button>`;
  },

  /* ---- Handel ---- */
  handel(){
    const p = cur();
    return `
      <h2>MARKT — KORN- UND LANDHANDEL</h2>
      <div class="row">
        <div class="col box">
          <p class="gold">KORNPREIS: ${fmt(p.kornPreis)} TALER / FUDER</p>
          <p class="dim small">(SCHWANKT ZWISCHEN 20 UND 430 TALERN. BEIM VERKAUF WERDEN 10% PROVISION ABGEZOGEN.)</p>
          <p>LAGER: <span class="hi">${fmt(p.korn)} FUDER</span></p>
          <p style="margin-top:8px">KAUFEN: <input type="number" id="kkauf" min="0" value="0"> <button onclick="handelKorn(1)">KAUF</button></p>
          <p>VERKAUFEN: <input type="number" id="kverk" min="0" max="${p.korn}" value="0"> <button onclick="handelKorn(-1)">VERKAUF</button></p>
        </div>
        <div class="col box">
          <p class="gold">LANDPREIS: ${fmt(p.landPreis)} TALER / HA</p>
          <p class="dim small">(SCHWANKT ZWISCHEN 16 UND 70 TALERN. LAND, DAS EURE GEBÄUDE TRAGEN, IST UNVERKÄUFLICH.)</p>
          <p>VERKÄUFLICHES LAND: <span class="hi">${fmt(freiLand(p))} HA</span></p>
          <p style="margin-top:8px">KAUFEN: <input type="number" id="lkauf" min="0" value="0"> <button onclick="handelLand(1)">KAUF</button></p>
          <p>VERKAUFEN: <input type="number" id="lverk" min="0" max="${freiLand(p)}" value="0"> <button onclick="handelLand(-1)">VERKAUF</button></p>
        </div>
      </div>
      <p>VERMÖGEN: <span class="${p.geld<0?'red':'gold'}">${fmt(p.geld)} TALER</span>
         <span id="hmsg" class="cyn" style="margin-left:20px"></span></p>
      <button class="big" onclick="zeige('steuern')">WEITER: STEUERN</button>`;
  },

  /* ---- Steuern ---- */
  steuern(){
    const p = cur();
    return `
      <h2>STEUERN &amp; JUSTIZ</h2>
      <div class="box">
        <table>
          <tr><td>ZÖLLE</td>
              <td><input type="range" id="zoll" min="0" max="40" value="${p.zoll}" oninput="$('#zv').textContent=this.value+'%'"></td>
              <td class="r hi" style="width:60px"><span id="zv">${p.zoll}%</span></td></tr>
          <tr><td>EINKOMMENSTEUER</td>
              <td><input type="range" id="einkSt" min="0" max="60" value="${p.einkSt}" oninput="$('#ev').textContent=this.value+'%'"></td>
              <td class="r hi"><span id="ev">${p.einkSt}%</span></td></tr>
          <tr><td>MEHRWERTSTEUER</td>
              <td><input type="range" id="mwSt" min="0" max="40" value="${p.mwSt}" oninput="$('#mv').textContent=this.value+'%'"></td>
              <td class="r hi"><span id="mv">${p.mwSt}%</span></td></tr>
          <tr><td>JUSTIZ</td>
              <td colspan="2">
                <select id="justiz">
                  ${[1,2,3,4].map(j=>`<option value="${j}" ${p.justiz===j?'selected':''}>${JUSTIZ[j]}</option>`).join("")}
                </select>
              </td></tr>
        </table>
        <p class="dim small">HOHE STEUERN FÜLLEN DIE KASSE, ABER DRÜCKEN DIE STIMMUNG —
        UNZUFRIEDENE UNTERTANEN WANDERN AB. GIERIGE JUSTIZ VERGRÄMT DAS VOLK.</p>
      </div>
      <button class="big" onclick="steuernSetzen()">WEITER: LANDKARTE &amp; BAUEN</button>`;
  },

  /* ---- Landkarte & Bauen ---- */
  bauen(){
    const p = cur();
    const kachel = [];
    for(let i=0;i<Math.ceil(p.dom/4);i++)    kachel.push(["t-dom","D"]);
    for(let i=0;i<Math.ceil(p.palast/4);i++) kachel.push(["t-palast","P"]);
    for(let i=0;i<p.muehlen;i++)             kachel.push(["t-muehle","K"]);
    for(let i=0;i<p.maerkte;i++)             kachel.push(["t-markt","M"]);
    const acker = Math.floor(Math.min(p.pop*4, p.land)/1000);
    for(let i=0;i<acker && kachel.length<118;i++) kachel.push(["t-acker","·"]);
    const rest = clamp(Math.floor(p.land/1000) - kachel.length, 0, 120-kachel.length);
    for(let i=0;i<rest;i++)                  kachel.push(["t-frei","·"]);
    const map = kachel.slice(0,120).map(k=>`<div class="tile ${k[0]}">${k[1]}</div>`).join("");

    const platz = (p.maerkte+p.muehlen) < bauplaetze(p);
    const bBtn = (label,fn,ok) => `<button onclick="${fn}" ${ok?'':'disabled'}>${label}</button>`;
    const kriegOk = p.titel>=1 && !p.kriegGefuehrt && G.spieler.some(s=>s!==p && !s.tot);
    return `
      <h2>LANDKARTE VON ${p.name}S REICH — ${fmt(p.land)} HA</h2>
      <div id="map">${map}</div>
      <p class="legend">
        <span><span class="tile t-markt" style="display:inline-flex">M</span> MARKT</span>
        <span><span class="tile t-muehle" style="display:inline-flex">K</span> KORNMÜHLE</span>
        <span><span class="tile t-palast" style="display:inline-flex">P</span> PALAST</span>
        <span><span class="tile t-dom" style="display:inline-flex">D</span> KATHEDRALE</span>
        <span><span class="tile t-acker" style="display:inline-flex">·</span> ACKERLAND</span>
        <span><span class="tile t-frei" style="display:inline-flex">·</span> BRACHLAND</span>
      </p>
      <div class="box">
        <p class="dim small">JE 1.000 HA LAND EIN BAUPLATZ (${p.maerkte+p.muehlen}/${bauplaetze(p)} BELEGT). EINE STADT = 5 MÄRKTE + 3 MÜHLEN.
          MÄRKTE BRINGEN ZÖLLE &amp; MILIZ (JE 50 MANN), MÜHLEN STEIGERN DIE ERNTE (+5%).
          DER PALAST (16 TEILE À 5.000 T) ERFORDERT EIN GUT VON 13.000 HA,
          DIE KATHEDRALE (14 TEILE À 9.000 T) EIN GUT VON 25.000 HA.</p>
        ${bBtn(`MARKT BAUEN (${fmt(KOSTEN.markt)} T)`,"baue('markt')", p.geld>=KOSTEN.markt && platz)}
        ${bBtn(`MÜHLE BAUEN (${fmt(KOSTEN.muehle)} T)`,"baue('muehle')", p.geld>=KOSTEN.muehle && platz)}
        ${bBtn(`PALAST-TEIL ${p.palast}/${PALAST_TEILE} (${fmt(KOSTEN.palastTeil)} T)`,"baue('palast')",
            p.palast<PALAST_TEILE && p.geld>=KOSTEN.palastTeil && p.land>=LAND.palast)}
        ${bBtn(`DOM-TEIL ${p.dom}/${DOM_TEILE} (${fmt(KOSTEN.domTeil)} T)`,"baue('dom')",
            p.dom<DOM_TEILE && p.geld>=KOSTEN.domTeil && p.land>=LAND.dom)}
        ${p.land<LAND.palast?`<p class="dim small">FÜR DEN PALAST FEHLEN EUCH NOCH ${fmt(LAND.palast-p.land)} HA LAND.</p>`:""}
      </div>
      <p>VERMÖGEN: <span class="${p.geld<0?'red':'gold'}">${fmt(p.geld)} TALER</span></p>
      <button class="warn" onclick="zeige('krieg')" ${kriegOk?'':'disabled'}>KRIEG FÜHREN</button>
      <button class="big" onclick="jahrAbschliessen()">JAHR ABSCHLIESSEN</button>
      ${p.titel<1?'<p class="dim small">KRIEG IST ERST AB DEM RANG BARON MÖGLICH. EIN FELDZUG PRO JAHR.</p>':''}`;
  },

  /* ---- Krieg ---- */
  krieg(){
    const p = cur();
    const ziele = G.spieler.filter(s=>s!==p && !s.tot);
    return `
      <h2>FELDZUG</h2>
      <div class="box">
        <p>GEGNER:
          <select id="ziel">${ziele.map(z=>`<option value="${G.spieler.indexOf(z)}">${titelName(z)} ${z.name} (${fmt(z.land)} HA, ${fmt(z.pop)} EINW.)</option>`).join("")}</select>
        </p>
        <table>
          <tr><td>INFANTERIE (100 T/MANN)</td><td><input type="number" id="inf" min="0" value="0"></td></tr>
          <tr><td>KAVALLERIE (250 T/MANN)</td><td><input type="number" id="kav" min="0" value="0"></td></tr>
          <tr><td>ARTILLERIE (500 T/GESCHÜTZ)</td><td><input type="number" id="art" min="0" value="0"></td></tr>
          <tr><td>EIGENE MILIZ (AUS ${p.maerkte} MÄRKTEN)</td><td class="hi">${fmt(miliz(p))} MANN (GRATIS)</td></tr>
        </table>
        <p class="dim small">DER VERTEIDIGER KÄMPFT MIT MILIZ UND VOLKSAUFGEBOT UND HAT EINEN HEIMVORTEIL.
        BEI SIEG EROBERT IHR BIS ZU 15% DES GEGNERISCHEN LANDES — BEI NIEDERLAGE ZAHLT IHR TRIBUT.</p>
      </div>
      <p>VERMÖGEN: <span class="gold">${fmt(p.geld)} TALER</span></p>
      <button class="warn big" onclick="kriegStarten()">ANGRIFF!</button>
      <button onclick="zeige('bauen')">DOCH KEIN KRIEG</button>`;
  },

  /* ---- Kriegsergebnis ---- */
  kriegErgebnis(){
    return `
      <h2>SCHLACHTBERICHT</h2>
      <div class="box"><p class="${G._kr.sieg?'grn':'red'}" style="font-size:16px">${G._kr.txt}</p>
      <p class="dim" style="margin-top:8px">KOSTEN DES FELDZUGS: ${fmt(G._kr.kosten)} TALER</p></div>
      <button class="big" onclick="zeige('bauen')">WEITER</button>`;
  },

  /* ---- Jahresbilanz ---- */
  bilanz(){
    const p = cur(), r = p.report;
    const evHtml = r.ereignisse.length
      ? r.ereignisse.map(e=>`<p class="${e.c}">» ${e.t}</p>`).join("")
      : `<p class="dim">KEINE BESONDEREN VORKOMMNISSE.</p>`;
    return `
      <h2>JAHRESBILANZ ANNO ${G.jahr} — ${titelName(p)} ${p.name}</h2>
      <div class="box">${evHtml}</div>
      <div class="row">
        <div class="col box">
          <table class="report">
            <tr><td>ERNTE</td><td class="r grn">+${fmt(r.ernte)} FUDER</td></tr>
            <tr><td>KORNSPEICHER JETZT</td><td class="r hi">${fmt(p.korn)} FUDER</td></tr>
            <tr class="line"><td>STEUEREINNAHMEN</td><td class="r grn">+${fmt(r.steuern)} TALER</td></tr>
            <tr><td>VERMÖGEN JETZT</td><td class="r ${p.geld<0?'red':'gold'}">${fmt(p.geld)} TALER</td></tr>
          </table>
        </div>
        <div class="col box">
          <table class="report">
            <tr><td>GEBURTEN</td><td class="r grn">+${fmt(r.geburten)}</td></tr>
            <tr><td>NATÜRLICHE TODESFÄLLE</td><td class="r red">-${fmt(r.tote)}</td></tr>
            ${r.verhungert?`<tr><td>VERHUNGERT</td><td class="r red">-${fmt(r.verhungert)}</td></tr>`:""}
            <tr><td>${r.migration>=0?"EINWANDERUNG":"ABWANDERUNG"}</td><td class="r ${r.migration>=0?'grn':'red'}">${r.migration>=0?"+":""}${fmt(r.migration)}</td></tr>
            <tr class="line"><td>UNTERTANEN JETZT</td><td class="r hi">${fmt(p.pop)}</td></tr>
            <tr><td>STIMMUNG</td><td class="r ${p.stimmung>=60?'grn':p.stimmung>=35?'org':'red'}">${p.stimmung}/100</td></tr>
          </table>
        </div>
      </div>
      ${r.verhungert?'<p class="red">EUER VOLK HUNGERT! DAS SPRICHT SICH IM REICH HERUM.</p>':""}
      ${r.ueberzeit>0?`<p class="red small">IHR HABT ${Math.round(r.ueberzeit)} SEKUNDEN ZU LANGE REGIERT — DIE SORGEN NAGEN AN EURER GESUNDHEIT.</p>`:""}
      <button class="big" onclick="nachBilanz()">WEITER</button>`;
  },

  /* ---- Beförderung ---- */
  befoerderung(){
    const p = cur();
    if(p.titel===8){ G.sieger = p; }
    return `
      <div class="center" style="padding-top:90px">
        <p class="gold" style="font-size:18px">TROMPETEN ERSCHALLEN!</p>
        <h1 style="margin:22px 0">${p.name} WIRD ZU${p.w?"R":"M"} <span class="gold">${titelName(p)}</span> ERHOBEN!</h1>
        ${p.titel===8
          ? `<p class="grn" style="font-size:16px">DIE KATHEDRALE IST VOLLENDET — DAS REICH HAT EINEN NEUEN ${titelName(p)}!</p>
             <br><button class="big" onclick="zeige('sieg')">ZUR KRÖNUNG</button>`
          : `<br><button class="big" onclick="naechsterSpieler()">WEITER</button>`}
      </div>`;
  },

  /* ---- Tod ---- */
  tod(){
    const p = cur();
    const alter = Math.floor(G.jahr - 1700 + ri(25,40));
    return `
      <div class="center" style="padding-top:100px">
        <h1 class="red">DIE GLOCKEN LÄUTEN...</h1>
        <p style="font-size:16px;margin:18px 0">${titelName(p)} ${p.name} IST ANNO ${G.jahr} VERSTORBEN.</p>
        <p class="dim">HÖCHSTER RANG: ${titelName(p)} · ${fmt(p.land)} HA · ${fmt(p.pop)} UNTERTANEN</p>
        <br><button class="big" onclick="naechsterSpieler()">WEITER</button>
      </div>`;
  },

  /* ---- Sieg ---- */
  sieg(){
    const p = G.sieger;
    return `
      <div class="center" style="padding-top:70px">
        <div class="logo" style="color:var(--c64-yellow)">${LOGO}</div>
        <h1 class="gold">HEIL ${p.w?"DER KAISERIN":"DEM KAISER"} ${p.name}!</h1>
        <p style="margin:16px 0">ANNO ${G.jahr} · ${fmt(p.pop)} UNTERTANEN · ${fmt(p.land)} HA · ${fmt(p.geld)} TALER</p>
        <p class="dim">VOM EINFACHEN BÜRGER ZUM HERRSCHER DES REICHES — DAS SPIEL IST GEWONNEN.</p>
        <br><button class="big" onclick="zeige('ende')">SCHLUSSWERTUNG</button>
      </div>`;
  },

  /* ---- Ende / Wertung ---- */
  ende(){
    const sortiert = [...G.spieler].sort((a,b)=>score(b)-score(a));
    const rows = sortiert.map((p,i)=>`
      <tr ${i===0?'class="gold"':''}>
        <td>${i+1}.</td><td>${titelName(p)} ${p.name}${p.tot?" †":""}</td>
        <td class="r">${fmt(p.pop)}</td><td class="r">${fmt(p.land)}</td>
        <td class="r">${fmt(p.geld)}</td><td class="r">${fmt(score(p))}</td>
      </tr>`).join("");
    return `
      <h2>SCHLUSSWERTUNG ANNO ${G.jahr}</h2>
      <table>
        <tr class="dim"><th></th><th>NAME</th><th class="r">UNTERTANEN</th><th class="r">LAND (HA)</th><th class="r">TALER</th><th class="r">PUNKTE</th></tr>
        ${rows}
      </table>
      <br>
      <button class="big" onclick="zeige('title')">NEUES SPIEL</button>`;
  }
};

/* ---------- Aktionen (von Buttons aufgerufen) ---------- */
function setupAnzahl(){
  const n = +$("#anz").value;
  for(let i=0;i<4;i++){
    const on = i<n;
    $("#prow"+i).style.opacity = on?1:.35;
    $("#pname"+i).disabled = !on;
    $("#pw"+i).disabled = !on;
  }
}
function setupStart(){
  const n = +$("#anz").value;
  const namen=[], w=[];
  for(let i=0;i<n;i++){
    namen.push(($("#pname"+i).value.trim()||("SPIELER "+(i+1))).toUpperCase());
    w.push($("#pw"+i).value==="1");
  }
  starteSpiel(n, namen, w, +$("#tempo").value);
}
function kornAusgeben(){
  const p = cur();
  const a = clamp(Math.floor(+$("#ausg").value||0), 0, p.korn);
  p.ausgabe = a; p.korn -= a;
  zeige("handel");
}
function handelKorn(dir){
  const p = cur();
  if(dir>0){
    const m = Math.floor(+$("#kkauf").value||0);
    const kosten = m*p.kornPreis;
    if(m<=0) return;
    if(kosten>p.geld){ $("#hmsg").textContent="ZU WENIG TALER!"; return; }
    p.geld -= kosten; p.korn += m;
  } else {
    const m = clamp(Math.floor(+$("#kverk").value||0),0,p.korn);
    if(m<=0) return;
    p.korn -= m; p.geld += Math.round(m*p.kornPreis*0.9);
  }
  render();
}
function handelLand(dir){
  const p = cur();
  if(dir>0){
    const m = Math.floor(+$("#lkauf").value||0);
    const kosten = m*p.landPreis;
    if(m<=0) return;
    if(kosten>p.geld){ $("#hmsg").textContent="ZU WENIG TALER!"; return; }
    p.geld -= kosten; p.land += m;
  } else {
    const m = clamp(Math.floor(+$("#lverk").value||0),0,freiLand(p));
    if(m<=0) return;
    p.land -= m; p.geld += m*p.landPreis;
  }
  render();
}
function steuernSetzen(){
  const p = cur();
  p.zoll = +$("#zoll").value; p.einkSt = +$("#einkSt").value;
  p.mwSt = +$("#mwSt").value; p.justiz = +$("#justiz").value;
  zeige("bauen");
}
function baue(was){
  const p = cur();
  const platz = (p.maerkte+p.muehlen) < bauplaetze(p);
  if(was==="markt"  && p.geld>=KOSTEN.markt  && platz){ p.geld-=KOSTEN.markt; p.maerkte++; }
  if(was==="muehle" && p.geld>=KOSTEN.muehle && platz){ p.geld-=KOSTEN.muehle; p.muehlen++; }
  if(was==="palast" && p.palast<PALAST_TEILE && p.geld>=KOSTEN.palastTeil && p.land>=LAND.palast){ p.geld-=KOSTEN.palastTeil; p.palast++; }
  if(was==="dom"    && p.dom<DOM_TEILE && p.geld>=KOSTEN.domTeil && p.land>=LAND.dom){ p.geld-=KOSTEN.domTeil; p.dom++; }
  render();
}
function kriegStarten(){
  const p = cur();
  const ziel = G.spieler[+$("#ziel").value];
  const inf = Math.max(0,Math.floor(+$("#inf").value||0));
  const kav = Math.max(0,Math.floor(+$("#kav").value||0));
  const art = Math.max(0,Math.floor(+$("#art").value||0));
  const kosten = inf*100+kav*250+art*500;
  if(kosten > p.geld){ alert2("ZU WENIG TALER FÜR DIESES HEER!"); return; }
  G._kr = fuehreKrieg(p, ziel, inf, kav, art);
  zeige("kriegErgebnis");
}
function alert2(t){ /* kein browser-alert (blockiert) — inline-hinweis */
  const el = $("#screen").querySelector("h2");
  if(el){ el.innerHTML += ` <span class="red small">${t}</span>`; }
}
function jahrAbschliessen(){
  const p = cur();
  jahresabschluss(p);
  zeige("bilanz");
}
function nachBilanz(){
  const p = cur();
  if(pruefeBefoerderung(p)){ zeige("befoerderung"); return; }
  naechsterSpieler();
}

render();
</script>
</body>
</html>
