        : pend.typ==="aufD" ? "stellt heimlich die Verteidigung auf"
        : pend.typ==="schlacht" || pend.typ==="schlachtplan" ? "führt eine Schlacht"
        : "ist am Zug")
      : "ist am Zug";
    const rang = [...G.spieler].sort((a,b)=>score(b)-score(a));
    const zeilen = rang.map(s=>`
      <tr><td><span class="dot" style="background:${s.farbe}"></span>${s.wappen} ${titelName(s)} ${s.name}${s.tot?" †":""}</td>
      <td class="r">${fmt(s.land)} ha</td><td class="r">${fmt(s.pop)}</td><td class="r">${staedte(s)}</td></tr>`).join("");
    return `
      <div class="hero" style="padding-bottom:16px">
        <span class="schild" style="box-shadow:inset 0 0 26px ${wer?wer.farbe:'#888'}66">${wer?wer.wappen:"⏳"}</span>
        <h1 style="font-size:28px;margin-top:12px">Anno ${G.jahr}</h1>
        <p style="font-size:17px;margin:12px 0 4px"><b class="gold">${wer?titelName(wer)+" "+wer.name:"…"}</b> ${was} …</p>
        <p class="muted small blink">Bitte warten — Euer Zug kommt.</p>
      </div>
      <div class="card" style="max-width:640px;margin:0 auto">
        <h3>Die Reiche im Vergleich</h3>
        <table><tr><th>Regent</th><th class="r">Land</th><th class="r">Untertanen</th><th class="r">Städte</th></tr>${zeilen}</table>
      </div>
      ${MP && MP.host && MP.getrennt && Object.keys(MP.getrennt).length ? `
      <div class="card" style="max-width:640px;margin:14px auto 0;border-color:var(--red)">
        <h3>⚠️ Getrennte Regenten</h3>
        ${Object.keys(MP.getrennt).map(i=>`<button class="btn-sm" onclick="kiUebernehmen(${i})">🤖 ${G.spieler[i].name} der KI übergeben</button>`).join("")}
      </div>`:""}
      ${chatBox()}
      <div class="center" style="margin-top:10px"><button class="btn-sm" onclick="mpVerlassen()">Partie verlassen</button></div>`;
  },

  handoff(){
    const p = cur();
    const rang = [...G.spieler].sort((a,b)=>score(b)-score(a));
    const zeilen = rang.map(s=>`
      <tr style="${s===p?'color:var(--gold);font-weight:600':''}">
        <td><span class="dot" style="background:${s.farbe}"></span>${s.wappen} ${titelName(s)} ${s.name}${s.tot?" †":""}${s.ki?' <span class="muted small">(KI)</span>':""}</td>
        <td class="r">${fmt(s.land)} ha</td>
        <td class="r">${fmt(s.pop)}</td>
        <td class="r">${staedte(s)}</td>
      </tr>`).join("");
    const berichte = (G._kiBerichte||[]);
    return `
      <div class="hero" style="padding-bottom:16px">
        <span class="schild" style="box-shadow:inset 0 0 26px ${p.farbe}66, 0 6px 22px rgba(0,0,0,.45)">${p.wappen}</span>
        <h1 class="anno-pop" style="font-size:32px;letter-spacing:2px;margin-top:12px">Anno ${G.jahr} <span class="muted" style="font-size:16px">· ${saison().n}</span></h1>
        <p style="font-size:19px;margin:14px 0 6px"><b class="gold">${titelName(p)} ${p.name}</b> ist am Zug.</p>
        <p class="muted">Bitte an das Gerät treten. Der 90-Sekunden-Zähler startet mit dem Zug.</p>
        <div style="margin-top:20px"><button class="btn-primary btn-lg" onclick="beginneZug()">Zug beginnen</button></div>
      </div>
      ${berichte.length?`
      <div class="card kiber" style="max-width:640px;margin:0 auto 14px">
        <h3>Derweil in den anderen Reichen …</h3>
        ${berichte.map(b=>`<p class="small" style="padding:2px 0">${b}</p>`).join("")}
      </div>`:""}
      ${G.spieler.length>1 && (!G.opt || G.opt.vergleich)?`
      <div class="card" style="max-width:640px;margin:0 auto">
        <h3>Die Reiche im Vergleich</h3>
        <table>
          <tr><th>Regent</th><th class="r">Land</th><th class="r">Untertanen</th><th class="r">Städte</th></tr>
          ${zeilen}
        </table>
      </div>`:""}`;
  },

  status(){
    const p = cur();
    const ziel = p.titel<8 ? BEDINGUNGEN[p.titel+1] : null;
    const nb = nachbarn(G.aktiv).map(i=>G.spieler[i].name).join(", ") || "—";
    return `
      ${stepper("Status")}
      <div style="display:flex;gap:18px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
        <canvas id="portraitS" width="120" height="150" style="border-radius:12px;border:1px solid var(--border);flex:0 0 auto"></canvas>
        <div>
          <h2 style="margin-bottom:4px">${anrede(p)}, ${titelName(p)} ${p.name}</h2>
          <p class="muted">${alterJahre(p)} Jahre alt · Anno ${G.jahr} · ${saison().n}</p>
          <button class="btn-sm" onclick="weltAuf()" style="margin-top:8px">🗺️ Gesamtkarte</button>
        </div>
      </div>
      ${statKarten(p)}
      <div class="grid g2">
        <div class="card">
          <h3>Reich</h3>
          <table>
            <tr><td>Märkte</td><td class="r">${p.maerkte}</td></tr>
            <tr><td>Kornmühlen</td><td class="r">${p.muehlen}</td></tr>
            <tr><td>Städte <span class="muted small">(5 Märkte + 3 Mühlen)</span></td><td class="r">${staedte(p)}</td></tr>
            <tr><td>Bauplätze <span class="muted small">(1 je 1.000 ha)</span></td><td class="r">${p.maerkte+p.muehlen} / ${bauplaetze(p)}</td></tr>
            <tr><td>Anbaufläche <span class="muted small">(Bebauung frisst Acker)</span></td><td class="r">${fmt(anbau(p))} ha</td></tr>
            <tr><td>Heer <span class="muted small">(Unterhalt ${fmt(unterhalt(p))} T/Jahr)</span></td><td class="r">${fmt(heerGroesse(p.heer))} Mann</td></tr>
            <tr><td>Nachbarreiche</td><td class="r">${nb}</td></tr>
          </table>
        </div>
        <div class="card">
          <h3>Monumente</h3>
          <div class="monu">${svgPalast(p.palast)}${svgDom(p.dom)}</div>
          <p class="center muted small">Palast ${p.palast}/${PALAST_TEILE} · Kathedrale ${p.dom}/${DOM_TEILE}</p>
        </div>
      </div>
      ${ziel?`<div class="card goal"><h3>Nächste Beförderung: ${TITEL[p.titel+1][p.w?1:0]}</h3>
        <p>${ziel.txt}</p>
        <p class="muted small" style="margin-top:6px">Beförderung nur bei positivem Kontostand.</p></div>`:""}
      <div class="card">
        <h3>Reichskarte</h3>
        <canvas id="karteS" width="920" height="330"></canvas>
      </div>
      ${(p.chronik||[]).length>=3?`<div class="card"><h3>Chronik des Reiches</h3>${chronikChart(p)}</div>`:""}
      <button class="btn-primary btn-lg" onclick="zeige('korn')">Weiter: Kornausgabe</button>`;
  },

  korn(){
    const p = cur(), n = noetigKorn(p);
    return `
      ${stepper("Korn")}
      <h2>Kornausgabe an das Volk</h2>
      <div class="grid g2">
        <div class="card">
          <table>
            <tr><td>Kornspeicher</td><td class="r"><b>${fmt(p.korn)} Fuder</b></td></tr>
            <tr><td>Nötiges Korn <span class="muted small">(${fmt(p.pop)} Untertanen)</span></td><td class="r"><b class="gold">${fmt(n)} Fuder</b></td></tr>
          </table>
          <p class="muted small" style="margin-top:10px">Wer mehr als das nötige Korn ausgibt,
          lockt Einwanderer an und hebt die Stimmung. Wer weniger ausgibt, lässt sein Volk hungern.</p>
        </div>
        <div class="card">
          <h3>Ausgabe festlegen</h3>
          <div class="rowflex">
            <input type="number" id="ausg" min="0" max="${p.korn}" value="${Math.min(n,p.korn)}"> Fuder
          </div>
          <div class="rowflex">
            <button class="btn-sm" onclick="$('#ausg').value=${Math.min(n,p.korn)}">Nötig</button>
            <button class="btn-sm" onclick="$('#ausg').value=${Math.min(Math.ceil(n*1.25),p.korn)}">+25 %</button>
            <button class="btn-sm" onclick="$('#ausg').value=${Math.min(Math.ceil(n*1.5),p.korn)}">+50 %</button>
            <button class="btn-sm" onclick="$('#ausg').value=${p.korn}">Alles</button>
          </div>
        </div>
      </div>
      <button class="btn-primary btn-lg" onclick="kornAusgeben()">Ausgeben &amp; weiter</button>`;
  },

  handel(){
    const p = cur();
    return `
      ${stepper("Handel")}
      <h2>Markt — Korn- und Landhandel</h2>
      <div class="grid g2">
        <div class="card">
          <h3>🌾 Korn — ${fmt(p.kornPreis)} Taler / Fuder</h3>
          ${sparkline(p.kornHist)}
          <p class="muted small">Gemeinsamer Markt aller Reiche: große Verkäufe drücken den Kurs des
          Folgejahres, Aufkäufe treiben ihn. Spanne 20–430 Taler, 10 % Provision auf Verkäufe.</p>
          <p style="margin-top:8px">Lager: <b>${fmt(p.korn)} Fuder</b></p>
          <div class="rowflex">Kaufen: <input type="number" id="kkauf" min="0" value="0">
            <button class="btn-sm" onclick="$('#kkauf').value=${Math.max(0,Math.floor(p.geld/p.kornPreis))}">Max</button>
            <button onclick="handelKorn(1)">Kauf</button></div>
          <div class="rowflex">Verkaufen: <input type="number" id="kverk" min="0" max="${p.korn}" value="0">
            <button class="btn-sm" onclick="$('#kverk').value=${p.korn}">Max</button>
            <button onclick="handelKorn(-1)">Verkauf</button></div>
        </div>
        <div class="card">
          <h3>🌍 Land — ${fmt(p.landPreis)} Taler / ha</h3>
          <p class="muted small">Schwankt zwischen 16 und 70 Talern. Auf Verkäufe werden 10 % Provision fällig.
          Land unter Euren Gebäuden ist unverkäuflich.</p>
          <p style="margin-top:8px">Verkäuflich: <b>${fmt(freiLand(p))} ha</b></p>
          <div class="rowflex">Kaufen: <input type="number" id="lkauf" min="0" value="0">
            <button class="btn-sm" onclick="$('#lkauf').value=${Math.max(0,Math.floor(p.geld/p.landPreis))}">Max</button>
            <button onclick="handelLand(1)">Kauf</button></div>
          <div class="rowflex">Verkaufen: <input type="number" id="lverk" min="0" max="${freiLand(p)}" value="0">
            <button class="btn-sm" onclick="$('#lverk').value=${freiLand(p)}">Max</button>
            <button onclick="handelLand(-1)">Verkauf</button></div>
        </div>
      </div>
      <div class="card"><b>Vermögen: <span class="${p.geld<0?'red':'gold'}">${fmt(p.geld)} Taler</span></b>
        <span id="hmsg" class="red" style="margin-left:16px"></span></div>
      <button class="btn-primary btn-lg" onclick="handelFertig()">Weiter: Zwischenbilanz</button>`;
  },

  zwbilanz(){
    const p = cur(), r = p.zb;
    const evHtml = r.ereignisse.length
      ? r.ereignisse.map(e=>`<div class="event ${e.c}">${e.t}</div>`).join("") : "";
    const row = (lbl,val,cls="") => `<tr><td>${lbl}</td><td class="r ${cls}">${val}</td></tr>`;
    return `
      ${stepper("Zw.-Bilanz")}
      <h2>Zwischenbilanz</h2>
      ${evHtml}
      <div class="card">
        <table>
          ${row("Geburten", "+"+fmt(r.geburten), "delta-pos")}
          ${row("Natürliche Todesfälle", "−"+fmt(r.tote), "delta-neg")}
          ${r.verhungert?row("Verhungert", "−"+fmt(r.verhungert), "delta-neg"):""}
          ${row(r.migration>=0?"Einwanderung":"Abwanderung", (r.migration>=0?"+":"−")+fmt(Math.abs(r.migration)), r.migration>=0?"delta-pos":"delta-neg")}
          ${row("Untertanen jetzt", "<b>"+fmt(p.pop)+"</b>")}
          ${row("Stimmung des Volkes", p.stimmung+"/100")}
        </table>
      </div>
      ${r.verhungert?'<div class="event bad">Euer Volk hungert! Das spricht sich im Reich herum.</div>':""}
      <button class="btn-primary btn-lg" onclick="nachZwischenbilanz()">Weiter: Steuern</button>`;
  },

  entscheidung(){
    const p = cur(), e = G._ereignis;
    if(!e){ setTimeout(()=>zeige("steuern"),10); return ""; }
    const knoepfe = e.wahl.map((w,k)=>{
      const label = typeof w.t === "function" ? w.t(p) : w.t;
      return `<button class="btn-lg" onclick="ereignisWahl(${k})" style="display:block;width:100%;text-align:left;margin:6px 0">${label}</button>`;
    }).join("");
    return `
      ${stepper("Zw.-Bilanz")}
      <h2>${e.ico} Eine Entscheidung, ${titelName(p)}!</h2>
      <div class="card" style="max-width:640px">
        <p style="font-size:16px">${e.txt(p)}</p>
      </div>
      <div style="max-width:640px">${knoepfe}</div>`;
  },

  steuern(){
    const p = cur();
    const slider = (id,lbl,min,max,val) => `
      <div class="sliderrow">
        <span>${lbl}</span>
        <input type="range" id="${id}" min="${min}" max="${max}" value="${val}"
          oninput="$('#${id}v').textContent=this.value+' %'">
        <span class="v" id="${id}v">${val} %</span>
      </div>`;
    return `
      ${stepper("Steuern")}
      <h2>Steuern &amp; Justiz</h2>
      <div class="card">
        ${slider("zoll","Zölle",0,40,p.zoll)}
        ${slider("einkSt","Einkommensteuer",0,99,p.einkSt)}
        ${slider("mwSt","Mehrwertsteuer",0,40,p.mwSt)}
        <div class="sliderrow">
          <span>Justiz</span>
          <select id="justiz">
            ${[1,2,3,4].map(j=>`<option value="${j}" ${p.justiz===j?'selected':''}>${JUSTIZ[j]}</option>`).join("")}
          </select><span></span>
        </div>
        <p class="muted small">Hohe Steuern füllen die Kasse, aber drücken die Stimmung —
        unzufriedene Untertanen wandern ab. Gierige Justiz vergrämt das Volk.</p>
      </div>
      <button class="btn-primary btn-lg" onclick="steuernSetzen()">Weiter: Landkarte &amp; Bauen</button>`;
  },

  bauen(){
    const p = cur();
    const platz = (p.maerkte+p.muehlen) < bauplaetze(p);
    const bBtn = (label,fn,ok) => `<button onclick="${fn}" ${ok?'':'disabled'}>${label}</button>`;
    const gegner = lebende().filter(x=>x.i!==G.aktiv);
    const kriegOk = p.titel>=1 && !p.kriegGefuehrt && gegner.length>0
      && (heerGroesse(p.heer)>0 || miliz(p)>0);
    return `
      ${stepper("Bauen")}
      <h2>Reichskarte — ${fmt(p.land)} ha</h2>
      <div class="card">
        <canvas id="karte" width="920" height="${G._karteGross?640:430}" onclick="karteKlick(event)"
          style="cursor:${G._bauModus?'crosshair':'zoom-in'}"
          title="${G._bauModus?'Bauplatz wählen':'Klicken zum Vergrößern/Verkleinern'}"></canvas>
        ${G._bauModus?`<p class="small" style="color:var(--gold)">🏗️ Bauplatz für ${G._bauModus==="markt"?"den Markt":"die Mühle"} wählen — Klick auf die Karte (nochmals auf den Knopf: abbrechen).</p>`:""}
        <p class="muted small">Neue Bauwerke erscheinen sofort auf der Karte (goldener Ring). Die Grenze
        wächst mit Eurem Landbesitz, Felder zeigen die Anbaufläche, Häuser das Volk, Mauerringe Eure Städte.
        Je 1.000 ha ein Bauplatz (${p.maerkte+p.muehlen}/${bauplaetze(p)} belegt) · Bebauung verringert die
        Anbaufläche (noch ${fmt(anbau(p))} ha Acker) · eine Stadt = 5 Märkte + 3 Mühlen · Märkte bringen
        Zölle und Miliz (je 50 Mann), Mühlen steigern die Ernte (+5 %) · Palast: Gut von 13.000 ha ·
        Kathedrale: Gut von 25.000 ha.</p>
      </div>
      <div class="grid g2">
        <div class="card">
          <h3>Bauen</h3>
          ${bBtn(`${G._bauModus==="markt"?"✳️ ":""}Markt — ${fmt(KOSTEN.markt)} T`,"baue('markt')", p.geld>=KOSTEN.markt && platz)}
          ${bBtn(`${G._bauModus==="muehle"?"✳️ ":""}Mühle — ${fmt(KOSTEN.muehle)} T`,"baue('muehle')", p.geld>=KOSTEN.muehle && platz)}
          ${bBtn(`Hafen ${p.haefen||0}/2 — ${fmt(KOSTEN.hafen)} T`,"baue('hafen')",
              (p.haefen||0)<2 && p.geld>=KOSTEN.hafen && p.land>=12000)}
          ${bBtn(`Palast-Teil ${p.palast}/${PALAST_TEILE} — ${fmt(KOSTEN.palastTeil)} T`,"baue('palast')",
              p.palast<PALAST_TEILE && p.geld>=KOSTEN.palastTeil && p.land>=LAND.palast)}
          ${bBtn(`Dom-Teil ${p.dom}/${DOM_TEILE} — ${fmt(KOSTEN.domTeil)} T`,"baue('dom')",
              p.dom<DOM_TEILE && p.geld>=KOSTEN.domTeil && p.land>=LAND.dom)}
          ${p.land<LAND.palast?`<p class="muted small">Für den Palast fehlen Euch noch ${fmt(LAND.palast-p.land)} ha Land.</p>`:
            p.land<LAND.dom && p.palast>=PALAST_TEILE?`<p class="muted small">Für die Kathedrale fehlen Euch noch ${fmt(LAND.dom-p.land)} ha Land.</p>`:""}
        </div>
        <div class="card">
          <h3>⚔️ Militär <span class="muted small">— stehendes Heer</span></h3>
          <table>
            <tr><td>Infanterie <span class="muted small">${fmt(KOSTEN.inf)} T, Sold 10 T/J</span></td>
                <td class="r">${fmt(p.heer.inf)}</td>
                <td class="r"><button class="btn-sm" onclick="werbe('inf',10)" ${p.geld>=KOSTEN.inf*10?'':'disabled'}>+10</button></td></tr>
            <tr><td>Kavallerie <span class="muted small">${fmt(KOSTEN.kav)} T, Sold 25 T/J</span></td>
                <td class="r">${fmt(p.heer.kav)}</td>
                <td class="r"><button class="btn-sm" onclick="werbe('kav',5)" ${p.geld>=KOSTEN.kav*5?'':'disabled'}>+5</button></td></tr>
            <tr><td>Artillerie <span class="muted small">${fmt(KOSTEN.art)} T, Sold 50 T/J</span></td>
                <td class="r">${fmt(p.heer.art)}</td>
                <td class="r"><button class="btn-sm" onclick="werbe('art',2)" ${p.geld>=KOSTEN.art*2?'':'disabled'}>+2</button></td></tr>
            <tr><td>Miliz <span class="muted small">aus ${p.maerkte} Märkten, gratis</span></td>
                <td class="r">${fmt(miliz(p))}</td><td></td></tr>
          </table>
          <p class="muted small" style="margin-top:6px">Unterhalt: <b>${fmt(unterhalt(p))} T/Jahr</b>
            — der Sold steigt mit Eurem Rang (+10 % je Titel).</p>
          ${p.titel<1?`<div class="event bad" style="margin-top:8px">⚠️ Als einfache${p.w?"":"r"} ${titelName(p)} dürft
            Ihr noch keinen Krieg erklären — erst ab dem Rang <b>Baron</b> (${BEDINGUNGEN[1].txt}).
            Söldner kosten bis dahin nur Sold!</div>`:""}
          ${heerGroesse(p.heer)>0?`<button class="btn-sm" onclick="entlassen()">Heer auflösen</button>`:""}
        </div>
      </div>
      <div class="card"><b>Vermögen: <span class="${p.geld<0?'red':'gold'}">${fmt(p.geld)} Taler</span></b></div>
      <button class="btn-danger" onclick="zeige('kriegPlan')" ${kriegOk?'':'disabled'}>⚔️ Krieg führen</button>
      <button onclick="zeige('diplo')" ${lebende().length>1?'':'disabled'}>🤝 Diplomatie</button>
      <button onclick="weltAuf()">🗺️ Gesamtkarte</button>
      <button class="btn-primary btn-lg" onclick="jahrAbschliessen()">Jahr abschließen</button>
      ${!kriegOk?`<div class="event bad" style="max-width:640px">⚔️ <b>Für einen Feldzug fehlt Euch noch:</b> ${kannKrieg(p).fehlt.join(" · ")}.</div>`:''}`;
  },

  diplo(){
    const p = cur();
    const ziele = lebende().filter(x=>x.i!==G.aktiv);
    const opts = ziele.map(z=>`<option value="${z.i}">${z.p.wappen} ${titelName(z.p)} ${z.p.name}${z.p.ki?` (${KI_TYP_NAMEN[z.p.kiTyp]||"KI"})`:""}</option>`).join("");
    const zielIdx = ziele.length ? ziele[0].i : -1;
    const bezZeilen = ziele.map(z=>{
      const w = bezWert(p, z.p);
      const lbl = w>40?"freundschaftlich":w>10?"wohlwollend":w>-10?"neutral":w>-40?"kühl":"feindselig";
      return `<tr><td>${z.p.wappen} ${z.p.name}</td>
        <td class="r ${w>10?'green':w<-10?'red':''}">${w>0?"+":""}${w} · ${lbl}</td>
        <td class="r">${paktAktiv(p,z.p)?`🕊️ Pakt bis ${p.pakte[z.i]}`:"—"}</td></tr>`;
    }).join("");
    return `
      ${stepper("Bauen")}
      <h2>🤝 Diplomatie</h2>
      <div class="grid g2">
        <div class="card">
          <h3>Beziehungen</h3>
          <table><tr><th>Regent</th><th class="r">Verhältnis</th><th class="r">Pakt</th></tr>${bezZeilen}</table>
          <p class="muted small" style="margin-top:6px">Geschenke und faire Geschäfte verbessern das
          Verhältnis, Kriege zerstören es. Verbündete Regenten unterstützen Euch eher im Krieg.</p>
        </div>
        <div class="card">
          <h3>${diploLimit(p)} Aktion${diploLimit(p)>1?"en":""} pro Jahr ${(p.diploZaehler||0)>=diploLimit(p)?'<span class="red small">— aufgebraucht</span>':''}</h3>
          <div class="rowflex">Partner: <select id="dipZiel">${opts}</select></div>
          <div class="rowflex" style="margin-top:8px">
            <input type="number" id="dipGeschenk" min="100" step="100" value="500" style="width:100px">
            <button onclick="diploAktion('geschenk')" ${(p.diploZaehler||0)>=diploLimit(p)?'disabled':''}>🎁 Geschenk senden</button>
          </div>
          <div class="rowflex">
            <select id="dipRichtung" style="width:130px">
              <option value="kauf">Ich kaufe</option><option value="verkauf">Ich verkaufe</option>
            </select>
            <input type="number" id="dipMenge" min="1" value="100" style="width:80px" title="Fuder">
            <span class="muted small">Fuder à</span>
            <input type="number" id="dipPreis" min="1" value="${G.kornMarkt||100}" style="width:80px" title="Taler je Fuder">
            <button onclick="diploAktion('handel')" ${(p.diploZaehler||0)>=diploLimit(p)?'disabled':''}>Anbieten</button>
          </div>
          <div class="rowflex">
            <button onclick="diploAktion('pakt')" ${(p.diploZaehler||0)>=diploLimit(p)?'disabled':''}>🕊️ Nichtangriffspakt anbieten (5 Jahre)</button>
          </div>
          <div class="rowflex">
            <button onclick="spionEntsenden()" ${p.spionGenutzt?'disabled':''}>🕵️ Spion entsenden (600 T)</button>
            ${p.spionGenutzt?'<span class="muted small">Spion dieses Jahr bereits unterwegs</span>':''}
          </div>
          ${lebende().filter(x=>x.i!==G.aktiv).map(z=>spionBericht(p, z.i)).join("")}
        </div>
        <div class="card">
          <h3>👥 Der Hofstaat</h3>
          ${BERATER.map(b=>`
            <div class="rowflex" style="justify-content:space-between">
              <span>${b.ico} <b>${b.person}</b> — ${b.n}<br>
                <span class="muted small">${b.d} · ${fmt(b.gehalt)} T Gehalt/Jahr</span></span>
              ${p.berater[b.k]
                ? `<button class="btn-sm" onclick="beraterEntlassen('${b.k}')">Entlassen</button>`
                : `<button class="btn-sm" onclick="beraterAnheuern('${b.k}')" ${p.geld<b.kosten?'disabled':''}>Anheuern (${fmt(b.kosten)} T)</button>`}
            </div>`).join("")}
          <p class="muted small">Berater kosten Antrittsgeld und Jahresgehalt — und haben mitunter eigene Pläne.</p>
          <p class="muted small">Angebote an menschliche Regenten werden zu Beginn von deren
          nächstem Zug beantwortet. Marktpreis derzeit ${fmt(G.kornMarkt||100)} T/Fuder.</p>
        </div>
      </div>
      <button class="btn-primary btn-lg" onclick="zeige('bauen')">Zurück zur Bauphase</button>`;
  },

  angebote(){
    const meine = (G.angebote||[]).map((a,i)=>({a,i})).filter(x=>x.a.an===G.aktiv);
    if(!meine.length){ setTimeout(()=>zeige("status"), 10); return ""; }
    const karten = meine.map(({a,i})=>{
      const von = G.spieler[a.von];
      const txt = a.richtung==="pakt"
        ? `bietet Euch einen <b>Nichtangriffspakt</b> über 5 Jahre an.`
        : a.richtung==="kauf"
          ? `möchte <b>${fmt(a.menge)} Fuder Korn</b> von Euch kaufen — zu <b>${fmt(a.preis)} T/Fuder</b> (${fmt(a.menge*a.preis)} T gesamt).`
          : `bietet Euch <b>${fmt(a.menge)} Fuder Korn</b> an — zu <b>${fmt(a.preis)} T/Fuder</b> (${fmt(a.menge*a.preis)} T gesamt).`;
      return `<div class="card">
        <p>${von.wappen} <b>${titelName(von)} ${von.name}</b> ${txt}</p>
        <p class="muted small">Marktpreis derzeit ${fmt(G.kornMarkt||100)} T/Fuder · Euer Verhältnis: ${bezWert(cur(),von)}</p>
        <button class="btn-primary" onclick="angebotAntwort(${i}, true)">Annehmen</button>
        <button onclick="angebotAntwort(${i}, false)">Ablehnen</button>
      </div>`;
    }).join("");
    return `
      <h2>📜 Botschaften an Euren Hof</h2>
      ${karten}`;
  },

  kriegPlan(){
    const p = cur();
    const nb = nachbarn(G.aktiv);
    const ziele = lebende().filter(x=>x.i!==G.aktiv && !paktAktiv(p, x.p));
    const pakte = lebende().filter(x=>x.i!==G.aktiv && paktAktiv(p, x.p));
    const vorwahl = G._zielVorwahl;
    G._zielVorwahl = undefined;
    const opts = ziele.map(z=>{
      const adj = nb.includes(z.i);
      const weg = adj ? [] : wegZwischen(G.aktiv, z.i);
      return `<option value="${z.i}" ${z.i===vorwahl?'selected':''}>${titelName(z.p)} ${z.p.name} — ${fmt(z.p.land)} ha, ${fmt(z.p.pop)} Einw.${adj?" · Nachbar":" · Durchmarsch über "+weg.map(i=>G.spieler[i].name).join(", ")}</option>`;
    }).join("");
    return `
      ${stepper("Bauen")}
      <h2>⚔️ Feldzug planen</h2>
      <div class="card">
        <div class="rowflex">Gegner: <select id="ziel" style="max-width:100%">${opts}</select></div>
        ${pakte.length?`<p class="muted small">🕊️ Durch Pakte geschützt: ${pakte.map(x=>x.p.name+" (bis "+p.pakte[x.i]+")").join(", ")}</p>`:""}
        ${ziele.map(z=>spionBericht(p, z.i)).join("")}
        <table>
          <tr><th>Eure Streitmacht</th><th class="r">Stärke</th></tr>
          <tr><td>Infanterie</td><td class="r">${fmt(p.heer.inf)}</td></tr>
          <tr><td>Kavallerie</td><td class="r">${fmt(p.heer.kav)}</td></tr>
          <tr><td>Artillerie</td><td class="r">${fmt(p.heer.art)}</td></tr>
          <tr><td>Miliz</td><td class="r">${fmt(miliz(p))}</td></tr>
        </table>
        <p class="muted small" style="margin-top:8px">Vor der Schlacht werden die übrigen Regenten
        befragt: Sie können Euch oder den Verteidiger mit ihrem Heer unterstützen (die Miliz bleibt
        stets daheim) oder neutral bleiben. Liegt das Ziel nicht an Eurer Grenze, braucht Ihr
        Durchmarschrechte aller Reiche auf dem Weg. Danach stellt Ihr Eure Truppen auf dem
        Schlachtfeld auf — der Verteidiger stellt geheim dagegen, hat Heimvorteil und ruft
        das Volksaufgebot.</p>
      </div>
      <button class="btn-danger btn-lg" onclick="kriegVorbereiten(+$('#ziel').value)">Zu den Waffen!</button>
      <button class="btn-lg" onclick="zeige('bauen')">Doch kein Krieg</button>`;
  },

  diplomatie(){
    const kr = G._kr;
    const frag = G.spieler[kr.fragen[kr.frageIdx]];
    const ang = G.spieler[kr.a], ver = G.spieler[kr.d];
    const aufWeg = kr.weg.includes(kr.fragen[kr.frageIdx]);
    return `
      <div class="hero" style="padding-top:30px">
        <span class="crown">📜</span>
        <h2 style="font-size:24px">Botschaft an ${titelName(frag)} ${frag.name}</h2>
        <p style="margin:12px auto;max-width:560px">
          <b class="gold">${titelName(ang)} ${ang.name}</b> zieht gegen
          <b class="cyan">${titelName(ver)} ${ver.name}</b> in den Krieg.
          ${aufWeg?"Der Heerzug führt durch <b>Euer</b> Gebiet.":""}
          Wie haltet Ihr es, ${titelName(frag)} ${frag.name}?</p>
        <p class="muted small" style="margin-bottom:18px">Unterstützt Ihr eine Seite, kämpft Euer
        stehendes Heer (${fmt(heerGroesse(frag.heer))} Mann) mit — Eure Miliz bleibt daheim.</p>
        <div>
          <button class="btn-lg" onclick="diploWahl('atk')">⚔️ Angreifer unterstützen</button>
          <button class="btn-lg" onclick="diploWahl('def')">🛡️ Verteidiger unterstützen</button>
        </div>
        <div>
          ${aufWeg
            ? `<button class="btn-lg" onclick="diploWahl('frei')">🕊️ Neutral — Durchmarsch gewähren</button>
               <button class="btn-lg" onclick="diploWahl('sperr')">🚫 Neutral — Durchmarsch verweigern</button>`
            : `<button class="btn-lg" onclick="diploWahl('frei')">🕊️ Neutral bleiben</button>`}
        </div>
      </div>`;
  },

  kriegAbbruch(){
    const kr = G._kr;
    const sperrer = kr.weg.filter(i=>!["atk","frei"].includes(kr.wahl[i])).map(i=>G.spieler[i].name).join(", ");
    return `
      <h2>Feldzug abgebrochen</h2>
      <div class="card">
        <p class="red" style="font-size:16px">Kein Durchkommen! ${sperrer} verweigert Euren Truppen
        den Durchmarsch — das Heer kehrt unverrichteter Dinge heim.</p>
        <p class="muted" style="margin-top:8px">Die Gelegenheit dieses Jahres ist vertan.</p>
      </div>
      <button class="btn-primary btn-lg" onclick="zeige('bauen')">Weiter</button>`;
  },

  aufstellungA(){
    const kr = G._kr;
    const p = G.spieler[kr.a];
    const helferA = kr.fragen.filter(i=>kr.wahl[i]==="atk");
    const A = seiteBauen(kr.a, helferA, false);
    G._aufE = { inf:A.inf, kav:A.kav, art:A.art, miliz:A.miliz, auf:0 };
    G._aufFarbe = p.farbe; G._aufRechts = false;
    return SCREENS._aufstellung(p, G.spieler[kr.d],
      `Stellt Eure ${fmt(A.inf+A.kav+A.art+A.miliz)} Mann auf den fünf Abschnitten auf.
       Die Artillerie feuert aus der Tiefe, Kavallerie stürmt schneller vor.
       Der Verteidiger kennt Eure Aufstellung nicht — und Ihr nicht seine.`,
      "aufstellungAFertig()", "Aufstellung befehlen");
  },

  aufstellungD(){
    const kr = G._kr;
    const p = G.spieler[kr.d];
    const helferD = kr.fragen.filter(i=>kr.wahl[i]==="def");
    const D = seiteBauen(kr.d, helferD, true);
    G._aufE = { inf:D.inf, kav:D.kav, art:D.art, miliz:D.miliz, auf:D.aufgebot };
    G._aufFarbe = p.farbe; G._aufRechts = true;
    return SCREENS._aufstellung(p, G.spieler[kr.a],
      `Geheime Aufstellung! ${titelName(G.spieler[kr.a])} ${G.spieler[kr.a].name} rückt gegen
       Euch vor — der Angreifer möge wegsehen. Verteilt Eure ${fmt(laneGroesse(G._aufE))} Mann
       (samt Miliz und Volksaufgebot) auf die fünf Abschnitte.`,
      "aufstellungDFertig()", "Stellung beziehen — zur Schlacht!");
  },

  /* gemeinsames Aufstellungs-Formular */
  _aufstellung(p, gegner, text, fertigFn, knopf){
    const gel = (G._kr && G._kr.gelaende) || [];
    const zeilen = LANE_NAMEN.map((n,i)=>`
      <div class="sliderrow">
        <span>${n}${gel[i]&&gel[i].ico?` <span title="${gel[i].n}">${gel[i].ico}</span>`:""}</span>
        <input type="range" min="0" max="4" step="1" value="${G._aufW[i]}"
          oninput="aufstellungGewicht(${i}, this.value)">
        <span class="v" id="gw${i}">${G._aufW[i]}</span>
      </div>`).join("");
    const presets = AUFSTELLUNGEN.map((a,k)=>
      `<button class="btn-sm" onclick="aufstellungPreset(${k})">${a.n}</button>`).join("");
    setTimeout(()=>zeichneAufstellung("aufVorschau", G._aufE, G._aufW, G._aufFarbe, G._aufRechts), 30);
    return `
      <h2>🗡️ Aufstellung — ${titelName(p)} ${p.name} gegen ${titelName(gegner)} ${gegner.name}</h2>
      <div class="card"><p class="small">${text}</p>
      <p class="muted small" style="margin-top:6px">Erkundetes Gelände:
        ⛰️ Hügel schützen den Verteidiger · 🌊 Furten bremsen den Vormarsch · 🌲 Wald behindert Kavallerie und Artillerie.</p></div>
      <div class="grid g2">
        <div class="card">
          <h3>Gewichtung der Abschnitte</h3>
          ${zeilen}
          <div style="margin-top:6px">${presets}</div>
        </div>
        <div class="card">
          <h3>Vorschau Eurer Schlachtordnung</h3>
          <canvas id="aufVorschau" width="440" height="330" style="width:100%;border-radius:10px;border:1px solid var(--border)"></canvas>
          <p class="muted small">⚔️ Infanterie · große Punkte Kavallerie · blasse Punkte Miliz/Aufgebot · Quadrate Artillerie</p>
        </div>
      </div>
      <button class="btn-danger btn-lg" onclick="${fertigFn}">${knopf}</button>`;
  },

  schlacht(){
    const s = G._s, kr = G._kr;
    const ang = G.spieler[kr.a], ver = G.spieler[kr.d];
    const restA = sRest(s,"A"), restD = sRest(s,"D");
    const pctA = clamp(restA/s.startG.A*100,0,100);
    const pctD = clamp(restD/s.startG.D*100,0,100);
    const seite = (key, t, helfer, moral) => `
      <div class="armee ${s.tick>0 && !s.fertig ? 'shake':''}">
        <h4>${t}</h4>
        <div class="u"><span>⚔️ Infanterie</span><b>${fmt(sRestTyp(s,key,"inf"))}</b></div>
        <div class="u"><span>🐎 Kavallerie</span><b>${fmt(sRestTyp(s,key,"kav"))}</b></div>
        <div class="u"><span>💣 Artillerie</span><b>${fmt(sRestTyp(s,key,"art"))}</b></div>
        <div class="u"><span>🛡️ Miliz</span><b>${fmt(sRestTyp(s,key,"miliz"))}</b></div>
        ${s.start[key].auf?`<div class="u"><span>🔥 Volksaufgebot</span><b>${fmt(sRestTyp(s,key,"auf"))}</b></div>`:""}
        <div class="u muted small"><span>Moral</span><span>${Math.round(moral)} %</span></div>
        <div class="moral"><div style="width:${moral}%;background:${moral>60?'var(--green)':moral>32?'var(--gold)':'var(--red)'}"></div></div>
        ${helfer.length?`<p class="muted small" style="margin-top:6px">Verbündete: ${helfer.map(i=>G.spieler[i].name).join(", ")}</p>`:""}
      </div>`;
    return `
      <h2>⚔️ Schlacht um ${ver.name}s Land</h2>
      <span class="phasebadge">Gefecht ${Math.min(s.tick,s.maxTicks)}/${s.maxTicks}${s.regen?" · 🌧️ Regen — Artillerie geschwächt":""}</span>
      <canvas id="feld" width="900" height="380"></canvas>
      <div class="battlefield">
        <div>
          ${seite("A", `Angreifer: ${ang.name}`, s.helferA, s.moralA)}
          <div class="strbar a"><div style="width:${pctA}%"></div></div>
          <p class="muted small center">Truppenstärke ${Math.round(pctA)} %</p>
        </div>
        <div class="vs">⚔️</div>
        <div>
          ${seite("D", `Verteidiger: ${ver.name}`, s.helferD, s.moralD)}
          <div class="strbar d"><div style="width:${pctD}%"></div></div>
          <p class="muted small center">Truppenstärke ${Math.round(pctD)} %</p>
        </div>
      </div>
      <div class="card battlelog">${s.log.map(l=>`<p>${l}</p>`).join("")||'<p class="muted">Die Linien rücken vor …</p>'}</div>
      ${s.fertig
        ? `<div class="card" style="border-color:${s.sieger==='A'?'var(--green)':'var(--red)'}">
             <p class="${s.sieger==='A'?'green':'red'}" style="font-size:17px;font-weight:700">${s.ergebnis}</p>
             ${s.plünder?`<p class="small" style="margin-top:6px">🔥 ${s.plünder}</p>`:""}
             <table style="margin-top:10px">
               <tr><th></th><th class="r">Angreifer</th><th class="r">Verteidiger</th></tr>
               <tr><td>Ausgerückt</td><td class="r">${fmt(s.startG.A)}</td><td class="r">${fmt(s.startG.D)}</td></tr>
               <tr><td>Gefallen</td>
                   <td class="r red">${fmt(s.startG.A-restA)}</td>
                   <td class="r red">${fmt(s.startG.D-restD)}</td></tr>
             </table>
           </div>
           <button class="btn-primary btn-lg" onclick="zeige('bauen')">Weiter</button>
           <button class="btn-lg" onclick="replayStarten()">🎞️ Replay ansehen</button>`
        : `<button class="btn-lg" onclick="schlachtUeberspringen()">Schlacht überspringen ⏩</button>`}`;
  },

  bilanz(){
    const p = cur(), r = p.report;
    const evHtml = r.ereignisse.length
      ? r.ereignisse.map(e=>`<div class="event ${e.c}">${e.t}</div>`).join("") : "";
    const row = (lbl,val,cls="") => `<tr><td>${lbl}</td><td class="r ${cls}">${val}</td></tr>`;
    return `
      ${stepper("Bilanz")}
      <h2>Jahresbilanz Anno ${G.jahr}</h2>
      <canvas id="wetterBild" width="920" height="110" style="width:100%;border-radius:12px;border:1px solid var(--border);margin-bottom:10px"></canvas>
      ${evHtml}
      <div class="grid g2">
        <div class="card">
          <h3>Wirtschaft</h3>
          <table>
            ${row("Ernte ("+fmt(Math.min(p.pop*4,anbau(p)))+" ha bestellt)", "+"+fmt(r.ernte)+" Fuder", "delta-pos")}
            ${row("Kornspeicher jetzt", fmt(p.korn)+" Fuder")}
            ${row("Steuern & Wirtschaft", "+"+fmt(r.steuern)+" Taler", "delta-pos")}
            ${r.unterhalt?row("Heer-Unterhalt", "−"+fmt(r.unterhalt)+" Taler", "delta-neg"):""}
            ${r.gehaelter?row("Berater-Gehälter", "−"+fmt(r.gehaelter)+" Taler", "delta-neg"):""}
            ${row("Vermögen jetzt", fmt(p.geld)+" Taler", p.geld<0?"red":"")}
          </table>
        </div>
        <div class="card">
          <h3>Reich</h3>
          <table>
            ${row("Untertanen", fmt(p.pop))}
            ${row("Stimmung", p.stimmung+"/100")}
            ${row("Städte", staedte(p))}
            ${row("Heer", fmt(heerGroesse(p.heer))+" Mann")}
          </table>
        </div>
      </div>
      ${r.ueberzeit>0?`<div class="event bad">Ihr habt ${Math.round(r.ueberzeit)} Sekunden zu lange regiert — die Sorgen nagen an Eurer Gesundheit.</div>`:""}
      <button class="btn-primary btn-lg" onclick="nachBilanz()">Weiter</button>`;
  },

  befoerderung(){
    const p = cur();
    if(p.titel===8){ G.sieger = p; mpSync(); }
    setTimeout(()=>{ konfetti(p.titel===8?140:70); (p.titel===8?sKroenung:sFanfare)(); }, 150);
    return `
      <div class="hero" style="padding-top:34px">
        <p class="gold" style="font-size:17px;letter-spacing:2px">🎺 Trompeten erschallen!</p>
        <div style="margin:18px auto 6px;width:220px">
          <canvas id="portraitB" width="220" height="272" style="border-radius:14px;box-shadow:0 12px 44px rgba(0,0,0,.5)"></canvas>
        </div>
        <p class="muted small">${titelName(p)} ${p.name}, ${alterJahre(p)} Jahre — im neuen Ornat</p>
        <h1 style="font-size:30px;margin:14px 0">${p.name} wird zu${p.w?"r":"m"} <span class="gold">${titelName(p)}</span> erhoben!</h1>
        ${p.titel===8
          ? `<p class="green" style="font-size:16px">Die Kathedrale ist vollendet — das Reich hat einen neuen ${titelName(p)}!</p>
             <div style="margin-top:22px"><button class="btn-primary btn-lg" onclick="zeige('sieg')">Zur Krönung</button></div>`
          : `<div style="margin-top:22px"><button class="btn-primary btn-lg" onclick="naechsterSpieler()">Weiter</button></div>`}
      </div>`;
  },

  tod(){
    const p = cur();
    return `
      <div class="hero" style="padding-top:36px">
        <span class="crown">🕯️</span>
        <h1 class="red" style="font-size:28px">Die Glocken läuten …</h1>
        <div style="width:170px;margin:16px auto 6px;filter:grayscale(.8) brightness(.8)">
          <canvas id="portraitT" width="170" height="210" style="border-radius:12px"></canvas>
        </div>
        <p style="font-size:17px;margin:12px 0">${titelName(p)} ${p.name} ist Anno ${G.jahr}
          im Alter von ${alterJahre(p)} Jahren verstorben.</p>
        <p class="muted">Höchster Rang: ${titelName(p)} · ${fmt(p.land)} ha · ${fmt(p.pop)} Untertanen</p>
        <div style="margin-top:22px">
          ${G.opt && G.opt.dynastie
            ? `<button class="btn-primary btn-lg" onclick="erben(cur()); zeige('handoff')">👶 Erbfolge antreten</button>
               <p class="muted small" style="margin-top:8px">Der Erbstreit kostet 20 % des Vermögens, 8 % des Landes und eine Titelstufe.</p>`
            : ""}
          <button class="btn-lg" onclick="naechsterSpieler()">${G.opt && G.opt.dynastie ? "Die Linie endet hier" : "Weiter"}</button>
        </div>
      </div>`;
  },

  sieg(){
    const p = G.sieger;
    setTimeout(()=>{ konfetti(160); sKroenung(); }, 600);
    return `
      <div class="hero" style="padding-top:30px">
        <p class="gold zer z1" style="font-size:17px;letter-spacing:3px">DIE KRÖNUNG</p>
        <div class="zer z2" style="position:relative;width:240px;margin:14px auto 6px">
          <span class="krone-fall">👑</span>
          <canvas id="portraitK" width="240" height="296" style="border-radius:14px;box-shadow:0 14px 50px rgba(0,0,0,.55)"></canvas>
        </div>
        <h1 class="zer z3" style="font-size:34px;margin:14px 0">Heil ${p.w?"der Kaiserin":"dem Kaiser"} ${p.name}!</h1>
        <p class="zer z4" style="margin:10px 0">Anno ${G.jahr} · ${alterJahre(p)} Jahre · ${fmt(p.pop)} Untertanen · ${fmt(p.land)} ha · ${fmt(p.geld)} Taler</p>
        <div class="monu zer z4" style="margin:10px 0">${svgPalast(p.palast)}${svgDom(p.dom)}</div>
        <p class="muted zer z5">Vom einfachen ${p.w?"Fräulein":"Herrn"} zur Herrschaft über das Reich — das Spiel ist gewonnen.</p>
        <div class="zer z5" style="margin-top:22px"><button class="btn-primary btn-lg" onclick="zeige('ende')">Schlusswertung</button></div>
      </div>`;
  },

  welt(){

  zeige("handel");

function handelFertig(){

function nachZwischenbilanz(){
  const e = ereignisWuerfeln(cur());
  if(e){ G._ereignis = e; zeige("entscheidung"); }
  else zeige("steuern");
}
function handelKorn(dir){
  const p = cur();
  if(dir>0){
    const m = Math.floor(+$("#kkauf").value||0);
    const kosten = m*p.kornPreis;
    if(m<=0) return;
    if(kosten>p.geld){ $("#hmsg").textContent="Zu wenig Taler!"; return; }
    p.geld -= kosten; p.korn += m; sMuenze();
    G.marktDruck = (G.marktDruck||0) - m;
  } else {
    const m = clamp(Math.floor(+$("#kverk").value||0),0,p.korn);
    if(m<=0) return;
    const provision = p.haefen > 0 ? 0.95 : 0.9;   /* Häfen halbieren die Provision */
    p.korn -= m; p.geld += Math.round(m*p.kornPreis*provision); sMuenze();
    G.marktDruck = (G.marktDruck||0) + m;
    p.stat.kornErloes += Math.round(m*p.kornPreis*provision);
    if(p.kornPreis >= 300) erfolg("spekulant");
  }
  render();
}
function handelLand(dir){
  const p = cur();
  if(dir>0){
    const m = Math.floor(+$("#lkauf").value||0);
    const kosten = m*p.landPreis;
    if(m<=0) return;
    if(kosten>p.geld){ $("#hmsg").textContent="Zu wenig Taler!"; return; }
    p.geld -= kosten; p.land += m; sMuenze();
    if(p.land >= 25000) erfolg("land");
  } else {
    const m = clamp(Math.floor(+$("#lverk").value||0),0,freiLand(p));
    if(m<=0) return;
    p.land -= m; p.geld += Math.round(m*p.landPreis*0.9); sMuenze();
  }
  render();
}
function steuernSetzen(){
  const p = cur();
  p.zoll = +$("#zoll").value; p.einkSt = +$("#einkSt").value;
  p.mwSt = +$("#mwSt").value; p.justiz = +$("#justiz").value;
  zeige("bauen");
}
function karteKlick(ev){
  const p = cur();
  const c = document.getElementById("karte");
  if(!c) return;
  if(!G._bauModus){ G._karteGross = !G._karteGross; render(); return; }
  /* Klick-Position in Territoriumskoordinaten umrechnen (wie in zeichneKarte) */
  const rect = c.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * (c.width / rect.width);
  const y = (ev.clientY - rect.top) * (c.height / rect.height);
  const W = c.width, H = c.height;
  const cx = W/2, cy = H/2 + 8;
  const rr = territoriumsRadius(p.land) * (H/430);
  const dx = (x - cx) / (rr * 1.25), dy = (y - cy) / (rr * 0.75);
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist > 0.92){ toast("⚠️ Dieser Platz liegt außerhalb Eures Territoriums.", 3000); return; }
  const typ = G._bauModus === "markt" ? "m" : "k";
  const kosten = G._bauModus === "markt" ? KOSTEN.markt : KOSTEN.muehle;
  if(p.geld < kosten) { G._bauModus = null; render(); return; }
  p.geld -= kosten;
  if(typ==="m") p.maerkte++; else p.muehlen++;
  p.gebaeude.push({ t:typ, ang:Math.atan2(dy, dx), dist:clamp(dist, 0.08, 0.9) });
  p._neu = p.gebaeude.length - 1;
  p.stat.bauten++;
  if(staedte(p)>=1) erfolg("stadt");
  G._bauModus = null;
  sMuenze();
  render();
}
function platziereGebaeude(p, typ){
  p.gebaeude = p.gebaeude || [];
  p.gebaeude.push({ t:typ, ang:Math.random()*6.2832, dist:0.34 + Math.random()*0.58 });
  p._neu = p.gebaeude.length - 1;
}
function entferneGebaeude(p, typ){
  const idx = (p.gebaeude||[]).map((g,i)=>g.t===typ?i:-1).filter(i=>i>=0);
  if(idx.length) p.gebaeude.splice(idx[ri(0,idx.length-1)],1);
  p._neu = undefined;
}
function baue(was){
  const p = cur();
  const platz = (p.maerkte+p.muehlen) < bauplaetze(p);
  /* Markt & Mühle: erst wählen, dann auf die Karte klicken */
  if((was==="markt" || was==="muehle") && G.screen==="bauen" && !p.ki){
    const kosten = was==="markt" ? KOSTEN.markt : KOSTEN.muehle;
    if(p.geld < kosten || !platz) return;
    G._bauModus = (G._bauModus === was) ? null : was;
    if(G._bauModus) toast(`🏗️ Klickt auf die Karte, um den Bauplatz für ${was==="markt"?"den Markt":"die Mühle"} zu wählen.`, 3500);
    render();
    return;
  }
  if(was==="markt"  && p.geld>=KOSTEN.markt  && platz){ p.geld-=KOSTEN.markt; p.maerkte++; platziereGebaeude(p,"m"); }
  if(was==="muehle" && p.geld>=KOSTEN.muehle && platz){ p.geld-=KOSTEN.muehle; p.muehlen++; platziereGebaeude(p,"k"); }
  if(was==="palast" && p.palast<PALAST_TEILE && p.geld>=KOSTEN.palastTeil && p.land>=LAND.palast){ p.geld-=KOSTEN.palastTeil; p.palast++; p._neu="palast"; }
  if(was==="dom"    && p.dom<DOM_TEILE && p.geld>=KOSTEN.domTeil && p.land>=LAND.dom){ p.geld-=KOSTEN.domTeil; p.dom++; p._neu="dom"; }
  if(was==="hafen"  && (p.haefen||0)<2 && p.geld>=KOSTEN.hafen && p.land>=12000){ p.geld-=KOSTEN.hafen; p.haefen=(p.haefen||0)+1; p._neu="hafen"; }
  p.stat.bauten++;
  if(staedte(p)>=1) erfolg("stadt");
  if(p.palast>=PALAST_TEILE) erfolg("palast");
  if(p.dom>=DOM_TEILE) erfolg("dom");
  sMuenze();
  render();
}
function werbe(art, n){
  const p = cur();
  const kosten = KOSTEN[art]*n;
  if(p.geld < kosten) return;
  p.geld -= kosten; p.heer[art] += n; sMuenze();
  render();
}
function entlassen(){
  const p = cur();
  p.heer = {inf:0,kav:0,art:0};
  render();
}

/* Chronik als teilbares PNG rendern */
function chronikExport(){
  const eintraege = (G.geschichte||[]).slice(-40);
  const W = 840, H = 150 + eintraege.length*26;
  const c = document.createElement("canvas");
  c.width = W; c.height = H;
  const ctx = c.getContext("2d");
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#1a2233"); bg.addColorStop(1,"#0e1117");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = "#e0b458"; ctx.lineWidth = 3; ctx.strokeRect(8,8,W-16,H-16);
  ctx.fillStyle = "#e0b458"; ctx.font = "bold 30px Georgia, serif"; ctx.textAlign = "center";
  ctx.fillText("👑 KAISER — Chronik der Partie", W/2, 52);
  ctx.fillStyle = "#8b96a8"; ctx.font = "14px Georgia, serif";
  ctx.fillText(`1700–${G.jahr} · ${G.spieler.map(p=>p.name).join(" · ")}`, W/2, 78);
  ctx.strokeStyle = "#2a3446"; ctx.beginPath(); ctx.moveTo(40,94); ctx.lineTo(W-40,94); ctx.stroke();
  ctx.textAlign = "left"; ctx.font = "14px sans-serif";
  eintraege.forEach((e,i)=>{
    const y = 120 + i*26;
    ctx.fillStyle = "#e0b458"; ctx.fillText(String(e.j), 40, y);
    ctx.fillStyle = "#dbe2ee"; ctx.fillText(`${e.ico} ${e.t}`.substring(0,90), 92, y);
  });
  const a = document.createElement("a");
  a.href = c.toDataURL("image/png");
  a.download = `kaiser-chronik-${G.jahr}.png`;
  a.click();
}

/* ============================================================
   Online-Mehrspieler: WebSocket-Relay, Räume mit Code,
   rundenbasierte Zustands-Synchronisation
   ============================================================ */
const MP_STANDARD = (location.protocol.indexOf("http")===0 &&
  ["localhost","127.0.0.1"].includes(location.hostname))
  ? "ws://localhost:8081"
  : "wss://kaiser-mp.onrender.com";
let MP = null;

/* Verbindungsaufbau mit Aufweck-Ping und automatischen Wiederholungen:
   Gratis-Server schlafen bei Inaktivität und brauchen bis zu einer Minute. */
function mpVerbinden(url, beiOffen){
  const ziel = (url && url.trim()) || MP_STANDARD;
  try{
    if(ziel.indexOf("wss://") === 0)
      fetch(ziel.replace("wss://","https://"), { mode:"no-cors" }).catch(()=>{});
  }catch(e){}
  let versuch = 0;
  const WARTEN = [0, 7000, 15000, 30000];
  const naechster = () => {
    if(!MP || MP.abbruch) return;
    versuch++;
    if(versuch > 4){
      alertMsg("Keine Verbindung zum Spielserver. Prüft die Server-Adresse (Standard: " + MP_STANDARD + ") — oder versucht es in einer Minute erneut.");
      MP = null;
      return;
    }
    if(versuch > 1) toast(`🌐 Server wird geweckt — Versuch ${versuch}/4 …`, 6500);
    let offen = false;
    let ws;
    try{ ws = new WebSocket(ziel); }
    catch(e){ alertMsg("WebSocket nicht verfügbar — in dieser Umgebung ist Online-Spiel womöglich blockiert. Nutzt die Spiel-URL im Browser."); MP = null; return; }
    ws.onopen = () => { offen = true; if(MP){ MP.ws = ws; beiOffen(ws); toast("🌐 Mit dem Spielserver verbunden."); } };
    ws.onmessage = ev => { try{ mpNachricht(JSON.parse(ev.data)); }catch(e){} };
    ws.onerror = () => {};
    ws.onclose = () => {
      if(offen){ if(MP && MP.aktiv) alertMsg("Verbindung zum Spielserver verloren."); return; }
      setTimeout(naechster, WARTEN[Math.min(versuch, WARTEN.length-1)]);
    };
  };
  naechster();
}
function mpHost(){
  const url = $("#mpUrl") ? $("#mpUrl").value : "";
  const name = ($("#mpName").value.trim() || "Gastgeber");
  const pass = $("#mpPass") ? $("#mpPass").value.trim() : "";
  MP = { name, host:true, roster:[], code:null, id:null, aktiv:false };
  toast("🌐 Verbinde mit dem Spielserver …");
  mpVerbinden(url, ws => ws.send(JSON.stringify({t:"neu", name, pass})));
}
function mpBeitritt(){
  const url = $("#mpUrl") ? $("#mpUrl").value : "";
  const code = $("#mpCode").value.trim().toUpperCase();
  const name = ($("#mpName").value.trim() || "Gast");
  if(!code){ alertMsg("Bitte den Raum-Code eingeben."); return; }
  const pass = $("#mpPass") ? $("#mpPass").value.trim() : "";
  MP = { name, host:false, roster:[], code, id:null, aktiv:false };
  toast("🌐 Verbinde mit dem Spielserver …");
  mpVerbinden(url, ws => ws.send(JSON.stringify({t:"beitritt", code, name, pass})));
}
function mpVerlassen(){
  if(MP){ MP.abbruch = true; MP.aktiv = false; if(MP.ws){ try{ MP.ws.close(); }catch(e){} } }
  MP = null;
  G.spieler = [];
  zeige("title");
}
function mpNachricht(m){
  if(!MP) return;
  if(m.t === "raum"){ MP.code = m.code; MP.id = m.id; MP.roster = m.roster; zeige("lobby"); }
  else if(m.t === "roster"){ MP.roster = m.roster; if(G.screen === "lobby") render(); }
  else if(m.t === "fehler"){ alertMsg(m.text); }
  else if(m.t === "start"){ mpStartEmpfangen(m); }
  else if(m.t === "sync"){ mpSyncEmpfangen(m); }
  else if(m.t === "weg"){
    MP.getrennt = MP.getrennt || {};
    if(MP.zuordnung){
      for(const [idx, cid] of Object.entries(MP.zuordnung))
        if(cid === m.id && !G.spieler[+idx].ki) MP.getrennt[+idx] = true;
    }
    toast("⚠️ Ein Mitspieler hat die Verbindung verloren." + (MP.host?" Ihr könnt sein Reich der KI übergeben.":""));
    if(G.screen === "warten" || G.screen === "lobby") render();
  }
  else if(m.t === "rangliste"){
    G._weltrang = m.liste || [];
    if(G.screen === "weltrang") render();
  }
  else if(m.t === "chat"){
    MP.chat = (MP.chat || []).concat({ name: m.name, text: m.text }).slice(-30);
    if(G.screen === "lobby" || G.screen === "warten") render();
    else toast(`💬 <b>${m.name}:</b> ${m.text}`, 5000);
  }
}
/* Weltrangliste vom Server holen (eigene Kurzverbindung) */
function weltrangAuf(){
  G._vorRang = G.screen;
  G._weltrang = null;
  zeige("weltrang");
  if(MP && MP.ws && MP.ws.readyState === 1){
    try{ MP.ws.send(JSON.stringify({t:"rangliste"})); }catch(e){}
    return;
  }
  try{
    const url = ($("#mpUrl") && $("#mpUrl").value.trim()) || MP_STANDARD;
    if(url.indexOf("wss://") === 0) fetch(url.replace("wss://","https://"), {mode:"no-cors"}).catch(()=>{});
    const ws = new WebSocket(url);
    ws.onopen = () => ws.send(JSON.stringify({t:"rangliste"}));
    ws.onmessage = ev => {
      try{
        const m = JSON.parse(ev.data);
        if(m.t === "rangliste"){ G._weltrang = m.liste || []; if(G.screen==="weltrang") render(); ws.close(); }
      }catch(e){}
    };
    ws.onerror = () => { G._weltrang = "fehler"; if(G.screen==="weltrang") render(); };
  }catch(e){ G._weltrang = "fehler"; render(); }
}
function ergebnisMelden(){
  /* beste menschliche Leistung an die Weltrangliste melden (nur online) */
  if(!MP || !MP.ws || MP.ws.readyState !== 1 || !MP.host) return;
  for(const p of G.spieler){
    if(p.ki) continue;
    try{ MP.ws.send(JSON.stringify({t:"ergebnis", name:p.name, wappen:p.wappen, titel:p.titel, jahr:G.jahr, punkte:Math.round(score(p))})); }catch(e){}
  }
}
function chatSenden(){
  const feld = $("#chatText");
  if(!MP || !MP.ws || !feld) return;
  const text = feld.value.trim().substring(0, 200);
  if(!text) return;
  MP.chat = (MP.chat || []).concat({ name: MP.name, text }).slice(-30);
  try{ MP.ws.send(JSON.stringify({ t:"chat", name: MP.name, text })); }catch(e){}
  feld.value = "";
  render();
  setTimeout(()=>{ const f=$("#chatText"); if(f) f.focus(); }, 50);
}
function chatBox(){
  if(!MP) return "";
  const zeilen = (MP.chat || []).map(c=>`<p class="small" style="padding:1px 0"><b>${c.name}:</b> ${c.text}</p>`).join("");
  return `
    <div class="card" style="max-width:640px;margin:14px auto 0">
      <h3>💬 Feldpost</h3>
      <div class="battlelog" style="max-height:130px">${zeilen || '<p class="muted small">Noch keine Nachrichten.</p>'}</div>
      <div class="rowflex" style="margin-top:8px">
        <input type="text" id="chatText" maxlength="200" placeholder="Nachricht …" style="flex:1;min-width:120px"
          onkeydown="if(event.key==='Enter'){event.preventDefault();chatSenden();}">
        <button class="btn-sm" onclick="chatSenden()">Senden</button>
      </div>
    </div>`;
}
function kiUebernehmen(idx){
  const p = G.spieler[idx];
  if(!p || p.ki) return;
  p.ki = true;
  p.kiTyp = "baumeister";
  if(MP){ MP.zuordnung[idx] = null; if(MP.getrennt) delete MP.getrennt[idx]; }
  toast(`🤖 ${titelName(p)} ${p.name} wird fortan von der KI regiert.`);
  const pend = G._pend;
  if(pend && pend.fuer === idx){
    G._pend = null;
    if(pend.typ === "diplo"){
      const kr = G._kr;
      kr.wahl[kr.fragen[kr.frageIdx]] = kiDiploWahl(p, kr);
      kr.frageIdx++;
      diploWeiter();
    } else if(pend.typ === "aufD"){
      G._kr.aufD = kiAufstellung();
      if(mpMein(G._kr.a)) schlachtStarten(); else mpPend("schlacht", G._kr.a);
    } else if(pend.typ === "schlacht" || pend.typ === "schlachtplan" || pend.typ === "kriegAbbruch"){
      G.spieler[G._kr.a].kriegGefuehrt = true;
      naechsterSpieler();
    }
  } else if(G.aktiv === idx){
    G.aktiv = idx - 1;
    naechsterSpieler();
  } else { mpSync(); render(); }
}
function mpStart(){
  if(!MP || !MP.host) return;
  const m = { t:"start", tempo:+$("#mpTempo").value, diff:+$("#mpDiff").value,
              szenario: $("#mpSzenario").value,
              kis: clamp(+($("#mpKis").value||0), 0, 9-MP.roster.length), roster: MP.roster };
  MP.ws.send(JSON.stringify(m));
  mpStartEmpfangen(m);
}
function mpStartEmpfangen(m){
  MP.aktiv = true;
  MP.zuordnung = {};
  const namen=[], w=[], kis=[];
  m.roster.forEach((r,i)=>{ namen.push(r.name); w.push(i%2===1); kis.push(false); MP.zuordnung[i]=r.id; });
  for(let k=0;k<(m.kis||0);k++){
    const i = namen.length;
    namen.push(NAMEN[i%NAMEN.length]); w.push(i%2===1); kis.push(true); MP.zuordnung[i]=null;
  }
  starteSpiel(namen.length, namen, w, m.tempo, kis, {vergleich:true, tutorial:true, diff:m.diff, szenario:m.szenario||"frei"});
  G._pend = null;
  /* Intro läuft auf allen Geräten; der Weiter-Knopf routet dann über mpRoute() */
}
const mpMein = i => !MP || !MP.aktiv || (MP.zuordnung && MP.zuordnung[i] === MP.id);
let _mpTimer = null;
function mpSync(){
  if(!MP || !MP.aktiv || !G.spieler.length) return;
  clearTimeout(_mpTimer);
  _mpTimer = setTimeout(()=>{
    if(!MP || !MP.aktiv) return;
    try{
      MP.ws.send(JSON.stringify({
        t:"sync", state: spielstand(), kr: G._kr || null, pend: G._pend || null,
        hint: (G.screen==="ende"||G.screen==="sieg") ? G.screen : null,
        sieger: G.sieger ? G.spieler.indexOf(G.sieger) : -1,
        zuordnung: MP.zuordnung
      }));
    }catch(e){}
  }, 120);
}
function mpSyncEmpfangen(m){
  if(!MP) return;
  MP.aktiv = true;
  MP._anwenden = true;
  try{
    const d = JSON.parse(m.state);
    G.jahr = d.jahr; G.tempo = d.tempo; G.aktiv = d.aktiv; G.spieler = d.spieler;
    G.opt = d.opt || G.opt; G.diff = d.diff || 2; G.tipps = d.tipps || {};
    G.spieler.forEach((p,i)=>{
      if(!p.heer) p.heer = {inf:0,kav:0,art:0};
      if(!p.gebaeude) p.gebaeude = [];
      if(!p.chronik) p.chronik = [];
      if(!p.kornHist) p.kornHist = [];
    });
    if(m.zuordnung) MP.zuordnung = m.zuordnung;
    G._kr = m.kr || null;
    G._pend = m.pend || null;
    G.sieger = (m.sieger>=0) ? G.spieler[m.sieger] : null;
    if(m.hint){ zeige(m.hint); MP._anwenden = false; return; }
    mpRoute();
  }finally{ MP._anwenden = false; }
}
function mpRoute(){
  if(!MP || !MP.aktiv) return;
  const pend = G._pend;
  if(pend){
    if(mpMein(pend.fuer)){
      G._pend = null;
      if(pend.typ === "diplo") zeige("diplomatie");
      else if(pend.typ === "schlachtplan"){ G._aufW = [2,2,2,2,2]; zeige("aufstellungA"); }
      else if(pend.typ === "aufD"){ G._aufW = [2,2,2,2,2]; zeige("aufstellungD"); }
      else if(pend.typ === "schlacht") schlachtStarten();
      else if(pend.typ === "kriegAbbruch") zeige("kriegAbbruch");
    } else zeige("warten");
    return;
  }
  if(alleTot()){ zeige("ende"); return; }
  if(mpMein(G.aktiv)) zeige(cur().tot ? "tod" : "handoff");
  else zeige("warten");
}
function mpPend(typ, fuer){
  G._pend = { typ, fuer };
  mpSync();
  zeige("warten");
}

/* ---------- Gamepad: Steuerkreuz navigiert, A drückt ---------- */
setInterval(()=>{
  try{
    const gp = navigator.getGamepads && navigator.getGamepads()[0];
    if(!gp) return;
    const jetzt = performance.now();
    if(jetzt < (G._padCd||0)) return;
    const knoepfe = [...document.querySelectorAll("#screen button:not(:disabled)")];
    if(!knoepfe.length) return;
    const idx = knoepfe.indexOf(document.activeElement);
    const l = (gp.buttons[14]&&gp.buttons[14].pressed) || gp.axes[0] < -0.6;
    const r = (gp.buttons[15]&&gp.buttons[15].pressed) || gp.axes[0] >  0.6;
    const o = (gp.buttons[12]&&gp.buttons[12].pressed) || gp.axes[1] < -0.6;
    const u = (gp.buttons[13]&&gp.buttons[13].pressed) || gp.axes[1] >  0.6;
    if(r || u){ knoepfe[(idx+1+knoepfe.length)%knoepfe.length].focus(); G._padCd = jetzt+220; }
    else if(l || o){ knoepfe[(idx-1+knoepfe.length)%knoepfe.length].focus(); G._padCd = jetzt+220; }
    else if(gp.buttons[0] && gp.buttons[0].pressed){
      const ziel = knoepfe.includes(document.activeElement)
        ? document.activeElement : $("#screen .btn-primary");
      if(ziel && !ziel.disabled){ ziel.click(); G._padCd = jetzt+380; }
    }
  }catch(e){}
}, 60);

/* ---------- Tastatur: Enter = Hauptaktion ---------- */
document.addEventListener("keydown", e => {
  if(e.key !== "Enter") return;
  if(["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName) &&
     document.activeElement.type === "text") return;
  const b = $("#screen .btn-primary");
  if(b && !b.disabled){ e.preventDefault(); b.click(); }
});

/* ---------- Animations-Loop: belebt Karten, Titelbild und Schlachtfeld ---------- */
let _animLast = 0;
function animLoop(t){
  requestAnimationFrame(animLoop);
  if(t - _animLast < 40) return;   /* ~25 fps genügen */
  _animLast = t;
  if(document.hidden) return;
  if(G.screen === "title")        zeichneTitel(t);
  else if(G.screen === "bauen")   zeichneKarte(cur(), "karte", t);
  else if(G.screen === "status")  zeichneKarte(cur(), "karteS", t);
  else if(G.screen === "schlacht"){ if(!(G._s && G._s.replayAktiv)) zeichneFeld(t); }
  else if(G.screen === "welt")    zeichneWelt(t);
  else if(G.screen === "bilanz")  zeichneWetter(t);
}
requestAnimationFrame(animLoop);

/* PWA: Service Worker registrieren (nur wenn über HTTP(S) ausgeliefert) */
try{
  if("serviceWorker" in navigator && location.protocol.indexOf("http")===0){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
}catch(e){}

try{ $("#lautMusik").value = LAUT.musik; $("#lautFx").value = LAUT.fx; }catch(e){}
render();
</script>
