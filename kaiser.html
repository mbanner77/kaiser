/* ---------- Einheiten-Sprites (Schlachtfeld & Aufstellungs-Vorschau) ---------- */
function malSoldat(ctx, x, y, farbe, richt, pike=true){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineWidth = 1.4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(x, y-4.5, 1.7, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x, y-2.8); ctx.lineTo(x, y+1.6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y+1.6); ctx.lineTo(x-1.8, y+5);
  ctx.moveTo(x, y+1.6); ctx.lineTo(x+1.8, y+5); ctx.stroke();
  if(pike){ ctx.lineWidth = 1.1; ctx.beginPath(); ctx.moveTo(x+richt*2, y+2); ctx.lineTo(x+richt*5, y-8); ctx.stroke(); }
}
function malReiter(ctx, x, y, farbe, richt){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineWidth = 1.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.ellipse(x, y+1, 5.2, 2.7, 0, 0, 7); ctx.fill();          /* Pferdeleib */
  ctx.beginPath(); ctx.moveTo(x+richt*4, y);                                     /* Hals & Kopf */
  ctx.lineTo(x+richt*6.6, y-3.6); ctx.lineTo(x+richt*8.4, y-2.8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-3, y+3); ctx.lineTo(x-3.4, y+6.4);               /* Beine */
  ctx.moveTo(x+3, y+3); ctx.lineTo(x+3.4, y+6.4); ctx.stroke();
  ctx.beginPath(); ctx.arc(x-richt*0.6, y-5, 1.6, 0, 7); ctx.fill();             /* Reiter */
  ctx.beginPath(); ctx.moveTo(x-richt*0.6, y-3.4); ctx.lineTo(x-richt*0.6, y-0.5); ctx.stroke();
  ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.moveTo(x+richt*1, y-2.5); ctx.lineTo(x+richt*7, y-7); ctx.stroke(); /* Lanze */
}
function malKanone(ctx, x, y, farbe, richt){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineCap = "round";
  ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(x-richt*1.5, y+1.5); ctx.lineTo(x+richt*6.5, y-3); ctx.stroke(); /* Rohr */
  ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.arc(x, y+3.4, 3.1, 0, 7); ctx.stroke();                    /* Rad */
  ctx.beginPath(); ctx.moveTo(x, y+3.4); ctx.lineTo(x-richt*5.5, y+6.5); ctx.stroke(); /* Lafette */
}
function malAufgebot(ctx, x, y, farbe, richt){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineWidth = 1.3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(x, y-4, 1.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x, y-2.5); ctx.lineTo(x, y+1.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y+1.5); ctx.lineTo(x-1.6, y+4.6);
  ctx.moveTo(x, y+1.5); ctx.lineTo(x+1.6, y+4.6); ctx.stroke();
  /* Heugabel */
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x+richt*2, y+2.5); ctx.lineTo(x+richt*3.6, y-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+richt*2.6, y-6.5); ctx.lineTo(x+richt*4.6, y-5.5); ctx.stroke();
}
/* Ein Trupp Sprites eines Typs in Reihen zeichnen; gibt die Blocktiefe zurück */
function malTrupp(ctx, typ, anzahl, maxSprites, front, richt, y0, laneH, farbe){
  if(anzahl <= 0) return 0;
  const sprites = clamp(Math.ceil(anzahl/Math.max(1,Math.round(anzahl/maxSprites))), 1, maxSprites);
  const abst = typ==="kav" ? 13 : typ==="art" ? 13 : 7.5;
  const reihenH = typ==="kav" ? 14 : 11;
  const reihen = Math.max(1, Math.floor((laneH-12)/reihenH));
  let tiefe = 0;
  for(let i=0;i<sprites;i++){
    const reihe = i % reihen, spalte = Math.floor(i/reihen);
    const x = front - richt*(spalte*abst);
    const y = y0 + 8 + reihe*reihenH;
    if(typ==="inf") malSoldat(ctx, x, y, farbe, richt, true);
    else if(typ==="miliz") malSoldat(ctx, x, y, farbe, richt, false);
    else if(typ==="auf") malAufgebot(ctx, x, y, farbe, richt);
    else if(typ==="kav") malReiter(ctx, x, y, farbe, richt);
    else malKanone(ctx, x, y, farbe, richt);
    tiefe = Math.max(tiefe, spalte*abst + abst);
  }
  return tiefe;
}

/* Schlachtfeld-Canvas: Truppen als Formationen, Partikel an der Front */
function zeichneFeld(t=0){
  const c = $("#feld"), s = G._s;
  if(!c || !s || !s.lanes) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  /* Gelände */
  const brng = mulberry(777);
  ctx.fillStyle = "rgba(255,255,255,.03)";
  for(let h=0;h<4;h++){
    const hx = brng()*W, hw = 90+brng()*160;
    ctx.beginPath(); ctx.ellipse(hx, H*0.24, hw, 14+brng()*8, 0, Math.PI, 0); ctx.fill();
  }
  for(let b=0;b<6;b++) malBaum(ctx, brng()*W, H*(0.17+brng()*0.06), 4+brng()*3);
  /* Abschnittslinien */
  const oben = H*0.27, laneH = (H-oben-10)/LANES;
  ctx.strokeStyle = "rgba(255,255,255,.05)";
  for(let i=0;i<=LANES;i++){
    ctx.beginPath(); ctx.moveTo(0,oben+i*laneH); ctx.lineTo(W,oben+i*laneH); ctx.stroke();
  }
  ctx.font = "10px sans-serif"; ctx.textAlign = "left"; ctx.fillStyle = "rgba(219,226,238,.4)";
  for(let i=0;i<LANES;i++){
    const gel = (s.gelaende && s.gelaende[i]) || GELAENDE[0];
    ctx.fillText(`${LANE_NAMEN[i]}${gel.ico?" "+gel.ico:""}`, 8, oben+i*laneH+12);
  }
  /* Gelände in der Feldmitte einzeichnen */
  (s.gelaende||[]).forEach((gel,i)=>{
    const ym = oben + i*laneH + laneH/2;
    if(gel.k==="huegel"){
      ctx.fillStyle = "rgba(120,130,110,.28)";
      ctx.beginPath(); ctx.ellipse(W*0.62, ym+laneH*0.28, 60, 13, 0, Math.PI, 0); ctx.fill();
      ctx.beginPath(); ctx.ellipse(W*0.55, ym+laneH*0.32, 40, 9, 0, Math.PI, 0); ctx.fill();
    } else if(gel.k==="furt"){
      ctx.fillStyle = "rgba(80,140,180,.30)";
      ctx.fillRect(W*0.47, oben+i*laneH+2, 26, laneH-4);
      ctx.strokeStyle = "rgba(180,220,250,.35)"; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(W*0.5, oben+i*laneH+4); ctx.lineTo(W*0.5, oben+(i+1)*laneH-4); ctx.stroke();
    } else if(gel.k==="wald"){
      for(let b=0;b<4;b++) malBaum(ctx, W*0.5 + (b-1.5)*16, ym + laneH*0.3, 4.5);
    }
  });
  /* Schlachtwetter: Regen */
  if(s.regen){
    ctx.strokeStyle = "rgba(170,200,230,.28)"; ctx.lineWidth = 1;
    for(let i=0;i<34;i++){
      const seed = ((i*61)%97)/97;
      const rx2 = (seed*W + t/(2.5+seed)) % W;
      const ry2 = (t/(3+seed*2) + i*41) % H;
      ctx.beginPath(); ctx.moveTo(rx2, ry2); ctx.lineTo(rx2-2.5, ry2+9); ctx.stroke();
    }
  }

  const fA = G._kr ? G.spieler[G._kr.a].farbe : "#5fb8d4";
  const fD = G._kr ? G.spieler[G._kr.d].farbe : "#d9973f";
  const basisA = W*0.13, basisD = W*0.87, spann = W*0.34;
  const skala = Math.max(1, Math.ceil((s.startG.A+s.startG.D)/560));

  /* Truppen als Einheiten-Sprites je Abschnitt */
  s.lanes.forEach((lane,i)=>{
    const y0 = oben + i*laneH + 2;
    const frontA = basisA + (100-lane.dist)/100*spann;
    const frontD = basisD - (100-lane.dist)/100*spann;
    const malSeite2 = (u, farbe, front, richt) => {
      let x = front;
      x -= richt * malTrupp(ctx, "inf",   u.inf,   10, x, richt, y0, laneH, farbe);
      x -= richt * malTrupp(ctx, "miliz", u.miliz,  7, x, richt, y0, laneH, farbe+"99");
      x -= richt * malTrupp(ctx, "auf",   u.auf,    5, x, richt, y0, laneH, farbe+"77");
      malTrupp(ctx, "kav", u.kav, 5, x, richt, y0, laneH, farbe);
      /* Artillerie an der Basis */
      malTrupp(ctx, "art", u.art, 3, richt>0 ? basisA-34 : basisD+34, richt, y0, laneH, farbe);
    };
    if(laneGroesse(lane.A)>0) malSeite2(lane.A, fA, frontA, 1);
    if(laneGroesse(lane.D)>0) malSeite2(lane.D, fD, frontD, -1);
    /* Truppenzahlen an den Rändern */
    ctx.font = "600 11px sans-serif";
    ctx.fillStyle = fA; ctx.textAlign = "left";
    ctx.fillText(fmt(laneGroesse(lane.A)), 8, y0 + laneH - 8);
    ctx.fillStyle = fD; ctx.textAlign = "right";
    ctx.fillText(fmt(laneGroesse(lane.D)), W-8, y0 + laneH - 8);
    if(laneGroesse(lane.A)===0 && laneGroesse(lane.D)===0){
      ctx.fillStyle = "rgba(219,226,238,.18)"; ctx.font = "11px sans-serif"; ctx.textAlign="center";
      ctx.fillText("— verwaist —", W/2, y0+laneH/2);
    } else if(laneGroesse(lane.D)===0 && laneGroesse(lane.A)>0){
      ctx.fillStyle = "rgba(224,180,88,.5)"; ctx.font = "600 10px sans-serif"; ctx.textAlign="center";
      ctx.fillText("⚡ Durchbruch", W*0.72, y0+12);
    }
  });

  /* Feldbanner */
  const banner = (bx, farbe, ph) => {
    ctx.strokeStyle = "#5a4a30"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(bx, oben-4); ctx.lineTo(bx, oben-34); ctx.stroke();
    ctx.fillStyle = farbe;
    const wf = Math.sin(t/240 + ph)*3;
    ctx.beginPath(); ctx.moveTo(bx, oben-34);
    ctx.quadraticCurveTo(bx+10, oben-32+wf, bx+20, oben-29+wf);
    ctx.quadraticCurveTo(bx+10, oben-26+wf*0.5, bx, oben-22);
    ctx.closePath(); ctx.fill();
  };
  banner(W*0.05, fA, 0); banner(W*0.95-20, fD, 2);

  /* Partikel: Kanonenkugeln (Flugbahn), Explosionen, Nahkampfstaub */
  const jetzt = performance.now();
  for(const pk of (s.partikel||[])){
    const alter = jetzt - pk.born;
    if(alter < 0) continue;
    if(pk.typ==="kugel" && alter < 900){
      const q = alter/900;
      /* Mündungsfeuer beim Abschuss */
      if(q < 0.14){
        const mx = pk.von==="A" ? basisA-16 : basisD+16;
        const my = oben + pk.lane*laneH + laneH/2;
        ctx.fillStyle = `rgba(255,225,140,${0.9*(1-q/0.14)})`;
        ctx.beginPath(); ctx.arc(mx, my, 5+q*30, 0, 7); ctx.fill();
      }
      const lane = s.lanes[pk.lane];
      const y0 = oben + pk.lane*laneH + laneH/2;
      const dist = lane ? lane.dist : 50;
      const zielA = basisA + (100-dist)/100*spann, zielD = basisD - (100-dist)/100*spann;
      const von = pk.von==="A" ? basisA-20 : basisD+20;
      const nach = pk.von==="A" ? zielD : zielA;
      const x = von + (nach-von)*q;
      const y = y0 - Math.sin(q*Math.PI)*laneH*1.4;
      ctx.fillStyle = "#20242c";
      ctx.beginPath(); ctx.arc(x, y, 2.6, 0, 7); ctx.fill();
      if(q>0.93){
        ctx.fillStyle = "rgba(255,220,130,.8)";
        ctx.beginPath(); ctx.arc(nach, y0, 6, 0, 7); ctx.fill();
      }
    } else if(pk.typ==="boom" && alter < 750){
      const q = alter/750, r = 3 + q*11;
      const x = pk.rx*W, y = pk.ry*H;
      const grad = ctx.createRadialGradient(x,y,0,x,y,r);
      grad.addColorStop(0,`rgba(255,230,140,${0.95*(1-q)})`);
      grad.addColorStop(0.5,`rgba(230,120,60,${0.7*(1-q)})`);
      grad.addColorStop(1,"rgba(230,120,60,0)");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
    } else if(pk.typ==="gefallen" && alter < 4200){
      const q = alter/4200;
      const lane = s.lanes[pk.lane];
      const y0 = oben + pk.lane*laneH + laneH*0.5;
      const xm = basisA + (100-(lane?lane.dist:0))/100*spann + (pk.seite==="A"?-14:14) + pk.off*W;
      ctx.strokeStyle = `rgba(150,150,158,${0.5*(1-q)})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(xm-4, y0+6); ctx.lineTo(xm+4, y0+6);
      ctx.moveTo(xm, y0+2); ctx.lineTo(xm, y0+9); ctx.stroke();
    } else if(pk.typ==="staub" && alter < 1300){
      const q = alter/1300;
      const lane = s.lanes[pk.lane];
      const y0 = oben + pk.lane*laneH + laneH/2;
      const xm = basisA + (100-(lane?lane.dist:0))/100*spann + 8;
      ctx.fillStyle = `rgba(170,160,140,${0.25*(1-q)})`;
      for(let k=0;k<3;k++){
        ctx.beginPath(); ctx.arc(xm+rf(-10,10), y0 - q*16 + rf(-6,6), 5+q*10, 0, 7); ctx.fill();
      }
    }
  }
  if(s.partikel) s.partikel = s.partikel.filter(pk => jetzt - pk.born < (pk.typ==="gefallen" ? 4200 : 1900));
  /* Weisse Flagge */
  if(s.fertig && !s.replayAktiv){
    ctx.font = "22px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("🏳️", s.sieger==="A" ? W*0.8 : W*0.2, H*0.16);
  }
  if(s.replayAktiv){
    ctx.fillStyle = "rgba(13,17,23,.72)"; ctx.fillRect(10, 10, 158, 24);
    ctx.fillStyle = "#e0b458"; ctx.font = "600 13px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("🎞️ Zeitraffer läuft …", 18, 27);
  }
}
/* Vorschau der eigenen Aufstellung (Platzierungs-Bildschirm) */
function zeichneAufstellung(cid, einheiten, gewichte, farbe, rechts){
  const c = document.getElementById(cid);
  if(!c) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = "#1c2b1e"; ctx.fillRect(0,0,W,H);
  const laneH = (H-12)/LANES;
  const lanes = verteileEinheiten(einheiten, gewichte);
  ctx.strokeStyle = "rgba(255,255,255,.06)";
  for(let i=0;i<=LANES;i++){ ctx.beginPath(); ctx.moveTo(0,6+i*laneH); ctx.lineTo(W,6+i*laneH); ctx.stroke(); }
  const richt = rechts ? -1 : 1;
  const basis = rechts ? W-70 : 70;
  lanes.forEach((u,i)=>{
    const y0 = 6 + i*laneH;
    let x = basis;
    x -= richt * malTrupp(ctx, "inf",   u.inf,   8, x, richt, y0, laneH, farbe);
    x -= richt * malTrupp(ctx, "miliz", u.miliz, 6, x, richt, y0, laneH, farbe+"99");
    x -= richt * malTrupp(ctx, "auf",   u.auf,   4, x, richt, y0, laneH, farbe+"77");
    malTrupp(ctx, "kav", u.kav, 4, x, richt, y0, laneH, farbe);
    malTrupp(ctx, "art", u.art, 2, rechts ? W-16 : 16, richt, y0, laneH, farbe);
    ctx.fillStyle = "rgba(219,226,238,.75)"; ctx.font = "600 11px sans-serif";
    ctx.textAlign = rechts ? "left" : "right";
    ctx.fillText(`${LANE_NAMEN[i]} · ${fmt(laneGroesse(u))}`, rechts ? 6 : W-6, y0+laneH-6);
  });
}

/* ---------- Gesamtkarte/* ---------- Gesamtkarte: alle Reiche im Nachbarschaftskreis ---------- */
function zeichneWelt(t=0){
  const c = document.getElementById("welt");
  if(!c) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = "#111b26"; ctx.fillRect(0,0,W,H);
  const wr = mulberry(999);
  ctx.fillStyle = "rgba(46,70,56,.16)";
  for(let i=0;i<30;i++){ ctx.beginPath(); ctx.arc(wr()*W, wr()*H, wr()*30+8, 0, 7); ctx.fill(); }
  const n = G.spieler.length;
  const cx = W/2, cy = H/2 + 4, ex = W*0.36, ey = H*0.32;
  const pos = G.spieler.map((_,i)=>{
    const a = -Math.PI/2 + i/n*6.2832;
    return [cx + Math.cos(a)*ex*(n>1?1:0), cy + Math.sin(a)*ey*(n>1?1:0)];
  });
  /* Handelswege zwischen lebenden Nachbarn */
  const leb = lebende().map(x=>x.i);
  if(leb.length > 1){
    ctx.strokeStyle = "rgba(209,187,138,.25)"; ctx.lineWidth = 2; ctx.setLineDash([5,7]);
    const paare = leb.length===2 ? [[leb[0],leb[1]]] : leb.map((a,k)=>[a, leb[(k+1)%leb.length]]);
    for(const [a,b] of paare){
      ctx.beginPath(); ctx.moveTo(pos[a][0], pos[a][1]);
      ctx.quadraticCurveTo(cx, cy, pos[b][0], pos[b][1]); ctx.stroke();
    }
    ctx.setLineDash([]);
  }
  /* Reiche */
  G.spieler.forEach((p,i)=>{
    const [px,py] = pos[i];
    const rrW = 24 + 34*Math.sqrt(Math.min(p.land,50000)/50000);
    const rngB = mulberry(i*97+5);
    ctx.save();
    if(p.tot) ctx.globalAlpha = 0.45;
    const bl = [];
    for(let k=0;k<10;k++){
      const a = k/10*6.2832;
      bl.push([px+Math.cos(a)*rrW*(0.8+rngB()*0.35)*1.25, py+Math.sin(a)*rrW*(0.8+rngB()*0.35)*0.8]);
    }
    ctx.beginPath();
    ctx.moveTo((bl[0][0]+bl[9][0])/2,(bl[0][1]+bl[9][1])/2);
    for(let k=0;k<10;k++){
      const nx = bl[(k+1)%10];
      ctx.quadraticCurveTo(bl[k][0], bl[k][1], (bl[k][0]+nx[0])/2, (bl[k][1]+nx[1])/2);
    }
    ctx.closePath();
    ctx.fillStyle = p.tot ? "#39404a" : saison().g2;
    ctx.fill();
    ctx.strokeStyle = p.farbe; ctx.lineWidth = 2; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
    if(i===G.aktiv && !p.tot){
      ctx.strokeStyle = "rgba(224,180,88,"+(0.55+Math.sin(t/300)*0.3)+")"; ctx.lineWidth = 3; ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(px, py, rrW*1.35, 0, 7); ctx.stroke();
    }
    ctx.font = `${Math.round(rrW*0.62)}px sans-serif`; ctx.textAlign = "center";
    ctx.fillText(p.wappen, px, py + rrW*0.2);
    ctx.font = "600 13px sans-serif"; ctx.fillStyle = "#dbe2ee";
    ctx.fillText(`${titelName(p)} ${p.name}${p.tot?" †":""}`, px, py + rrW*0.85 + 16);
    ctx.font = "11px sans-serif"; ctx.fillStyle = "#8b96a8";
    ctx.fillText(`${fmt(p.land)} ha · ${fmt(p.pop)} Einw.`, px, py + rrW*0.85 + 30);
    ctx.restore();
  });
  ctx.fillStyle = "rgba(13,17,23,.78)";
  ctx.fillRect(10, H-32, 250, 24);
  ctx.strokeStyle = "#2a3446"; ctx.strokeRect(10, H-32, 250, 24);
  ctx.fillStyle = "#dbe2ee"; ctx.font = "600 12px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(`Die bekannte Welt · Anno ${G.jahr} · ${saison().n}`, 18, H-15);
}
/* Animierte Wetterszene für die Jahresbilanz */
function zeichneWetter(t=0){
  const c = document.getElementById("wetterBild");
  const p = cur();
  if(!c || !p || !p.report) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  const f = p.report.wetter.f;
  const art = f<=0.6 ? "duerre" : f<=0.85 ? "regen" : f<1.12 ? "wechsel" : f<1.3 ? "gut" : "pracht";
  ctx.clearRect(0,0,W,H);
  const himmel = ctx.createLinearGradient(0,0,0,H);
  if(art==="duerre"){ himmel.addColorStop(0,"#7a5c30"); himmel.addColorStop(1,"#8a6a38"); }
  else if(art==="regen"){ himmel.addColorStop(0,"#28313f"); himmel.addColorStop(1,"#39434f"); }
  else if(art==="wechsel"){ himmel.addColorStop(0,"#3a4456"); himmel.addColorStop(1,"#55607a"); }
  else { himmel.addColorStop(0,"#3d4a68"); himmel.addColorStop(1,"#7a6a48"); }
  ctx.fillStyle = himmel; ctx.fillRect(0,0,W,H);
  /* Hügelkamm */
  ctx.fillStyle = art==="duerre" ? "#5c4a26" : "#22301f";
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.quadraticCurveTo(W*0.3, H-26, W*0.55, H-14);
  ctx.quadraticCurveTo(W*0.8, H-4, W, H-18);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  if(art==="duerre"){
    /* gleißende Sonne mit Hitzeflimmern */
    const sx = W*0.78, sy = H*0.35;
    const grad = ctx.createRadialGradient(sx,sy,2,sx,sy,34);
    grad.addColorStop(0,"#fff0c0"); grad.addColorStop(0.6,"#e8c05a"); grad.addColorStop(1,"rgba(232,192,90,0)");
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(sx,sy,34,0,7); ctx.fill();
    ctx.strokeStyle = "rgba(255,240,200,.25)"; ctx.lineWidth = 1.5;
    for(let i=0;i<8;i++){
      const x0 = W*0.08 + i*W*0.11;
      ctx.beginPath();
      for(let y=H-16; y>H*0.45; y-=6)
        ctx.lineTo(x0 + Math.sin(y/9 + t/160 + i)*3.5, y);
      ctx.stroke();
    }
  } else if(art==="regen" || art==="wechsel"){
    /* Wolkenbänke */
    ctx.fillStyle = "rgba(210,214,224,.16)";
    for(let i=0;i<5;i++){
      const wx = ((t/(60+i*18) + i*220) % (W+240)) - 120;
      for(let b=0;b<4;b++){ ctx.beginPath(); ctx.arc(wx+b*30, 22+i*7+(b%2)*6, 18+(b%3)*7, 0, 7); ctx.fill(); }
    }
    if(art==="regen"){
      ctx.strokeStyle = "rgba(170,200,230,.45)"; ctx.lineWidth = 1.3;
      for(let i=0;i<46;i++){
        const seed = ((i*61)%97)/97;
        const rx2 = (seed*W + t/(2.2+seed)) % W;
        const ry2 = (t/(3+seed*2) + i*37) % H;
        ctx.beginPath(); ctx.moveTo(rx2, ry2); ctx.lineTo(rx2-3, ry2+11); ctx.stroke();
      }
      /* Blitz alle paar Sekunden */
      const blitzPhase = (t % 4200);
      if(blitzPhase < 160){
        ctx.fillStyle = `rgba(255,255,240,${0.35*(1-blitzPhase/160)})`;
        ctx.fillRect(0,0,W,H);
        const bx = W*0.3 + (Math.floor(t/4200)%3)*W*0.2;
        ctx.strokeStyle = "#fff8d0"; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(bx, 6);
        ctx.lineTo(bx-8, H*0.35); ctx.lineTo(bx+4, H*0.4); ctx.lineTo(bx-6, H*0.75);
        ctx.stroke();
      }
    }
  } else {
    /* goldene Strahlen und Sonne */
    const sx = W*0.72, sy = H*0.4;
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(t/9000);
    ctx.fillStyle = art==="pracht" ? "rgba(255,220,120,.10)" : "rgba(230,205,140,.07)";
    for(let i=0;i<10;i++){ ctx.rotate(Math.PI/5); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(190,-18); ctx.lineTo(190,18); ctx.closePath(); ctx.fill(); }
    ctx.restore();
    const grad = ctx.createRadialGradient(sx,sy,3,sx,sy,30);
    grad.addColorStop(0,"#fff3cf"); grad.addColorStop(0.6,"#e0b458"); grad.addColorStop(1,"rgba(224,180,88,0)");
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(sx,sy,30,0,7); ctx.fill();
    if(art==="pracht"){
      ctx.strokeStyle = "rgba(200,205,220,.5)"; ctx.lineWidth = 1.5;
      for(let i=0;i<2;i++){
        const vx = ((t/(26+i*9) + i*300) % (W+60)) - 30;
        const vy = 26 + i*16 + Math.sin(t/400+i)*5;
        ctx.beginPath(); ctx.moveTo(vx-5,vy); ctx.quadraticCurveTo(vx-1.5,vy-3.5,vx,vy);
        ctx.quadraticCurveTo(vx+1.5,vy-3.5,vx+5,vy); ctx.stroke();
      }
    }
  }
  /* Textzeile */
  ctx.fillStyle = "rgba(13,17,23,.72)"; ctx.fillRect(10, H-28, 300, 20);
  ctx.fillStyle = "#dbe2ee"; ctx.font = "600 12px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(`${p.report.wetter.ico} ${p.report.wetter.t}`, 16, H-14);
}

/* ---------- Einheiten-Sprites (Schlachtfeld & Aufstellungs-Vorschau) ---------- */
function malSoldat(ctx, x, y, farbe, richt, pike=true){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineWidth = 1.4; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(x, y-4.5, 1.7, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x, y-2.8); ctx.lineTo(x, y+1.6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y+1.6); ctx.lineTo(x-1.8, y+5);
  ctx.moveTo(x, y+1.6); ctx.lineTo(x+1.8, y+5); ctx.stroke();
  if(pike){ ctx.lineWidth = 1.1; ctx.beginPath(); ctx.moveTo(x+richt*2, y+2); ctx.lineTo(x+richt*5, y-8); ctx.stroke(); }
}
function malReiter(ctx, x, y, farbe, richt){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineWidth = 1.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.ellipse(x, y+1, 5.2, 2.7, 0, 0, 7); ctx.fill();          /* Pferdeleib */
  ctx.beginPath(); ctx.moveTo(x+richt*4, y);                                     /* Hals & Kopf */
  ctx.lineTo(x+richt*6.6, y-3.6); ctx.lineTo(x+richt*8.4, y-2.8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-3, y+3); ctx.lineTo(x-3.4, y+6.4);               /* Beine */
  ctx.moveTo(x+3, y+3); ctx.lineTo(x+3.4, y+6.4); ctx.stroke();
  ctx.beginPath(); ctx.arc(x-richt*0.6, y-5, 1.6, 0, 7); ctx.fill();             /* Reiter */
  ctx.beginPath(); ctx.moveTo(x-richt*0.6, y-3.4); ctx.lineTo(x-richt*0.6, y-0.5); ctx.stroke();
  ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.moveTo(x+richt*1, y-2.5); ctx.lineTo(x+richt*7, y-7); ctx.stroke(); /* Lanze */
}
function malKanone(ctx, x, y, farbe, richt){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineCap = "round";
  ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(x-richt*1.5, y+1.5); ctx.lineTo(x+richt*6.5, y-3); ctx.stroke(); /* Rohr */
  ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.arc(x, y+3.4, 3.1, 0, 7); ctx.stroke();                    /* Rad */
  ctx.beginPath(); ctx.moveTo(x, y+3.4); ctx.lineTo(x-richt*5.5, y+6.5); ctx.stroke(); /* Lafette */
}
function malAufgebot(ctx, x, y, farbe, richt){
  ctx.strokeStyle = farbe; ctx.fillStyle = farbe; ctx.lineWidth = 1.3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(x, y-4, 1.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x, y-2.5); ctx.lineTo(x, y+1.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y+1.5); ctx.lineTo(x-1.6, y+4.6);
  ctx.moveTo(x, y+1.5); ctx.lineTo(x+1.6, y+4.6); ctx.stroke();
  /* Heugabel */
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x+richt*2, y+2.5); ctx.lineTo(x+richt*3.6, y-6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+richt*2.6, y-6.5); ctx.lineTo(x+richt*4.6, y-5.5); ctx.stroke();
}
/* Ein Trupp Sprites eines Typs in Reihen zeichnen; gibt die Blocktiefe zurück */
function malTrupp(ctx, typ, anzahl, maxSprites, front, richt, y0, laneH, farbe){
  if(anzahl <= 0) return 0;
  const sprites = clamp(Math.ceil(anzahl/Math.max(1,Math.round(anzahl/maxSprites))), 1, maxSprites);
  const abst = typ==="kav" ? 13 : typ==="art" ? 13 : 7.5;
  const reihenH = typ==="kav" ? 14 : 11;
  const reihen = Math.max(1, Math.floor((laneH-12)/reihenH));
  let tiefe = 0;
  for(let i=0;i<sprites;i++){
    const reihe = i % reihen, spalte = Math.floor(i/reihen);
    const x = front - richt*(spalte*abst);
    const y = y0 + 8 + reihe*reihenH;
    if(typ==="inf") malSoldat(ctx, x, y, farbe, richt, true);
    else if(typ==="miliz") malSoldat(ctx, x, y, farbe, richt, false);
    else if(typ==="auf") malAufgebot(ctx, x, y, farbe, richt);
    else if(typ==="kav") malReiter(ctx, x, y, farbe, richt);
    else malKanone(ctx, x, y, farbe, richt);
    tiefe = Math.max(tiefe, spalte*abst + abst);
  }
  return tiefe;
}

/* Schlachtfeld-Canvas: Truppen als Formationen, Partikel an der Front */
function zeichneFeld(t=0){
  const c = $("#feld"), s = G._s;
  if(!c || !s || !s.lanes) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  /* Gelände */
  const brng = mulberry(777);
  ctx.fillStyle = "rgba(255,255,255,.03)";
  for(let h=0;h<4;h++){
    const hx = brng()*W, hw = 90+brng()*160;
    ctx.beginPath(); ctx.ellipse(hx, H*0.24, hw, 14+brng()*8, 0, Math.PI, 0); ctx.fill();
  }
  for(let b=0;b<6;b++) malBaum(ctx, brng()*W, H*(0.17+brng()*0.06), 4+brng()*3);
  /* Abschnittslinien */
  const oben = H*0.27, laneH = (H-oben-10)/LANES;
  ctx.strokeStyle = "rgba(255,255,255,.05)";
  for(let i=0;i<=LANES;i++){
    ctx.beginPath(); ctx.moveTo(0,oben+i*laneH); ctx.lineTo(W,oben+i*laneH); ctx.stroke();
  }
  ctx.font = "10px sans-serif"; ctx.textAlign = "left"; ctx.fillStyle = "rgba(219,226,238,.4)";
  for(let i=0;i<LANES;i++) ctx.fillText(LANE_NAMEN[i], 8, oben+i*laneH+12);

  const fA = G._kr ? G.spieler[G._kr.a].farbe : "#5fb8d4";
  const fD = G._kr ? G.spieler[G._kr.d].farbe : "#d9973f";
  const basisA = W*0.13, basisD = W*0.87, spann = W*0.34;
  const skala = Math.max(1, Math.ceil((s.startG.A+s.startG.D)/560));

  /* Truppen als Einheiten-Sprites je Abschnitt */
  s.lanes.forEach((lane,i)=>{
    const y0 = oben + i*laneH + 2;
    const frontA = basisA + (100-lane.dist)/100*spann;
    const frontD = basisD - (100-lane.dist)/100*spann;
    const malSeite2 = (u, farbe, front, richt) => {
      let x = front;
      x -= richt * malTrupp(ctx, "inf",   u.inf,   10, x, richt, y0, laneH, farbe);
      x -= richt * malTrupp(ctx, "miliz", u.miliz,  7, x, richt, y0, laneH, farbe+"99");
      x -= richt * malTrupp(ctx, "auf",   u.auf,    5, x, richt, y0, laneH, farbe+"77");
      malTrupp(ctx, "kav", u.kav, 5, x, richt, y0, laneH, farbe);
      /* Artillerie an der Basis */
      malTrupp(ctx, "art", u.art, 3, richt>0 ? basisA-34 : basisD+34, richt, y0, laneH, farbe);
    };
    if(laneGroesse(lane.A)>0) malSeite2(lane.A, fA, frontA, 1);
    if(laneGroesse(lane.D)>0) malSeite2(lane.D, fD, frontD, -1);
    /* Truppenzahlen an den Rändern */
    ctx.font = "600 11px sans-serif";
    ctx.fillStyle = fA; ctx.textAlign = "left";
    ctx.fillText(fmt(laneGroesse(lane.A)), 8, y0 + laneH - 8);
    ctx.fillStyle = fD; ctx.textAlign = "right";
    ctx.fillText(fmt(laneGroesse(lane.D)), W-8, y0 + laneH - 8);
    if(laneGroesse(lane.A)===0 && laneGroesse(lane.D)===0){
      ctx.fillStyle = "rgba(219,226,238,.18)"; ctx.font = "11px sans-serif"; ctx.textAlign="center";
      ctx.fillText("— verwaist —", W/2, y0+laneH/2);
    } else if(laneGroesse(lane.D)===0 && laneGroesse(lane.A)>0){
      ctx.fillStyle = "rgba(224,180,88,.5)"; ctx.font = "600 10px sans-serif"; ctx.textAlign="center";
      ctx.fillText("⚡ Durchbruch", W*0.72, y0+12);
    }
  });

  /* Feldbanner */
  const banner = (bx, farbe, ph) => {
    ctx.strokeStyle = "#5a4a30"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(bx, oben-4); ctx.lineTo(bx, oben-34); ctx.stroke();
    ctx.fillStyle = farbe;
    const wf = Math.sin(t/240 + ph)*3;
    ctx.beginPath(); ctx.moveTo(bx, oben-34);
    ctx.quadraticCurveTo(bx+10, oben-32+wf, bx+20, oben-29+wf);
    ctx.quadraticCurveTo(bx+10, oben-26+wf*0.5, bx, oben-22);
    ctx.closePath(); ctx.fill();
  };
  banner(W*0.05, fA, 0); banner(W*0.95-20, fD, 2);

  /* Partikel: Kanonenkugeln (Flugbahn), Explosionen, Nahkampfstaub */
  const jetzt = performance.now();
  for(const pk of (s.partikel||[])){
    const alter = jetzt - pk.born;
    if(alter < 0) continue;
    if(pk.typ==="kugel" && alter < 900){
      const q = alter/900;
      /* Mündungsfeuer beim Abschuss */
      if(q < 0.14){
        const mx = pk.von==="A" ? basisA-16 : basisD+16;
        const my = oben + pk.lane*laneH + laneH/2;
        ctx.fillStyle = `rgba(255,225,140,${0.9*(1-q/0.14)})`;
        ctx.beginPath(); ctx.arc(mx, my, 5+q*30, 0, 7); ctx.fill();
      }
      const lane = s.lanes[pk.lane];
      const y0 = oben + pk.lane*laneH + laneH/2;
      const dist = lane ? lane.dist : 50;
      const zielA = basisA + (100-dist)/100*spann, zielD = basisD - (100-dist)/100*spann;
      const von = pk.von==="A" ? basisA-20 : basisD+20;
      const nach = pk.von==="A" ? zielD : zielA;
      const x = von + (nach-von)*q;
      const y = y0 - Math.sin(q*Math.PI)*laneH*1.4;
      ctx.fillStyle = "#20242c";
      ctx.beginPath(); ctx.arc(x, y, 2.6, 0, 7); ctx.fill();
      if(q>0.93){
        ctx.fillStyle = "rgba(255,220,130,.8)";
        ctx.beginPath(); ctx.arc(nach, y0, 6, 0, 7); ctx.fill();
      }
    } else if(pk.typ==="boom" && alter < 750){
      const q = alter/750, r = 3 + q*11;
      const x = pk.rx*W, y = pk.ry*H;
      const grad = ctx.createRadialGradient(x,y,0,x,y,r);
      grad.addColorStop(0,`rgba(255,230,140,${0.95*(1-q)})`);
      grad.addColorStop(0.5,`rgba(230,120,60,${0.7*(1-q)})`);
      grad.addColorStop(1,"rgba(230,120,60,0)");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
    } else if(pk.typ==="gefallen" && alter < 4200){
      const q = alter/4200;
      const lane = s.lanes[pk.lane];
      const y0 = oben + pk.lane*laneH + laneH*0.5;
      const xm = basisA + (100-(lane?lane.dist:0))/100*spann + (pk.seite==="A"?-14:14) + pk.off*W;
      ctx.strokeStyle = `rgba(150,150,158,${0.5*(1-q)})`;
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(xm-4, y0+6); ctx.lineTo(xm+4, y0+6);
      ctx.moveTo(xm, y0+2); ctx.lineTo(xm, y0+9); ctx.stroke();
    } else if(pk.typ==="staub" && alter < 1300){
      const q = alter/1300;
      const lane = s.lanes[pk.lane];
      const y0 = oben + pk.lane*laneH + laneH/2;
      const xm = basisA + (100-(lane?lane.dist:0))/100*spann + 8;
      ctx.fillStyle = `rgba(170,160,140,${0.25*(1-q)})`;
      for(let k=0;k<3;k++){
        ctx.beginPath(); ctx.arc(xm+rf(-10,10), y0 - q*16 + rf(-6,6), 5+q*10, 0, 7); ctx.fill();
      }
    }
  }
  if(s.partikel) s.partikel = s.partikel.filter(pk => jetzt - pk.born < (pk.typ==="gefallen" ? 4200 : 1900));
  /* Weisse Flagge */
  if(s.fertig && !s.replayAktiv){
    ctx.font = "22px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("🏳️", s.sieger==="A" ? W*0.8 : W*0.2, H*0.16);
  }
  if(s.replayAktiv){
    ctx.fillStyle = "rgba(13,17,23,.72)"; ctx.fillRect(10, 10, 158, 24);
    ctx.fillStyle = "#e0b458"; ctx.font = "600 13px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("🎞️ Zeitraffer läuft …", 18, 27);
  }
}
/* Vorschau der eigenen Aufstellung (Platzierungs-Bildschirm) */
function zeichneAufstellung(cid, einheiten, gewichte, farbe, rechts){
  const c = document.getElementById(cid);
  if(!c) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = "#1c2b1e"; ctx.fillRect(0,0,W,H);
  const laneH = (H-12)/LANES;
  const lanes = verteileEinheiten(einheiten, gewichte);
  ctx.strokeStyle = "rgba(255,255,255,.06)";
  for(let i=0;i<=LANES;i++){ ctx.beginPath(); ctx.moveTo(0,6+i*laneH); ctx.lineTo(W,6+i*laneH); ctx.stroke(); }
  lanes.forEach((u,i)=>{
    const y0 = 10 + i*laneH;
    const reihen = Math.max(2, Math.floor((laneH-8)/8));
    let n = 0;
    const basis = rechts ? W-24 : 24, richt = rechts ? -1 : 1;
    const dot = (anz, radius, fill) => {
      for(let k=0;k<anz;k++){
        const reihe = n % reihen, spalte = Math.floor(n/reihen);
        ctx.beginPath();
        ctx.arc(basis + richt*(spalte*7), y0 + reihe*8, radius, 0, 7);
        ctx.fillStyle = fill; ctx.fill();
        n++;
      }
    };
    const skala = Math.max(1, Math.ceil(laneGroesse(einheiten)/420));
    dot(Math.ceil(u.inf/skala), 2.4, farbe);
    dot(Math.ceil(u.miliz/skala), 2.0, farbe+"99");
    dot(Math.ceil(u.auf/skala), 1.8, farbe+"77");
    dot(Math.ceil(u.kav/skala), 3.2, farbe);
    for(let k=0;k<Math.min(5, u.art>0?Math.max(1,Math.ceil(u.art/skala)):0);k++){
      ctx.fillStyle = farbe;
      ctx.fillRect(rechts ? W-12 : 4, y0 + k*10, 6, 6);
    }
    ctx.fillStyle = "rgba(219,226,238,.55)"; ctx.font = "10px sans-serif";
    ctx.textAlign = rechts ? "left" : "right";
    ctx.fillText(`${fmt(laneGroesse(u))}`, rechts ? 6 : W-6, y0+laneH-8);
  });
}


function schlachtAbschliessen(){
  const s = G._s, kr = G._kr;
  const ang = G.spieler[kr.a], ver = G.spieler[kr.d];
  /* Verluste anteilig in die stehenden Heere zurückschreiben (Leihtruppen kehren dezimiert heim) */
  verlusteZurueck(s);
  if(s.sieger === "A"){
    /* Eindringtiefe: geräumte Abschnitte — oder Überrennen nach der Flucht */
    const geraeumt = s.lanes.filter(l => laneGroesse(l.D) === 0).length;
    const verlustquote = 1 - sRest(s,"D")/s.startG.D;
    const tiefe = clamp(Math.max(geraeumt,
      s.routD ? Math.round(verlustquote*5) + 1 : Math.round(verlustquote*3)), 0, 5);
    const beute = Math.min(Math.round(ver.land*(0.10 + tiefe*0.02)), Math.max(0,freiLand(ver)));
    ver.land -= beute; ang.land += beute;
    const gefallene = Math.round(ver.pop*0.03);
    ver.pop -= gefallene;
    ver.stimmung = clamp(ver.stimmung-10,5,100);
    ang.stimmung = clamp(ang.stimmung-5,5,100);
    /* Plünderung: je tiefer der Durchbruch, desto mehr Schäden im Hinterland */
    const schaeden = [];
    for(let i=0;i<tiefe;i++){
      if(Math.random() < 0.5 && (ver.maerkte>0 || ver.muehlen>0)){
        if(ver.maerkte>0 && (ver.muehlen===0 || Math.random()<0.5)){
          ver.maerkte--; entferneGebaeude(ver,"m"); schaeden.push("ein Markt");
        } else if(ver.muehlen>0){
          ver.muehlen--; entferneGebaeude(ver,"k"); schaeden.push("eine Mühle");
        }
      }
    }
    if(tiefe >= 3){
      if(ver.palast>0 && Math.random()<0.5){
        const d = ri(1, Math.min(3, ver.palast)); ver.palast -= d;
        schaeden.push(`${d} Palast-Teil${d>1?"e":""}`);
      }
      if(ver.dom>0 && Math.random()<0.4){
        const d = ri(1, Math.min(2, ver.dom)); ver.dom -= d;
        schaeden.push(`${d} Dom-Teil${d>1?"e":""}`);
      }
    }
    /* Belagerung: bei tiefem Durchbruch fällt eine ganze Stadt in Eure Hand */
    if(tiefe >= 4 && staedte(ver) >= 1 && Math.random() < 0.65){
      ver.maerkte -= 5; ver.muehlen -= 3;
      for(let k=0;k<5;k++) entferneGebaeude(ver,"m");
      for(let k=0;k<3;k++) entferneGebaeude(ver,"k");
      ang.maerkte += 5; ang.muehlen += 3;
      for(let k=0;k<5;k++) platziereGebaeude(ang,"m");
      for(let k=0;k<3;k++) platziereGebaeude(ang,"k");
      schaeden.push("eine ganze Stadt (erobert!)");
      geschichte("🏰", `${ang.name} erobert eine Stadt von ${ver.name}.`);
      erfolg("eroberer");
    }
    const kornBeute = tiefe>0 ? Math.min(ver.korn, Math.round(ver.korn * 0.04 * tiefe)) : 0;
    ver.korn -= kornBeute; ang.korn += kornBeute;
    s.tiefe = tiefe;
    ang.stat.siege++; ver.stat.niederlagen++;
    bezAendern(ang, ver, -35);
    if(tiefe >= 5) erfolg("brandschatzer");
    s.plünder = schaeden.length || kornBeute
      ? `Eindringtiefe ${tiefe}/5 — geplündert: ${[...schaeden, kornBeute?fmt(kornBeute)+" Fuder Korn":null].filter(Boolean).join(", ")}.`
      : (tiefe>0 ? `Eindringtiefe ${tiefe}/5 — die Plünderer fanden wenig.` : "");
    s.ergebnis = `Sieg! Eure Truppen erobern ${fmt(beute)} ha von ${ver.name}. ${fmt(gefallene)} Feinde fallen.`;
    geschichte("⚔️", `${ang.name} besiegt ${ver.name} und erobert ${fmt(beute)} ha.`);
    if(!s.still){
      setTimeout(sSchlachtSieg, 300);
      if(kr.a === G.aktiv && !ang.ki){ erfolg("krieg"); if(s.helferA.length) erfolg("buendnis"); }
    }
  } else {
    const tribut = Math.round(Math.max(0,ang.geld)*0.2);
    ang.geld -= tribut; ver.geld += tribut;
    ang.stimmung = clamp(ang.stimmung-15,5,100);
    ang.stat.niederlagen++; ver.stat.siege++;
    bezAendern(ang, ver, -25);
    s.ergebnis = `Niederlage! Euer Heer wird geschlagen. Ihr zahlt ${fmt(tribut)} Taler Tribut an ${ver.name}.`;
    geschichte("🛡️", `${ver.name} schlägt ${ang.name}s Angriff zurück.`);
    if(!s.still) setTimeout(sNieder, 300);
  }
  quicksave();
  mpSync();
}

function erben(p){
  const alterName = `${titelName(p)} ${p.name}`;
  p.gen = (p.gen||1) + 1;
  p.startAlter = ri(18,26) - (G.jahr - 1700);      /* Alter = startAlter + Regierungsjahre */
  p.todesJahr = G.jahr + (G.tempo>=2.5 ? ri(17,23) : G.tempo>1 ? ri(28,38) : ri(42,55)) + Math.random();
  p.tot = false;
  /* Erbstreit: die Übergabe kostet */
  const verlustGeld = Math.round(Math.max(0,p.geld)*0.2);
  const verlustLand = Math.min(Math.round(p.land*0.08), freiLand(p));
  p.geld -= verlustGeld;
  p.land -= verlustLand;
  if(p.titel > 0) p.titel--;
  p.stimmung = clamp(p.stimmung-8, 5, 100);
  const roem = ["","II.","III.","IV.","V.","VI.","VII."][Math.min(p.gen-1,6)] || (p.gen+".");
  if(!/ (II\.|III\.|IV\.|V\.|VI\.|VII\.|\d+\.)$/.test(p.name)) p.name = p.name + " " + roem;
  else p.name = p.name.replace(/ (II\.|III\.|IV\.|V\.|VI\.|VII\.|\d+\.)$/, " " + roem);
  geschichte("👶", `${alterName} stirbt — ${p.name} tritt das Erbe an (Erbstreit: −${fmt(verlustGeld)} T, −${fmt(verlustLand)} ha).`);
  quicksave(); mpSync();
}

function angebotAusfuehren(a){
  const von = G.spieler[a.von], an = G.spieler[a.an];
  if(a.richtung === "pakt"){
    von.pakte[a.an] = G.jahr + 5;
    an.pakte[a.von] = G.jahr + 5;
    bezAendern(von, an, 15);
    geschichte("🕊️", `${von.name} und ${an.name} besiegeln einen Nichtangriffspakt.`);
    return;
  }
  const kaeufer = a.richtung === "kauf" ? von : an;
  const verkaeufer = a.richtung === "kauf" ? an : von;
  const summe = a.menge * a.preis;
  if(kaeufer.geld < summe || verkaeufer.korn < a.menge) return;
  kaeufer.geld -= summe; verkaeufer.geld += summe;
  verkaeufer.korn -= a.menge; kaeufer.korn += a.menge;
  verkaeufer.stat.kornErloes += summe;
  bezAendern(von, an, 6);
}
function kiAngebotPruefen(ki, a){
  const markt = G.kornMarkt || 100;
  const bez = bezWert(ki, G.spieler[a.von]);
  const toleranz = (ki.kiTyp==="haendler" ? 0.18 : 0.06) + bez/500;
  if(a.richtung === "kauf"){           /* Anbieter kauft — KI verkauft */
    if(ki.korn - a.menge < noetigKorn(ki)*1.5) return false;
    return a.preis >= markt * (1 - toleranz);
  } else {                             /* Anbieter verkauft — KI kauft */
    if(ki.geld < a.menge*a.preis + 4000) return false;
    return a.preis <= markt * (1 + toleranz);
  }
}
function angebotAntwort(idx, ja){
  const a = G.angebote[idx];
  if(!a) return;
  G.angebote.splice(idx,1);
  if(ja){
    angebotAusfuehren(a);
    if(a.richtung==="pakt") erfolg("pakt"); else erfolg("handel");
    toast("🤝 Angebot angenommen.");
  } else {
    bezAendern(G.spieler[a.von], G.spieler[a.an], -4);
    toast("❌ Angebot abgelehnt.");
  }
  mpSync();
  if(G.angebote.some(x=>x.an===G.aktiv)) render();
  else zeige("status");
}

/* ---------- KI-Regenten ---------- */
function kiDiploWahl(p, kr){
  const aufWeg = kr.weg.includes(G.spieler.indexOf(p));
  const ang = G.spieler[kr.a], ver = G.spieler[kr.d];
  const bezA = bezWert(p, ang), bezV = bezWert(p, ver);
  const kampfbereit = heerGroesse(p.heer) > 50;
  /* Freunden beistehen, Feinden schaden — je nach Charakter */
  if(kampfbereit){
    if(bezV > 30 && bezV > bezA && Math.random() < 0.6) return "def";
    if(bezA > 30 && bezA > bezV && Math.random() < (p.kiTyp==="aggressor" ? 0.55 : 0.35)) return "atk";
    if(p.kiTyp==="aggressor" && Math.random() < 0.12) return Math.random()<0.5 ? "atk" : "def";
    if(bezA < -40 && Math.random() < 0.35) return "def";
  }
  if(aufWeg){
    if(bezA >= 0 || paktAktiv(p, ang)) return "frei";
    return Math.random() < 0.45 ? "frei" : "sperr";
  }
  return "frei";
}
const GELAENDE = [
  { k:"eben",   n:"Ebene", ico:"",   },
  { k:"huegel", n:"Hügel", ico:"⛰️", defBonus:1.22 },
  { k:"furt",   n:"Furt",  ico:"🌊", tempo:0.5 },
  { k:"wald",   n:"Wald",  ico:"🌲", kavFaktor:0.5, artFaktor:0.7 }
];
function wuerfleGelaende(){
  return Array.from({length:LANES}, ()=> {
    const r = Math.random();
    return r < 0.5 ? GELAENDE[0] : r < 0.68 ? GELAENDE[1] : r < 0.84 ? GELAENDE[2] : GELAENDE[3];
  });
}
const kiAufstellung = () => AUFSTELLUNGEN[ri(0,AUFSTELLUNGEN.length-1)].g;
function kiSchlacht(a, d){
  const kr = { a, d, weg: wegZwischen(a,d), fragen: [], wahl: {},
    aufA: kiAufstellung(), aufD: kiAufstellung(), gelaende: wuerfleGelaende() };
  /* übrige KI-Regenten entscheiden, Menschen bleiben bei KI-Kriegen neutral */
  kr.fragen = lebende().map(x=>x.i).filter(i=>i!==a && i!==d);
  for(const i of kr.fragen){
    const s = G.spieler[i];
    kr.wahl[i] = s.ki ? kiDiploWahl(s, kr) : "frei";
  }
  if(kr.weg.some(i => !["atk","frei"].includes(kr.wahl[i]))) return null;
  const helferA = kr.fragen.filter(i=>kr.wahl[i]==="atk");
  const helferD = kr.fragen.filter(i=>kr.wahl[i]==="def");
  const A = seiteBauen(a, helferA, false);
  const D = seiteBauen(d, helferD, true);
  const eA = { inf:A.inf, kav:A.kav, art:A.art, miliz:A.miliz, auf:0 };
  const eD = { inf:D.inf, kav:D.kav, art:D.art, miliz:D.miliz, auf:D.aufgebot };
  const lanesA = verteileEinheiten(eA, kr.aufA);
  const lanesD = verteileEinheiten(eD, kr.aufD);
  const s = {
    poolsA:A.pools, poolsD:D.pools, helferA, helferD,
    lanes: Array.from({length:LANES}, (_,i)=>({ A:lanesA[i], D:lanesD[i], dist:100 })),
    start:{ A:{...eA}, D:{...eD} },
    startG:{ A:Math.max(1,laneGroesse(eA)), D:Math.max(1,laneGroesse(eD)) },
    gelaende: kr.gelaende || wuerfleGelaende(), regen: Math.random()<0.22,
    moralA:100, moralD:100, routA:false, routD:false,
    tick:0, maxTicks:40, log:[], partikel:[], fertig:false, sieger:null, still:true };
  G._kr = kr; G._s = s;
  while(!s.fertig) einTick(s, true);
  schlachtAbschliessen();
  return s;
}
function kiZug(p){
  const idx = G.spieler.indexOf(p);
  const bericht = [];
  /* Preise wie im normalen Zug */
  p.kornPreis = clamp(Math.round((G.kornMarkt||100) * rf(0.93,1.07)), 20, 430);
  p.landPreis = ri(16,70);
  p.kornHist = (p.kornHist||[]).concat(p.kornPreis).slice(-32);
  p.kriegGefuehrt = false;
  p.turnStart = Date.now();
  /* Korn ausgeben (großzügig) */
  const n = noetigKorn(p);
  p.ausgabe = Math.min(Math.ceil(n*1.4), p.korn);
  p.korn -= p.ausgabe;
  /* Handel */
  const bedarf = Math.ceil(n*1.8) - p.korn;
  if(bedarf > 0 && p.kornPreis < 170){
    const m = Math.min(bedarf, Math.floor(Math.max(0,p.geld-3000)*0.5/p.kornPreis));
    if(m>0){ p.geld -= m*p.kornPreis; p.korn += m; }
  }
  if(p.kornPreis > 200 && p.korn > n*2.5){
    const m = p.korn - Math.ceil(n*2);
    p.korn -= m; p.geld += Math.round(m*p.kornPreis*0.9);
  }
  if(p.landPreis <= 34 && p.geld > 12000){
    const zielLand = p.palast>=PALAST_TEILE ? 27000 : p.titel>=4 ? 15000 : 12000;
    const m = Math.min(Math.max(0,zielLand-p.land), Math.floor((p.geld-8000)*0.7/p.landPreis));
    if(m>0){ p.geld -= m*p.landPreis; p.land += m; bericht.push(`kauft ${fmt(m)} ha Land`); }
  }
  zwischenbilanz(p);
  /* Entscheidungs-Ereignis: die KI wählt nach Kassenlage */
  const ev2 = ereignisWuerfeln(p);
  if(ev2){
    const k = p.geld > 6000 ? 0 : ev2.wahl.length-1;
    try{ ev2.wahl[k].fx(p); bericht.push(`entscheidet über „${ev2.ico}"-Vorfall`); }catch(e){}
  }
  /* Bauen */
  let gebaut = 0;
  const bauLimit = p.kiTyp==="baumeister" ? 12 : 8;
  const bauReserve = p.kiTyp==="baumeister" ? 4500 : 6000;
  for(let i=0;i<bauLimit;i++){
    if(p.geld < bauReserve || (p.maerkte+p.muehlen) >= bauplaetze(p)) break;
    if(p.maerkte >= 25 && p.muehlen >= 15) break;
    if(p.maerkte*3 <= p.muehlen*5){ if(p.geld>=KOSTEN.markt){ p.geld-=KOSTEN.markt; p.maerkte++; platziereGebaeude(p,"m"); gebaut++; } }
    else if(p.geld>=KOSTEN.muehle){ p.geld-=KOSTEN.muehle; p.muehlen++; platziereGebaeude(p,"k"); gebaut++; }
  }
  if(gebaut) bericht.push(`errichtet ${gebaut} Bauwerk${gebaut>1?"e":""}`);
  if(p.land >= LAND.palast){ let t=0; while(p.geld > 25000 && p.palast < PALAST_TEILE){ p.geld-=KOSTEN.palastTeil; p.palast++; t++; } if(t) bericht.push(`baut am Palast (${p.palast}/${PALAST_TEILE})`); }
  if(p.palast >= PALAST_TEILE && p.land >= LAND.dom){ let t=0; while(p.geld > 112000 && p.dom < DOM_TEILE){ p.geld-=KOSTEN.domTeil; p.dom++; t++; } if(t) bericht.push(`baut an der Kathedrale (${p.dom}/${DOM_TEILE})`); }
  /* Heer — der Eroberer rüstet stärker */
  const heerZiel = (p.kiTyp==="aggressor" ? 260 : 130) + p.titel*80;
  if(p.titel>=1 && p.geld > (p.kiTyp==="aggressor" ? 14000 : 20000) && heerGroesse(p.heer) < heerZiel){
    const rekruten = Math.min(40, Math.floor((p.geld-12000)/KOSTEN.inf));
    if(rekruten>0){ p.geld -= rekruten*KOSTEN.inf; p.heer.inf += rekruten; }
  }
  /* Der Händler pflegt Beziehungen und macht Geschäfte */
  if(p.kiTyp==="haendler" && Math.random() < 0.25 && p.geld > 18000){
    const partner = lebende().map(x=>x.p).filter(z=>z!==p)
      .sort((a,b)=>bezWert(p,a)-bezWert(p,b))[0];
    if(partner){
      const geschenk = ri(300,800);
      p.geld -= geschenk; partner.geld += geschenk;
      bezAendern(p, partner, clamp(Math.round(geschenk/150),2,8));
      bericht.push(`sendet ${partner.name} ein Geschenk`);
    }
  }
  if(p.kiTyp==="haendler" && (p.haefen||0)<2 && p.land>=12000 && p.geld>18000){ p.geld-=KOSTEN.hafen; p.haefen=(p.haefen||0)+1; bericht.push("baut einen Hafen"); }
  if(p.kiTyp==="haendler" && p.korn > noetigKorn(p)*2.5 && p.kornPreis > 130){
    const m = p.korn - Math.ceil(noetigKorn(p)*2);
    p.korn -= m; p.geld += Math.round(m*p.kornPreis*0.9);
    G.marktDruck = (G.marktDruck||0) + m;
  }
  /* Krieg? Charakter, Beziehungen und Pakte entscheiden */
  const kriegslust = p.kiTyp==="aggressor" ? 0.24 : p.kiTyp==="haendler" ? 0.04 : 0.08;
  if(p.titel>=1 && Math.random() < kriegslust){
    const nb = nachbarn(idx).filter(i=>!G.spieler[i].tot);
    const eigen = heerStaerke(p.heer) + miliz(p)*0.8;
    const schwelle = p.kiTyp==="aggressor" ? 1.3 : 1.6;
    const ziel = nb.map(i=>G.spieler[i])
      .filter(z => !paktAktiv(p,z) && bezWert(p,z) < 35
                && eigen > (heerStaerke(z.heer) + miliz(z)*0.8 + z.pop*0.025)*schwelle)
      .sort((x,y)=>heerStaerke(x.heer)-heerStaerke(y.heer))[0];
    if(ziel && eigen > 150){
      const di = G.spieler.indexOf(ziel);
      const s = kiSchlacht(idx, di);
      if(s) bericht.push(s.sieger==="A"
        ? `führt siegreich Krieg gegen ${ziel.name}` + (s.tiefe>=2 ? ` und plündert das Hinterland` : "")
        : `verliert einen Feldzug gegen ${ziel.name}`);
    }
  }
  jahresschluss(p);
  const r = p.report;
  for(const e of r.ereignisse) bericht.push(e.t.toLowerCase().replace(/!.*$/,""));
  const titelVorher = titelName(p);
  if(pruefeBefoerderung(p)){
    bericht.push(`wird zu${p.w?"r":"m"} ${titelName(p)} erhoben!`);
    if(p.titel===8){ G.sieger = p; }
  }
  G._kiBerichte = (G._kiBerichte||[]).concat(
    `${p.wappen} ${titelVorher} ${p.name} ` + (bericht.length? bericht.join(", ") : "regiert still sein Reich") + ".");
  G._kiBerichte = G._kiBerichte.slice(-12);
}

/* ---------- Speichern & Laden ---------- */
function storageOK(){
  try{ const t="__kaiser_t"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t); return true; }
  catch(e){ return false; }
}
function spielstand(){ return JSON.stringify({v:7, jahr:G.jahr, tempo:G.tempo, aktiv:G.aktiv, spieler:G.spieler, opt:G.opt||{vergleich:true}, diff:G.diff||2, tipps:G.tipps||{}, kornMarkt:G.kornMarkt||100, marktDruck:G.marktDruck||0, angebote:G.angebote||[], szenario:G.szenario||"frei", geschichte:G.geschichte||[]}); }
function ladeSpielstand(json){
  const d = JSON.parse(json);
  if(!d || !Array.isArray(d.spieler) || !d.spieler.length) throw new Error("ungültig");
  G.jahr = d.jahr; G.tempo = d.tempo; G.aktiv = clamp(d.aktiv||0,0,d.spieler.length-1);
  G.spieler = d.spieler;
  G.opt = d.opt || { vergleich:true };
  G.diff = d.diff || 2;
  G.tipps = d.tipps || {};
  G.kornMarkt = d.kornMarkt || 100;
  G.marktDruck = d.marktDruck || 0;
  G.angebote = d.angebote || [];
  G.szenario = d.szenario || "frei";
  G.geschichte = d.geschichte || [];
  G._kiBerichte = [];
  G.spieler.forEach((p,i)=>{
    if(!p.heer) p.heer = {inf:0,kav:0,art:0};
    if(!p.kornHist) p.kornHist = [];
    if(p.snap===undefined) p.snap = null;
    if(p.delta===undefined) p.delta = null;
    if(!p.farbe) p.farbe = FARBEN[i%FARBEN.length];
    if(!p.wappen) p.wappen = WAPPEN[i%WAPPEN.length];
    if(!p.chronik) p.chronik = [];
    if(p.ki===undefined) p.ki = false;
    if(!p.startAlter) p.startAlter = ri(22,30);
    if(!p.bez) p.bez = {};
    if(!p.pakte) p.pakte = {};
    if(!p.stat) p.stat = { steuern:0, kornErloes:0, siege:0, niederlagen:0, bauten:0 };
    if(!p.gen) p.gen = 1;
    if(p.haefen===undefined) p.haefen = 0;
    if(!p.berater) p.berater = {};
    if(!p.spionage) p.spionage = {};
    if(!p.gebaeude){
      p.gebaeude = [];
      for(let m=0;m<p.maerkte;m++) p.gebaeude.push({t:"m",ang:Math.random()*6.2832,dist:0.34+Math.random()*0.58});
      for(let k=0;k<p.muehlen;k++) p.gebaeude.push({t:"k",ang:Math.random()*6.2832,dist:0.34+Math.random()*0.58});
    }
  });
  G.sieger = null;
  zeige("handoff");
}
function exportSpielstand(){
  const blob = new Blob([spielstand()], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `kaiser-anno-${G.jahr}.json`;

function importSpielstand(inp){

  rd.onload = () => { try{ ladeSpielstand(rd.result); }catch(e){ alertMsg("Diese Datei ist kein gültiger Kaiser-Spielstand."); } };

}

/* ---------- Ablauf ---------- */
function starteSpiel(anzahl, namen, geschlechter, tempo, kis, opts){
  opts = opts || {};
  G.tempo = tempo; G.spieler = [];
  G.opt = { vergleich: opts.vergleich!==false, tutorial: opts.tutorial!==false, dynastie: opts.dynastie!==false };
  G.geschichte = [];
  G.diff = opts.diff || 2;
  G.tipps = {};
  for(let i=0;i<anzahl;i++)
    G.spieler.push(neuerSpieler(namen[i]||("Spieler "+(i+1)), geschlechter[i], i, kis && kis[i]));
  if(G.diff===1) for(const p of G.spieler){ p.geld = 25000; p.korn = 600; }
  if(G.diff===3) for(const p of G.spieler){ p.geld = 10000; p.korn = 300; }
  /* KI-Persönlichkeiten */
  const typen = ["aggressor","haendler","baumeister"];
  let tIdx = ri(0,2);
  for(const p of G.spieler) if(p.ki){ p.kiTyp = typen[tIdx % 3]; tIdx++; }
  /* Szenario anwenden */
  G.szenario = opts.szenario || "frei";
  if(G.szenario === "erbe"){
    for(const p of G.spieler){ p.geld = -4000; p.korn = 250; }
  } else if(G.szenario === "kriegstreiber"){
    for(const p of G.spieler){ if(p.ki){ p.kiTyp = "aggressor"; p.heer = {inf:ri(80,140), kav:ri(10,25), art:ri(2,6)}; p.titel = Math.max(p.titel,1); p.pop = 3200; }
      else p.heer = {inf:60, kav:5, art:2}; }
  } else if(G.szenario === "kornkrise"){
    for(const p of G.spieler){ p.korn = 120; }
    G.kornMarkt = 240;
  }
  G.kornMarkt = G.kornMarkt || ri(85,120);
  G.marktDruck = 0;
  G.angebote = [];
  G.jahr = 1700; G.aktiv = 0; G.sieger = null; G._kiBerichte = []; G._ruhmFertig = false;
  if(cur().ki){ G.aktiv = -1; naechsterSpieler(); }
  else zeige("intro");
}
const diffFaktor = () => G.diff===1 ? 0.6 : G.diff===3 ? 1.35 : 1;
function beginneZug(){
  const p = cur();
  p.kornPreis = clamp(Math.round((G.kornMarkt||100) * rf(0.93,1.07)), 20, 430);
  p.landPreis = ri(16,70);
  p.kornHist = (p.kornHist||[]).concat(p.kornPreis).slice(-32);
  if(p.snap){
    p.delta = { geld:p.geld-p.snap.geld, land:p.land-p.snap.land,
                korn:p.korn-p.snap.korn, pop:p.pop-p.snap.pop };
  }
  p.snap = { geld:p.geld, land:p.land, korn:p.korn, pop:p.pop };
  p.kriegGefuehrt = false;
  p.diploZaehler = 0;
  p.spionGenutzt = false;
  p.ausgabe = 0;
  p.turnStart = Date.now();
  G._kiBerichte = [];
  G._donnerte = false;
  if((G.angebote||[]).some(a => a.an === G.aktiv)) zeige("angebote");
  else zeige("status");
}
function naechsterSpieler(){
  quicksave();
  for(let schutz=0; schutz<200; schutz++){
    G.aktiv++;
    if(G.aktiv >= G.spieler.length){
      G.aktiv = 0; G.jahr++;
      /* Gemeinsamer Markt: Verkäufe drücken, Käufe treiben den Kurs */
      let kp = G.kornMarkt + (110 - G.kornMarkt)*0.15 + rf(-38,38) - (G.marktDruck||0)*0.02;
      if(Math.random() < 0.06) kp *= rf(1.5,2.4);
      G.kornMarkt = clamp(Math.round(kp), 20, 430);
      G.marktDruck = Math.round((G.marktDruck||0)*0.4);
    }
    const p = cur();
    if(alleTot()){ zeige("ende"); return; }
    if(p.tot) continue;
    if(G.jahr >= p.todesJahr){
      p.tot = true;
      geschichte("🕯️", `${titelName(p)} ${p.name} stirbt im Alter von ${alterJahre(p)} Jahren.`);
      mpSync();
      if(p.ki){
        if(G.opt && G.opt.dynastie){ erben(p); G._kiBerichte = (G._kiBerichte||[]).concat(`👶 In ${p.name}s Reich tritt die nächste Generation an.`); }
        else G._kiBerichte = (G._kiBerichte||[]).concat(`🕯️ ${titelName(p)} ${p.name} ist Anno ${G.jahr} verstorben.`);
        if(p.tot) continue;
        G.aktiv--; continue;   /* der Erbe ist sofort am Zug */
      }
      if(mpMein(G.aktiv)){ sGlocke(); zeige("tod"); } else zeige("warten");
      return;
    }
    if(p.ki){
      kiZug(p);
      if(G.sieger && G.sieger.ki){ mpSync(); zeige("sieg"); return; }
      continue;
    }
    mpSync();
    if(mpMein(G.aktiv)) zeige("handoff"); else zeige("warten");
    return;
  }
  mpSync();
  zeige("ende");
}
const alleTot = () => G.spieler.every(p=>p.tot);

  }

/* Zahlen zählen weich hoch (Statuskarten) */
function zaehlerAnimieren(){
  document.querySelectorAll("[data-cnt]").forEach(el=>{
    const ziel = +el.dataset.cnt, suf = el.dataset.suf || "";
    if(!isFinite(ziel)) return;
    const start = ziel * 0.85, t0 = performance.now(), dauer = 450;
    const step = t => {
      const q = Math.min(1,(t-t0)/dauer), e = 1-Math.pow(1-q,3);
      el.textContent = fmt(start + (ziel-start)*e) + suf;
      if(q<1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}
/* Kornkurs-Verlauf als Mini-Chart */
function sparkline(hist){
  if(!hist || hist.length<2) return "";
  const w = 280, h = 54, min = Math.min(...hist), max = Math.max(...hist);
  const sp = Math.max(1, max-min);
  const pt = hist.map((v,i)=>`${(i/(hist.length-1)*w).toFixed(1)},${(h-6-(v-min)/sp*(h-14)).toFixed(1)}`);
  const letzt = pt[pt.length-1].split(",");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pt.join(" ")}" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="${letzt[0]}" cy="${letzt[1]}" r="3.5" fill="var(--gold)"/>
    <text x="2" y="10" font-size="9" fill="#8b96a8">${fmt(max)}</text>
    <text x="2" y="${h-2}" font-size="9" fill="#8b96a8">${fmt(min)}</text>
  </svg>`;
}
/* Chronik: normalisierte Verlaufskurven für Volk, Land, Vermögen */
function chronikChart(p){
  const c = p.chronik || [];
  if(c.length < 2) return "";
  const w = 640, h = 120;
  const serie = (key, farbe) => {
    const werte = c.map(e=>e[key]);
    const min = Math.min(...werte), max = Math.max(...werte);
    const sp = Math.max(1, max-min);
    const pts = werte.map((v,i)=>`${(i/(werte.length-1)*w).toFixed(1)},${(h-8-(v-min)/sp*(h-20)).toFixed(1)}`);
    return `<polyline points="${pts.join(" ")}" fill="none" stroke="${farbe}" stroke-width="2" stroke-linejoin="round" opacity=".9"/>`;
  };
  const letzt = c[c.length-1];
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
      <line x1="0" y1="${h-8}" x2="${w}" y2="${h-8}" stroke="#2a3446"/>
      ${serie("pop","#4cc38a")}${serie("land","#5fb8d4")}${serie("geld","#e0b458")}
    </svg>
    <p class="muted small" style="margin-top:6px">
      <span class="dot" style="background:#4cc38a"></span>Untertanen (${fmt(letzt.pop)})
      <span class="dot" style="background:#5fb8d4;margin-left:12px"></span>Land (${fmt(letzt.land)} ha)
      <span class="dot" style="background:#e0b458;margin-left:12px"></span>Vermögen (${fmt(letzt.geld)} T)
      <span style="margin-left:12px">· ${c[0].j}–${letzt.j}, je auf eigenen Bereich skaliert</span>
    </p>`;
}
/* Vergleichskurven aller Reiche (Untertanen) */
function vergleichsChart(){
  const teilnehmer = G.spieler.filter(p=>(p.chronik||[]).length>=2);
  if(teilnehmer.length < 2) return "";
  const max = Math.max(1, ...teilnehmer.flatMap(p=>p.chronik.map(e=>e.pop)));
  const j0 = Math.min(...teilnehmer.map(p=>p.chronik[0].j));
  const j1 = Math.max(...teilnehmer.map(p=>p.chronik[p.chronik.length-1].j));
  const w = 640, h = 160;
  const linien = teilnehmer.map(p=>{
    const pts = p.chronik.map(e=>
      `${((e.j-j0)/Math.max(1,j1-j0)*w).toFixed(1)},${(h-10-(e.pop/max)*(h-24)).toFixed(1)}`);
    return `<polyline points="${pts.join(" ")}" fill="none" stroke="${p.farbe}" stroke-width="2.4" stroke-linejoin="round" opacity=".92"/>`;
  }).join("");
  const legende = teilnehmer.map(p=>
    `<span style="margin-right:14px"><span class="dot" style="background:${p.farbe}"></span>${p.wappen} ${p.name}</span>`).join("");
  return `<div class="card">
    <h3>Untertanen im Vergleich · ${j0}–${j1}</h3>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
      <line x1="0" y1="${h-10}" x2="${w}" y2="${h-10}" stroke="#2a3446"/>
      ${linien}
    </svg>
    <p class="muted small" style="margin-top:6px">${legende} · Spitze: ${fmt(max)} Untertanen</p>
  </div>`;
}
function deltaBadge(v, einheit=""){
  if(v===undefined || v===null || v===0 || !isFinite(v)) return "";
  return v>0 ? `<span class="up">▲ ${fmt(v)}${einheit}</span>` : `<span class="down">▼ ${fmt(Math.abs(v))}${einheit}</span>`;
}
