<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaiser — Wirtschaftssimulation</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161c26; --panel2:#1d2532; --border:#2a3446;
    --txt:#dbe2ee; --muted:#8b96a8; --gold:#e0b458; --gold2:#c79a3d;
    --green:#4cc38a; --red:#e5636f; --cyan:#5fb8d4; --orange:#d9973f;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(1200px 600px at 50% -100px,#1a2233 0%,var(--bg) 60%);
    color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    min-height:100vh;overflow-x:hidden;
  }
  header{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:12px 20px;background:rgba(14,17,23,.85);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
  }
  .brand{font-weight:800;font-size:20px;letter-spacing:2px;color:var(--gold);}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel2);border:1px solid var(--border);border-radius:999px;
    padding:5px 12px;font-size:13px;color:var(--muted);
  }
  .chip b{color:var(--txt);font-weight:600;}
  .chip.warn{border-color:var(--red);color:var(--red);}
  .spacer{flex:1;}
  main{max-width:1080px;margin:0 auto;padding:22px 20px 60px;}
  #screen{animation:fadein .28s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  h1{font-size:30px;font-weight:800;margin-bottom:6px;}
  h2{font-size:20px;font-weight:700;margin-bottom:14px;}
  h3{font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  p{line-height:1.6;}
  .muted{color:var(--muted);} .gold{color:var(--gold);} .green{color:var(--green);}
  .red{color:var(--red);} .cyan{color:var(--cyan);}
  .small{font-size:13px;} .center{text-align:center;}
  .card{
    background:linear-gradient(180deg,var(--panel2) 0%,var(--panel) 100%);
    border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:16px;
    transition:border-color .2s;
  }
  .grid{display:grid;gap:14px;}
  .g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .stat{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;
  }
  .stat .ico{font-size:20px;}
  .stat .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:4px 0 2px;}
  .stat .val{font-size:19px;font-weight:700;}
  .bar{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:8px;}
  .bar>div{height:100%;border-radius:99px;background:var(--gold);transition:width .5s;}
  .stepper{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .step{
    font-size:12px;letter-spacing:.5px;padding:6px 12px;border-radius:999px;
    border:1px solid var(--border);color:var(--muted);background:var(--panel);
  }
  .step.act{background:var(--gold);border-color:var(--gold);color:#1a1509;font-weight:700;}
  .step.done{color:var(--green);border-color:var(--green);}
  button{
    font-family:inherit;font-size:14.5px;font-weight:600;
    background:var(--panel2);color:var(--txt);
    border:1px solid var(--border);border-radius:10px;
    padding:10px 18px;cursor:pointer;margin:4px 8px 4px 0;
    transition:transform .06s, background .15s, border-color .15s, filter .15s;
  }
  button:hover:not(:disabled){border-color:var(--gold);}
  button:active:not(:disabled){transform:scale(.97);}
  button:disabled{opacity:.35;cursor:default;}
  .btn-primary{background:linear-gradient(180deg,var(--gold) 0%,var(--gold2) 100%);color:#1a1509;border-color:var(--gold2);}
  .btn-primary:hover:not(:disabled){filter:brightness(1.08);border-color:var(--gold);}
  .btn-danger{background:transparent;color:var(--red);border-color:var(--red);}
  .btn-danger:hover:not(:disabled){background:var(--red);color:#fff;border-color:var(--red);}
  .btn-lg{font-size:16px;padding:13px 26px;border-radius:12px;}
  .btn-sm{font-size:12.5px;padding:6px 10px;margin:2px 4px 2px 0;}
  input[type=text],input[type=number],select{
    font-family:inherit;font-size:15px;
    background:var(--bg);color:var(--txt);
    border:1px solid var(--border);border-radius:10px;
    padding:9px 12px;width:150px;
  }
  input[type=text]{width:210px;}
  input:focus,select:focus{outline:none;border-color:var(--gold);}
  input[type=range]{width:100%;accent-color:var(--gold);}
  table{width:100%;border-collapse:collapse;}
  td,th{padding:7px 6px;text-align:left;font-size:14.5px;}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums;}
  tr+tr td{border-top:1px solid var(--border);}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;}
  #map{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 12px;}
  .tile{
    width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:rgba(0,0,0,.65);
  }
  .t-frei{background:#2e4638;} .t-acker{background:#6f8f3f;}
  .t-markt{background:var(--orange);} .t-muehle{background:var(--cyan);}
  .t-palast{background:#e8e6df;} .t-dom{background:var(--gold);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .legend .tile{width:16px;height:16px;border-radius:4px;display:inline-flex;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .delta-pos{color:var(--green);font-weight:600;}
  .delta-neg{color:var(--red);font-weight:600;}
  .hero{padding:56px 20px;text-align:center;}
  .hero .crown{font-size:64px;display:block;margin-bottom:14px;}
  .hero h1{font-size:44px;letter-spacing:6px;color:var(--gold);}
  .event{
    border-left:3px solid var(--border);padding:8px 12px;margin:8px 0;
    background:var(--panel);border-radius:0 10px 10px 0;font-size:14.5px;
  }
  .event.bad{border-color:var(--red);} .event.good{border-color:var(--green);}
  .rowflex{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0;}
  .sliderrow{display:grid;grid-template-columns:170px 1fr 64px;gap:12px;align-items:center;margin:12px 0;}
  .sliderrow .v{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;}
  .goal{background:rgba(224,180,88,.08);border:1px solid rgba(224,180,88,.35);}
  footer{margin-top:26px;text-align:center;font-size:12px;color:var(--muted);}
  /* --- Schlacht --- */
  .battlefield{display:grid;grid-template-columns:1fr 60px 1fr;gap:12px;align-items:start;}
  .armee{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
  .armee h4{font-size:15px;margin-bottom:8px;}
  .armee .u{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;font-variant-numeric:tabular-nums;}
  .vs{font-size:26px;text-align:center;padding-top:40px;color:var(--gold);}
  .strbar{height:12px;background:var(--border);border-radius:99px;overflow:hidden;margin:10px 0 4px;}
  .strbar>div{height:100%;transition:width .5s;}
  .strbar.a>div{background:var(--cyan);} .strbar.d>div{background:var(--orange);}
  .battlelog{max-height:180px;overflow-y:auto;font-size:13.5px;}
  .battlelog p{padding:2px 0;border-bottom:1px dashed var(--border);}
  .shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:none;}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .floatdmg{position:absolute;font-weight:800;color:var(--red);animation:floatup 1s ease-out forwards;pointer-events:none;}
  @keyframes floatup{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-40px);}}
  /* --- Konfetti --- */
  .confetti{position:fixed;top:-12px;width:9px;height:14px;z-index:99;animation:cfall linear forwards;pointer-events:none;border-radius:2px;}
  @keyframes cfall{to{transform:translateY(105vh) rotate(720deg);opacity:.6;}}
  /* --- Monumente --- */
  .monu{display:flex;gap:20px;align-items:flex-end;justify-content:center;padding:6px 0 2px;}
  .monu svg{display:block;}
  @media (max-width:640px){ .hero h1{font-size:32px;} .sliderrow{grid-template-columns:120px 1fr 52px;} .battlefield{grid-template-columns:1fr;} .vs{padding:4px;} }
</style>
</head>
<body>
<header>
  <span class="brand">👑 KAISER</span>
  <span class="chip" id="hJahr" style="display:none"></span>
  <span class="chip" id="hSpieler" style="display:none"></span>
  <span class="chip" id="hTimer" style="display:none"></span>
  <span class="spacer"></span>
  <button class="btn-sm" id="btnMute" onclick="toggleMute()">🔊</button>
  <button class="btn-sm" id="btnExport" style="display:none" onclick="exportSpielstand()">💾 Speichern</button>
  <button class="btn-sm" onclick="$('#importFile').click()">📂 Laden</button>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importSpielstand(this)">
</header>
<main><div id="screen"></div>
<footer>Kaiser · Hommage an den C64-Klassiker von 1984 · eigenständige Neuimplementierung</footer>
</main>
<script>
"use strict";
/* ============================================================
   KAISER — Hommage an den C64-Klassiker von 1984
   Eigenständige Neu-Implementierung · Hotseat · 1-9 Spieler
   ============================================================ */

const TITEL = [
  ["Herr","Dame"],["Baron","Baronin"],["Landgraf","Landgräfin"],["Markgraf","Markgräfin"],
  ["Fürst","Fürstin"],["Herzog","Herzogin"],["Kurfürst","Kurfürstin"],["König","Königin"],["Kaiser","Kaiserin"]
];
const NAMEN = ["Friedrich","Anna","Wilhelm","Luise","Karl","Sophie","Otto","Marie","Georg"];
const KOSTEN = { markt:1000, muehle:2000, palastTeil:5000, domTeil:9000, inf:100, kav:250, art:500 };
const LAND   = { palast:13000, dom:25000 };
const PALAST_TEILE = 16, DOM_TEILE = 14;
const JUSTIZ = ["","sehr fair","fair","streng","gierig"];
const PHASEN = ["Status","Korn","Handel","Zw.-Bilanz","Steuern","Bauen","Bilanz"];
const WETTER = [
  { t:"Dürre — die Felder verdorren",        ico:"☀️", f:0.55, w:8  },
  { t:"Verregneter Sommer",                  ico:"🌧️", f:0.78, w:12 },
  { t:"Wechselhaftes Jahr",                  ico:"⛅",  f:0.95, w:34 },
  { t:"Gutes Erntewetter",                   ico:"🌤️", f:1.10, w:30 },
  { t:"Goldener Sommer",                     ico:"🌻", f:1.25, w:12 },
  { t:"Ein Prachtjahr, wie es selten kommt", ico:"🌟", f:1.45, w:4  }
];

const G = { spieler:[], aktiv:0, jahr:1700, tempo:1, screen:"title", sieger:null, _kr:null, _s:null };

/* ---------- Helfer ---------- */
const $  = s => document.querySelector(s);
const fmt = n => Math.round(n).toLocaleString("de-DE");
const ri  = (a,b) => a + Math.floor(Math.random()*(b-a+1));
const rf  = (a,b) => a + Math.random()*(b-a);
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const cur = () => G.spieler[G.aktiv];
const titelName = p => TITEL[p.titel][p.w?1:0];
const anrede = p => (p.w?"Ihre":"Seine") + " " + (p.titel>=7?"Majestät":p.titel>=4?"Hoheit":"Exzellenz");

function neuerSpieler(name,w){
  return {
    name, w,
    geld:15000, land:10000, korn:400, pop:2500,
    maerkte:0, muehlen:0, palast:0, dom:0,
    heer:{inf:0,kav:0,art:0},
    zoll:10, einkSt:20, mwSt:15, justiz:2,
    titel:0, stimmung:60,
    kornPreis:ri(70,120), landPreis:ri(16,70),
    todesJahr: (G.tempo>1 ? ri(1739,1746) : ri(1760,1768)) + Math.random(),
    tot:false,
    ausgabe:0, kriegGefuehrt:false,
    turnStart:0, report:null, zb:null
  };
}

const bauplaetze = p => Math.floor(p.land/1000);
const minLand = p => Math.max((p.maerkte+p.muehlen)*1000, p.palast>0?LAND.palast:0, p.dom>0?LAND.dom:0);
const freiLand  = p => Math.max(0, p.land - minLand(p));
const staedte   = p => Math.min(Math.floor(p.maerkte/5), Math.floor(p.muehlen/3));
const noetigKorn = p => Math.ceil(p.pop/10);
const miliz     = p => p.maerkte*50;
/* Bebauung konkurriert mit Anbaufläche (Original-Zielkonflikt) */
const bebautFarm = p => (p.maerkte+p.muehlen)*250
  + Math.ceil(p.palast*1000/PALAST_TEILE) + Math.ceil(p.dom*1500/DOM_TEILE);
const anbau = p => Math.max(0, p.land - bebautFarm(p));
const heerStaerke = h => h.inf + h.kav*2.5 + h.art*4;
const heerGroesse = h => h.inf + h.kav + h.art;
const unterhalt = p => Math.round((p.heer.inf*10 + p.heer.kav*25 + p.heer.art*50) * (1 + p.titel*0.1));

/* Beförderungs-Bedingungen: Index = Ziel-Titel */
const BEDINGUNGEN = [
  null,
  { txt:"3.000 Einwohner",                              ok:p=>p.pop>=3000 },
  { txt:"4.000 Einwohner, 2 Märkte",                    ok:p=>p.pop>=4000 && p.maerkte>=2 },
  { txt:"5.000 Einwohner, 4 Märkte, 1 Mühle",           ok:p=>p.pop>=5000 && p.maerkte>=4 && p.muehlen>=1 },
  { txt:"6.500 Einwohner, 1 Stadt (5 Märkte + 3 Mühlen)", ok:p=>p.pop>=6500 && staedte(p)>=1 },
  { txt:"8.000 Einwohner, 2 Städte",                    ok:p=>p.pop>=8000 && staedte(p)>=2 },
  { txt:"10.000 Einwohner, 2 Städte, 50.000 Taler",     ok:p=>p.pop>=10000 && staedte(p)>=2 && p.geld>=50000 },
  { txt:"Palast vollendet (16 Teile), 12.000 Einwohner", ok:p=>p.palast>=PALAST_TEILE && p.pop>=12000 },
  { txt:"Kathedrale vollendet (14 Teile), 5 Städte, 25.000 ha, 100.000 Taler",
    ok:p=>p.dom>=DOM_TEILE && staedte(p)>=5 && p.land>=25000 && p.geld>=100000 }
];

function score(p){
  return p.titel*1e6 + p.geld + p.land*10 + p.pop*20 + (p.maerkte+p.muehlen)*2000
       + p.palast*5000 + p.dom*9000;
}

/* ---------- Sound (Web Audio, eigene kleine Fanfaren) ---------- */
let _ac = null, muted = false;
function toggleMute(){ muted = !muted; $("#btnMute").textContent = muted ? "🔇" : "🔊"; }
function beep(freq, dur, delay=0, type="triangle", vol=0.12){
  if(muted) return;
  try{
    _ac = _ac || new (window.AudioContext||window.webkitAudioContext)();
    const t = _ac.currentTime + delay;
    const o = _ac.createOscillator(), g = _ac.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(_ac.destination);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  }catch(e){}
}
const sKlick    = () => beep(660, .04, 0, "sine", .05);
const sMuenze   = () => { beep(880,.07,0,"square",.06); beep(1320,.09,.06,"square",.05); };
const sFanfare  = () => [392,523,659,784].forEach((f,i)=>beep(f,.28,i*.14,"triangle",.14));
const sKroenung = () => [392,523,659,784,1047,784,1047].forEach((f,i)=>beep(f,.3,i*.18,"triangle",.15));
const sTrommel  = () => { for(let i=0;i<4;i++) beep(98,.09,i*.16,"square",.1); };
const sSchlag   = () => beep(140,.12,0,"sawtooth",.09);
const sGlocke   = () => [660,587,523].forEach((f,i)=>beep(f,.6,i*.5,"sine",.12));
const sNieder   = () => [330,294,262,196].forEach((f,i)=>beep(f,.25,i*.15,"sawtooth",.08));
document.addEventListener("click", e => { if(e.target.closest("button")) sKlick(); }, true);

/* ---------- Konfetti ---------- */
function konfetti(n=70){
  const farben = ["#e0b458","#4cc38a","#5fb8d4","#e5636f","#e8e6df","#d9973f"];
  for(let i=0;i<n;i++){
    const d = document.createElement("div");
    d.className = "confetti";
    d.style.left = Math.random()*100 + "vw";
    d.style.background = farben[i % farben.length];
    d.style.animationDuration = rf(2.2,4.5) + "s";
    d.style.animationDelay = rf(0,0.8) + "s";
    d.style.transform = `rotate(${ri(0,360)}deg)`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(), 6000);
  }
}

/* ---------- SVG-Monumente (wachsen Teil für Teil) ---------- */
function svgPalast(teile){
  let b = "";
  for(let i=0;i<PALAST_TEILE;i++){
    const x = 6 + (i%8)*13, y = 48 - Math.floor(i/8)*16;
    b += `<rect x="${x}" y="${y}" width="11" height="14" rx="1.5"
      fill="${i<teile?'#e8e6df':'none'}" stroke="${i<teile?'#e8e6df':'#3a4558'}" stroke-width="1"/>`;
  }
  const fertig = teile>=PALAST_TEILE;
  return `<svg width="116" height="78" viewBox="0 0 116 78" role="img" aria-label="Palast">
    <rect x="2" y="64" width="112" height="6" rx="2" fill="#3a4558"/>
    ${b}
    <polygon points="58,6 40,26 76,26" fill="${fertig?'#e0b458':'none'}" stroke="${fertig?'#e0b458':'#3a4558'}"/>
    ${fertig?'<circle cx="58" cy="2.5" r="2.5" fill="#e0b458"/>':''}
  </svg>`;
}
function svgDom(teile){
  let b = "";
  for(let i=0;i<DOM_TEILE;i++){
    const x = 10 + (i%7)*14, y = 52 - Math.floor(i/7)*17;
    b += `<rect x="${x}" y="${y}" width="12" height="15" rx="1.5"
      fill="${i<teile?'#e0b458':'none'}" stroke="${i<teile?'#e0b458':'#3a4558'}" stroke-width="1"/>`;
  }
  const fertig = teile>=DOM_TEILE;
  return `<svg width="118" height="86" viewBox="0 0 118 86" role="img" aria-label="Kathedrale">
    <rect x="2" y="70" width="114" height="6" rx="2" fill="#3a4558"/>
    ${b}
    <polygon points="59,2 46,30 72,30" fill="${fertig?'#c79a3d':'none'}" stroke="${fertig?'#c79a3d':'#3a4558'}"/>
    ${fertig?'<path d="M59 -2 v8 M55 1 h8" stroke="#e0b458" stroke-width="2"/>':''}
  </svg>`;
}

/* ---------- Zwischenbilanz (nach Kornausgabe & Handel) ---------- */
function zwischenbilanz(p){
  const r = { ereignisse:[] };
  const noetig = noetigKorn(p);
  const f = noetig>0 ? p.ausgabe/noetig : 1;

  const ev = Math.random();
  if(ev < 0.05 && p.pop > 1200){
    const opfer = Math.round(p.pop * rf(0.12,0.28));
    p.pop -= opfer;
    r.ereignisse.push({t:`Die Pest wütet im Land! ${fmt(opfer)} Untertanen sterben.`,c:"bad"});
  } else if(ev < 0.10){
    const zuzug = Math.round(p.pop * rf(0.02,0.05));
    p.pop += zuzug;
    r.ereignisse.push({t:`Ein Treck von Siedlern trifft ein: +${fmt(zuzug)} Einwohner.`,c:"good"});
  }

  p.stimmung = Math.round(clamp(
    90 - (p.einkSt+p.mwSt)*0.8 - p.zoll*0.4 - (p.justiz-2)*10 + (f-1)*40, 5, 100));

  const g = G.tempo;
  r.geburten   = Math.round(p.pop * 0.04 * (0.5 + p.stimmung/100) * g);
  r.tote       = Math.round(p.pop * 0.018);
  r.verhungert = f < 1 ? Math.round(p.pop * (1-f) * 0.5) : 0;
  r.migration  = Math.round(p.pop * 0.05 * (p.stimmung-50)/100 * g);
  p.pop = Math.max(50, p.pop + r.geburten - r.tote - r.verhungert + r.migration);
  r.f = f;
  p.zb = r;
}

/* ---------- Jahresschluss (Ernte, Steuern, Heer) ---------- */
function jahresschluss(p){
  const r = { ereignisse:[] };

  /* Wetter & Ernte */
  const summe = WETTER.reduce((s,w)=>s+w.w,0);
  let roll = Math.random()*summe, wetter = WETTER[2];
  for(const w of WETTER){ roll -= w.w; if(roll<=0){ wetter = w; break; } }
  r.wetter = wetter;
  const bearbeitet = Math.min(p.pop*4, anbau(p));
  const ertrag = rf(0.038,0.050) * wetter.f * (1 + Math.min(p.muehlen*0.05, 1.0));
  r.ernte = Math.round(bearbeitet * ertrag);
  p.korn += r.ernte;

  /* Wirtschafts-Ereignisse */
  const ev = Math.random();
  if(ev < 0.07){
    const verlust = Math.round(p.korn * rf(0.2,0.4));
    p.korn -= verlust;
    r.ereignisse.push({t:`Ratten im Kornspeicher! ${fmt(verlust)} Fuder vernichtet.`,c:"bad"});
  } else if(ev < 0.11 && (p.maerkte>0 || p.muehlen>0)){
    if(p.maerkte>0 && (p.muehlen===0 || Math.random()<0.5)){ p.maerkte--; r.ereignisse.push({t:"Feuersbrunst! Ein Markt brennt nieder.",c:"bad"}); }
    else { p.muehlen--; r.ereignisse.push({t:"Feuersbrunst! Eine Mühle brennt nieder.",c:"bad"}); }
  }

  /* Steuern & Heer-Unterhalt */
  r.steuern = Math.round(p.pop*(p.einkSt*0.08 + p.mwSt*0.05)/10)*10
            + p.zoll*p.maerkte*6 + p.maerkte*150 + staedte(p)*2000;
  p.geld += r.steuern;
  r.unterhalt = unterhalt(p);
  p.geld -= r.unterhalt;
  if(r.unterhalt > 0 && p.geld < 0){
    const rest = Math.max(0, Math.round(heerGroesse(p.heer)*0.7));
    const verlust = heerGroesse(p.heer) - rest;
    if(verlust > 0){
      const q = rest / Math.max(1, heerGroesse(p.heer));
      p.heer.inf = Math.floor(p.heer.inf*q); p.heer.kav = Math.floor(p.heer.kav*q); p.heer.art = Math.floor(p.heer.art*q);
      r.ereignisse.push({t:`Der Sold bleibt aus — ${fmt(verlust)} Söldner desertieren!`,c:"bad"});
    }
  }

  /* Zeitfaktor */
  const dauer = (Date.now() - p.turnStart)/1000;
  r.ueberzeit = Math.max(0, dauer - 90);
  if(r.ueberzeit > 0) p.todesJahr -= r.ueberzeit/180;

  p.report = r;
  quicksave();
}

function pruefeBefoerderung(p){
  if(p.titel >= 8) return false;
  const b = BEDINGUNGEN[p.titel+1];
  if(p.geld > 0 && b.ok(p)){ p.titel++; return true; }
  return false;
}

/* ---------- Krieg: Nachbarschaft & Diplomatie ---------- */
function lebende(){ return G.spieler.map((p,i)=>({p,i})).filter(x=>!x.p.tot); }
function nachbarn(i){
  const l = lebende().map(x=>x.i);
  if(l.length<=2) return l.filter(x=>x!==i);
  const pos = l.indexOf(i);
  return [ l[(pos-1+l.length)%l.length], l[(pos+1)%l.length] ];
}
/* kürzester Weg (über lebende Spieler im Sitzkreis) von a nach b, exklusive Endpunkte */
function wegZwischen(a,b){
  const l = lebende().map(x=>x.i);
  const pa = l.indexOf(a), pb = l.indexOf(b), n = l.length;
  const d1 = (pb-pa+n)%n, d2 = (pa-pb+n)%n;
  const richtung = d1<=d2 ? 1 : -1, dist = Math.min(d1,d2);
  const weg = [];
  for(let s=1;s<dist;s++) weg.push(l[(pa+richtung*s+n)%n]);
  return weg;
}

function kriegVorbereiten(zielIdx){
  const a = G.aktiv, d = zielIdx;
  const weg = wegZwischen(a,d);
  const fragen = lebende().map(x=>x.i).filter(i=>i!==a && i!==d);
  G._kr = { a, d, weg, fragen, frageIdx:0, wahl:{}, abgebrochen:false };
  if(fragen.length) zeige("diplomatie");
  else schlachtStarten();
}
function diploWahl(wahl){
  const kr = G._kr;
  kr.wahl[kr.fragen[kr.frageIdx]] = wahl;
  kr.frageIdx++;
  if(kr.frageIdx < kr.fragen.length){ zeige("diplomatie"); return; }
  /* Durchmarsch prüfen: jeder Wegspieler muss Angreifer unterstützen oder Durchmarsch gewähren */
  const blockiert = kr.weg.some(i => !["atk","frei"].includes(kr.wahl[i]));
  if(blockiert){
    kr.abgebrochen = true;
    cur().kriegGefuehrt = true;
    zeige("kriegAbbruch");
    return;
  }
  schlachtStarten();
}

/* ---------- Schlacht (animiert) ---------- */
function seiteBauen(besitzerIdx, unterstuetzer, verteidigt){
  const eig = G.spieler[besitzerIdx];
  const pools = [{ idx:besitzerIdx, name:eig.name, inf:eig.heer.inf, kav:eig.heer.kav, art:eig.heer.art }];
  for(const ui of unterstuetzer){
    const u = G.spieler[ui];
    pools.push({ idx:ui, name:u.name, inf:u.heer.inf, kav:u.heer.kav, art:u.heer.art });
  }
  const m = miliz(eig);
  const aufgebot = verteidigt ? Math.round(eig.pop*0.02) : 0;
  return { pools, miliz:m, aufgebot,
    inf: pools.reduce((s,x)=>s+x.inf,0),
    kav: pools.reduce((s,x)=>s+x.kav,0),
    art: pools.reduce((s,x)=>s+x.art,0) };
}
const seiteStaerke = s =>
  s.inf + s.kav*2.5 + s.art*4 + s.miliz*0.8 + s.aufgebot*0.5;

function schlachtStarten(){
  const kr = G._kr;
  const helferA = kr.fragen.filter(i=>kr.wahl[i]==="atk");
  const helferD = kr.fragen.filter(i=>kr.wahl[i]==="def");
  const A = seiteBauen(kr.a, helferA, false);
  const D = seiteBauen(kr.d, helferD, true);
  G._s = {
    A, D, helferA, helferD,
    strA0: Math.max(1,seiteStaerke(A)), strD0: Math.max(1,seiteStaerke(D)*1.2),
    tick:0, maxTicks:6, log:[], fertig:false, sieger:null, iv:null
  };
  cur().kriegGefuehrt = true;
  sTrommel();
  zeige("schlacht");
  G._s.iv = setInterval(schlachtTick, 850);
}
function schaden(seite, anteil){
  const q = 1 - anteil;
  for(const k of ["inf","kav","art"]){ seite[k] = Math.floor(seite[k]*q); }
  seite.miliz = Math.floor(seite.miliz*q);
  seite.aufgebot = Math.floor(seite.aufgebot*q);
  for(const p of seite.pools){ p.inf=Math.floor(p.inf*q); p.kav=Math.floor(p.kav*q); p.art=Math.floor(p.art*q); }
}
function schlachtTick(){
  const s = G._s;
  if(!s || s.fertig) return;
  s.tick++;
  const strA = seiteStaerke(s.A)*rf(0.85,1.15);
  const strD = seiteStaerke(s.D)*1.2*rf(0.85,1.15);
  const dmgD = strA/(strA+strD) * 0.22;
  const dmgA = strD/(strA+strD) * 0.22;
  const vorherA = s.A.inf+s.A.kav+s.A.art+s.A.miliz;
  const vorherD = s.D.inf+s.D.kav+s.D.art+s.D.miliz+s.D.aufgebot;
  schaden(s.A, dmgA); schaden(s.D, dmgD);
  const gefA = vorherA - (s.A.inf+s.A.kav+s.A.art+s.A.miliz);
  const gefD = vorherD - (s.D.inf+s.D.kav+s.D.art+s.D.miliz+s.D.aufgebot);
  s.log.unshift(`Gefecht ${s.tick}: Angreifer verliert ${fmt(gefA)}, Verteidiger ${fmt(gefD)} Mann.`);
  sSchlag();
  if(s.tick >= s.maxTicks){
    s.fertig = true;
    clearInterval(s.iv);
    s.sieger = seiteStaerke(s.A) > seiteStaerke(s.D)*1.2 ? "A" : "D";
    schlachtAbschliessen();
  }
  if(G.screen === "schlacht") render();
}
function schlachtUeberspringen(){
  const s = G._s;
  if(!s) return;
  clearInterval(s.iv);
  while(!s.fertig){
    s.tick++;
    const strA = seiteStaerke(s.A)*rf(0.85,1.15);
    const strD = seiteStaerke(s.D)*1.2*rf(0.85,1.15);
    schaden(s.A, strD/(strA+strD)*0.22);
    schaden(s.D, strA/(strA+strD)*0.22);
    if(s.tick >= s.maxTicks){
      s.fertig = true;
      s.sieger = seiteStaerke(s.A) > seiteStaerke(s.D)*1.2 ? "A" : "D";
    }
  }
  schlachtAbschliessen();
  render();
}
function schlachtAbschliessen(){
  const s = G._s, kr = G._kr;
  const ang = G.spieler[kr.a], ver = G.spieler[kr.d];
  /* Verluste in die stehenden Heere zurückschreiben (Leihtruppen kehren dezimiert heim) */
  for(const pool of s.A.pools) Object.assign(G.spieler[pool.idx].heer, {inf:pool.inf,kav:pool.kav,art:pool.art});
  for(const pool of s.D.pools) Object.assign(G.spieler[pool.idx].heer, {inf:pool.inf,kav:pool.kav,art:pool.art});
  if(s.sieger === "A"){
    const beute = Math.min(Math.round(ver.land*0.15), Math.max(0,freiLand(ver)));
    ver.land -= beute; ang.land += beute;
    const gefallene = Math.round(ver.pop*0.03);
    ver.pop -= gefallene;
    ver.stimmung = clamp(ver.stimmung-10,5,100);
    ang.stimmung = clamp(ang.stimmung-5,5,100);
    s.ergebnis = `Sieg! Eure Truppen erobern ${fmt(beute)} ha von ${ver.name}. ${fmt(gefallene)} Feinde fallen.`;
    setTimeout(sFanfare, 300);
  } else {
    const tribut = Math.round(Math.max(0,ang.geld)*0.2);
    ang.geld -= tribut; ver.geld += tribut;
    ang.stimmung = clamp(ang.stimmung-15,5,100);
    s.ergebnis = `Niederlage! Euer Heer wird geschlagen. Ihr zahlt ${fmt(tribut)} Taler Tribut an ${ver.name}.`;
    setTimeout(sNieder, 300);
  }
  quicksave();
}

/* ---------- Speichern & Laden ---------- */
function storageOK(){
  try{ const t="__kaiser_t"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t); return true; }
  catch(e){ return false; }
}
function spielstand(){ return JSON.stringify({v:3, jahr:G.jahr, tempo:G.tempo, aktiv:G.aktiv, spieler:G.spieler}); }
function ladeSpielstand(json){
  const d = JSON.parse(json);
  if(!d || !Array.isArray(d.spieler) || !d.spieler.length) throw new Error("ungültig");
  G.jahr = d.jahr; G.tempo = d.tempo; G.aktiv = clamp(d.aktiv||0,0,d.spieler.length-1);
  G.spieler = d.spieler;
  for(const p of G.spieler){ if(!p.heer) p.heer = {inf:0,kav:0,art:0}; }
  G.sieger = null;
  zeige("handoff");
}
function exportSpielstand(){
  const blob = new Blob([spielstand()], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `kaiser-anno-${G.jahr}.json`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}
function importSpielstand(inp){
  const file = inp.files && inp.files[0];
  if(!file) return;
  const rd = new FileReader();
  rd.onload = () => { try{ ladeSpielstand(rd.result); }catch(e){ alertMsg("Diese Datei ist kein gültiger Kaiser-Spielstand."); } };
  rd.readAsText(file);
  inp.value = "";
}
function quicksave(){
  if(!storageOK() || !G.spieler.length) return;
  try{ window.localStorage.setItem("kaiser_save", spielstand()); }catch(e){}
}
function quickload(){
  try{ const s = window.localStorage.getItem("kaiser_save"); if(s) ladeSpielstand(s); }catch(e){}
}
function hatQuicksave(){
  try{ return storageOK() && !!window.localStorage.getItem("kaiser_save"); }catch(e){ return false; }
}

/* ---------- Ablauf ---------- */
function starteSpiel(anzahl, namen, geschlechter, tempo){
  G.tempo = tempo; G.spieler = [];
  for(let i=0;i<anzahl;i++)
    G.spieler.push(neuerSpieler(namen[i]||("Spieler "+(i+1)), geschlechter[i]));
  G.jahr = 1700; G.aktiv = 0; G.sieger = null;
  zeige("handoff");
}
function beginneZug(){
  const p = cur();
  let kp = p.kornPreis + (110 - p.kornPreis)*0.2 + rf(-45,45);
  if(Math.random() < 0.06) kp *= rf(1.6,2.6);
  p.kornPreis = clamp(Math.round(kp), 20, 430);
  p.landPreis = ri(16,70);
  p.kriegGefuehrt = false;
  p.ausgabe = 0;
  p.turnStart = Date.now();
  zeige("status");
}
function naechsterSpieler(){
  quicksave();
  do {
    G.aktiv++;
    if(G.aktiv >= G.spieler.length){ G.aktiv = 0; G.jahr++; }
    const p = cur();
    if(G.jahr >= p.todesJahr && !p.tot){ p.tot = true; sGlocke(); zeige("tod"); return; }
  } while(cur().tot && !alleTot());
  if(alleTot()){ zeige("ende"); return; }
  zeige("handoff");
}
const alleTot = () => G.spieler.every(p=>p.tot);

/* ---------- Anzeige ---------- */
let timerIv = null;
function zeige(s){ G.screen = s; render(); }

function kopf(){
  const inSpiel = G.spieler.length>0;
  $("#hJahr").style.display = inSpiel ? "" : "none";
  $("#btnExport").style.display = inSpiel ? "" : "none";
  if(inSpiel) $("#hJahr").innerHTML = `Anno <b>${G.jahr}</b>`;
  const turnScreens = ["status","korn","handel","zwbilanz","steuern","bauen","kriegPlan","diplomatie","schlacht","kriegErgebnis","kriegAbbruch"];
  const p = inSpiel ? cur() : null;
  $("#hSpieler").style.display = (inSpiel && p && !p.tot && turnScreens.concat(["bilanz"]).includes(G.screen)) ? "" : "none";
  if(p) $("#hSpieler").innerHTML = `${p.w?"♛":"♚"} <b>${titelName(p)} ${p.name}</b>`;
  $("#hTimer").style.display = "none";
  clearInterval(timerIv);
  if(inSpiel && turnScreens.includes(G.screen) && G.screen!=="schlacht"){
    $("#hTimer").style.display = "";
    const tick = () => {
      const t = Math.floor((Date.now()-cur().turnStart)/1000);
      $("#hTimer").innerHTML = t>90 ? `⏳ <b>${t}s</b> — Euer Leben verrinnt!` : `⏱ <b>${t}s</b> / 90s`;
      $("#hTimer").className = "chip" + (t>90 ? " warn" : "");
    };
    tick(); timerIv = setInterval(tick, 1000);
  }
}

function stepper(akt){

}

            <tr><td>Kornspeicher</td><td class="r"><b>${fmt(p.korn)} Fuder</b></td></tr>
            <tr><td>Nötiges Korn <span class="muted small">(${fmt(p.pop)} Untertanen)</span></td><td class="r"><b class="gold">${fmt(n)} Fuder</b></td></tr>
          </table>
          <p class="muted small" style="margin-top:10px">Wer mehr als das nötige Korn ausgibt,
          lockt Einwanderer an und hebt die Stimmung. Wer weniger ausgibt, lässt sein Volk hungern.</p>
        </div>
        <div class="card">
          <h3>Ausgabe festlegen</h3>
          <div class="rowflex">
            <input type="number" id="ausg" min="0" max="${p.korn}" value="${Math.min(n,p.korn)}"> Fuder
          </div>
          <div class="rowflex">
            <button class="btn-sm" onclick="$('#ausg').value=${Math.min(n,p.korn)}">Nötig</button>
            <button class="btn-sm" onclick="$('#ausg').value=${Math.min(Math.ceil(n*1.25),p.korn)}">+25 %</button>
            <button class="btn-sm" onclick="$('#ausg').value=${Math.min(Math.ceil(n*1.5),p.korn)}">+50 %</button>
            <button class="btn-sm" onclick="$('#ausg').value=${p.korn}">Alles</button>
          </div>
        </div>
      </div>
      <button class="btn-primary btn-lg" onclick="kornAusgeben()">Ausgeben &amp; weiter</button>`;
  },

  handel(){
    const p = cur();
    return `
      ${stepper("Handel")}
      <h2>Markt — Korn- und Landhandel</h2>
      <div class="grid g2">
        <div class="card">
          <h3>🌾 Korn — ${fmt(p.kornPreis)} Taler / Fuder</h3>
          <p class="muted small">Schwankt zwischen 20 und 430 Talern. Auf Verkäufe werden 10 % Provision fällig.</p>
          <p style="margin-top:8px">Lager: <b>${fmt(p.korn)} Fuder</b></p>
          <div class="rowflex">Kaufen: <input type="number" id="kkauf" min="0" value="0">
            <button onclick="handelKorn(1)">Kauf</button></div>
          <div class="rowflex">Verkaufen: <input type="number" id="kverk" min="0" max="${p.korn}" value="0">
            <button onclick="handelKorn(-1)">Verkauf</button></div>
        </div>
        <div class="card">
          <h3>🌍 Land — ${fmt(p.landPreis)} Taler / ha</h3>
          <p class="muted small">Schwankt zwischen 16 und 70 Talern. Auf Verkäufe werden 10 % Provision fällig.
          Land unter Euren Gebäuden ist unverkäuflich.</p>
          <p style="margin-top:8px">Verkäuflich: <b>${fmt(freiLand(p))} ha</b></p>
          <div class="rowflex">Kaufen: <input type="number" id="lkauf" min="0" value="0">
            <button onclick="handelLand(1)">Kauf</button></div>
          <div class="rowflex">Verkaufen: <input type="number" id="lverk" min="0" max="${freiLand(p)}" value="0">
            <button onclick="handelLand(-1)">Verkauf</button></div>
        </div>
      </div>
      <div class="card"><b>Vermögen: <span class="${p.geld<0?'red':'gold'}">${fmt(p.geld)} Taler</span></b>
        <span id="hmsg" class="red" style="margin-left:16px"></span></div>
      <button class="btn-primary btn-lg" onclick="handelFertig()">Weiter: Zwischenbilanz</button>`;
  },

  zwbilanz(){
    const p = cur(), r = p.zb;
    const evHtml = r.ereignisse.length
      ? r.ereignisse.map(e=>`<div class="event ${e.c}">${e.t}</div>`).join("") : "";
    const row = (lbl,val,cls="") => `<tr><td>${lbl}</td><td class="r ${cls}">${val}</td></tr>`;
    return `
      ${stepper("Zw.-Bilanz")}
      <h2>Zwischenbilanz</h2>
      ${evHtml}
      <div class="card">
        <table>
          ${row("Geburten", "+"+fmt(r.geburten), "delta-pos")}
          ${row("Natürliche Todesfälle", "−"+fmt(r.tote), "delta-neg")}
          ${r.verhungert?row("Verhungert", "−"+fmt(r.verhungert), "delta-neg"):""}
          ${row(r.migration>=0?"Einwanderung":"Abwanderung", (r.migration>=0?"+":"−")+fmt(Math.abs(r.migration)), r.migration>=0?"delta-pos":"delta-neg")}
          ${row("Untertanen jetzt", "<b>"+fmt(p.pop)+"</b>")}
          ${row("Stimmung des Volkes", p.stimmung+"/100")}
        </table>
      </div>
      ${r.verhungert?'<div class="event bad">Euer Volk hungert! Das spricht sich im Reich herum.</div>':""}
      <button class="btn-primary btn-lg" onclick="zeige('steuern')">Weiter: Steuern</button>`;
  },

  steuern(){
    const p = cur();
    const slider = (id,lbl,min,max,val) => `
      <div class="sliderrow">
        <span>${lbl}</span>
        <input type="range" id="${id}" min="${min}" max="${max}" value="${val}"
          oninput="$('#${id}v').textContent=this.value+' %'">
        <span class="v" id="${id}v">${val} %</span>
      </div>`;
    return `
      ${stepper("Steuern")}
      <h2>Steuern &amp; Justiz</h2>
      <div class="card">
        ${slider("zoll","Zölle",0,40,p.zoll)}
        ${slider("einkSt","Einkommensteuer",0,99,p.einkSt)}
        ${slider("mwSt","Mehrwertsteuer",0,40,p.mwSt)}
        <div class="sliderrow">
          <span>Justiz</span>
          <select id="justiz">
            ${[1,2,3,4].map(j=>`<option value="${j}" ${p.justiz===j?'selected':''}>${JUSTIZ[j]}</option>`).join("")}
          </select><span></span>
        </div>
        <p class="muted small">Hohe Steuern füllen die Kasse, aber drücken die Stimmung —
        unzufriedene Untertanen wandern ab. Gierige Justiz vergrämt das Volk.</p>
      </div>
      <button class="btn-primary btn-lg" onclick="steuernSetzen()">Weiter: Landkarte &amp; Bauen</button>`;
  },

  bauen(){
    const p = cur();
    const kachel = [];
    for(let i=0;i<Math.ceil(p.dom/4);i++)    kachel.push(["t-dom","⛪","Kathedrale"]);
    for(let i=0;i<Math.ceil(p.palast/4);i++) kachel.push(["t-palast","🏛","Palast"]);
    for(let i=0;i<p.muehlen;i++)             kachel.push(["t-muehle","M","Kornmühle"]);
    for(let i=0;i<p.maerkte;i++)             kachel.push(["t-markt","€","Markt"]);
    const acker = Math.floor(Math.min(p.pop*4, anbau(p))/1000);
    for(let i=0;i<acker && kachel.length<118;i++) kachel.push(["t-acker","","Ackerland"]);
    const rest = clamp(Math.floor(p.land/1000) - kachel.length, 0, 120-kachel.length);
    for(let i=0;i<rest;i++)                  kachel.push(["t-frei","","Brachland"]);
    const map = kachel.slice(0,120).map(k=>`<div class="tile ${k[0]}" title="${k[2]}">${k[1]}</div>`).join("");

    const platz = (p.maerkte+p.muehlen) < bauplaetze(p);
    const bBtn = (label,fn,ok) => `<button onclick="${fn}" ${ok?'':'disabled'}>${label}</button>`;
    const gegner = lebende().filter(x=>x.i!==G.aktiv);
    const kriegOk = p.titel>=1 && !p.kriegGefuehrt && gegner.length>0
      && (heerGroesse(p.heer)>0 || miliz(p)>0);
    return `
      ${stepper("Bauen")}
      <h2>Landkarte — ${fmt(p.land)} ha</h2>
      <div class="card">
        <div class="legend">
          <span><span class="tile t-markt"></span> Markt</span>
          <span><span class="tile t-muehle"></span> Kornmühle</span>
          <span><span class="tile t-palast"></span> Palast</span>
          <span><span class="tile t-dom"></span> Kathedrale</span>
          <span><span class="tile t-acker"></span> Ackerland</span>
          <span><span class="tile t-frei"></span> Brachland</span>
        </div>
        <div id="map">${map}</div>
        <p class="muted small">Je 1.000 ha Land ein Bauplatz (${p.maerkte+p.muehlen}/${bauplaetze(p)} belegt) ·
        Bebauung verringert die Anbaufläche (noch ${fmt(anbau(p))} ha Acker) ·
        eine Stadt = 5 Märkte + 3 Mühlen · Märkte bringen Zölle und Miliz (je 50 Mann),
        Mühlen steigern die Ernte (+5 %) · Palast: Gut von 13.000 ha nötig · Kathedrale: Gut von 25.000 ha.</p>
      </div>
      <div class="grid g2">
        <div class="card">
          <h3>Bauen</h3>
          ${bBtn(`Markt — ${fmt(KOSTEN.markt)} T`,"baue('markt')", p.geld>=KOSTEN.markt && platz)}
          ${bBtn(`Mühle — ${fmt(KOSTEN.muehle)} T`,"baue('muehle')", p.geld>=KOSTEN.muehle && platz)}
          ${bBtn(`Palast-Teil ${p.palast}/${PALAST_TEILE} — ${fmt(KOSTEN.palastTeil)} T`,"baue('palast')",
              p.palast<PALAST_TEILE && p.geld>=KOSTEN.palastTeil && p.land>=LAND.palast)}
          ${bBtn(`Dom-Teil ${p.dom}/${DOM_TEILE} — ${fmt(KOSTEN.domTeil)} T`,"baue('dom')",
              p.dom<DOM_TEILE && p.geld>=KOSTEN.domTeil && p.land>=LAND.dom)}
          ${p.land<LAND.palast?`<p class="muted small">Für den Palast fehlen Euch noch ${fmt(LAND.palast-p.land)} ha Land.</p>`:
            p.land<LAND.dom && p.palast>=PALAST_TEILE?`<p class="muted small">Für die Kathedrale fehlen Euch noch ${fmt(LAND.dom-p.land)} ha Land.</p>`:""}
        </div>
        <div class="card">
          <h3>⚔️ Militär <span class="muted small">— stehendes Heer</span></h3>
          <table>
            <tr><td>Infanterie <span class="muted small">${fmt(KOSTEN.inf)} T, Sold 10 T/J</span></td>
                <td class="r">${fmt(p.heer.inf)}</td>
                <td class="r"><button class="btn-sm" onclick="werbe('inf',10)" ${p.geld>=KOSTEN.inf*10?'':'disabled'}>+10</button></td></tr>
            <tr><td>Kavallerie <span class="muted small">${fmt(KOSTEN.kav)} T, Sold 25 T/J</span></td>
                <td class="r">${fmt(p.heer.kav)}</td>
                <td class="r"><button class="btn-sm" onclick="werbe('kav',5)" ${p.geld>=KOSTEN.kav*5?'':'disabled'}>+5</button></td></tr>
            <tr><td>Artillerie <span class="muted small">${fmt(KOSTEN.art)} T, Sold 50 T/J</span></td>
                <td class="r">${fmt(p.heer.art)}</td>
                <td class="r"><button class="btn-sm" onclick="werbe('art',2)" ${p.geld>=KOSTEN.art*2?'':'disabled'}>+2</button></td></tr>
            <tr><td>Miliz <span class="muted small">aus ${p.maerkte} Märkten, gratis</span></td>
                <td class="r">${fmt(miliz(p))}</td><td></td></tr>
          </table>
          <p class="muted small" style="margin-top:6px">Unterhalt: <b>${fmt(unterhalt(p))} T/Jahr</b>
            — der Sold steigt mit Eurem Rang (+10 % je Titel).</p>
          ${heerGroesse(p.heer)>0?`<button class="btn-sm" onclick="entlassen()">Heer auflösen</button>`:""}
        </div>
      </div>
      <div class="card"><b>Vermögen: <span class="${p.geld<0?'red':'gold'}">${fmt(p.geld)} Taler</span></b></div>
      <button class="btn-danger" onclick="zeige('kriegPlan')" ${kriegOk?'':'disabled'}>⚔️ Krieg führen</button>
      <button class="btn-primary btn-lg" onclick="jahrAbschliessen()">Jahr abschließen</button>
      ${p.titel<1?'<p class="muted small">Krieg ist erst ab dem Rang Baron möglich. Ein Feldzug pro Jahr.</p>':''}`;
  },

  kriegPlan(){
    const p = cur();
    const nb = nachbarn(G.aktiv);
    const ziele = lebende().filter(x=>x.i!==G.aktiv);
    const opts = ziele.map(z=>{
      const adj = nb.includes(z.i);
      const weg = adj ? [] : wegZwischen(G.aktiv, z.i);
      return `<option value="${z.i}">${titelName(z.p)} ${z.p.name} — ${fmt(z.p.land)} ha, ${fmt(z.p.pop)} Einw.${adj?" · Nachbar":" · Durchmarsch über "+weg.map(i=>G.spieler[i].name).join(", ")}</option>`;
    }).join("");
    return `
      ${stepper("Bauen")}
      <h2>⚔️ Feldzug planen</h2>
      <div class="card">
        <div class="rowflex">Gegner: <select id="ziel" style="max-width:100%">${opts}</select></div>
        <table>
          <tr><th>Eure Streitmacht</th><th class="r">Stärke</th></tr>
          <tr><td>Infanterie</td><td class="r">${fmt(p.heer.inf)}</td></tr>
          <tr><td>Kavallerie</td><td class="r">${fmt(p.heer.kav)}</td></tr>
          <tr><td>Artillerie</td><td class="r">${fmt(p.heer.art)}</td></tr>
          <tr><td>Miliz</td><td class="r">${fmt(miliz(p))}</td></tr>
        </table>
        <p class="muted small" style="margin-top:8px">Vor der Schlacht werden die übrigen Regenten
        befragt: Sie können Euch oder den Verteidiger mit ihrem Heer unterstützen (die Miliz bleibt
        stets daheim) oder neutral bleiben. Liegt das Ziel nicht an Eurer Grenze, braucht Ihr
        Durchmarschrechte aller Reiche auf dem Weg. Der Verteidiger hat Heimvorteil und ruft
        zusätzlich das Volksaufgebot.</p>
      </div>
      <button class="btn-danger btn-lg" onclick="kriegVorbereiten(+$('#ziel').value)">Zu den Waffen!</button>
      <button class="btn-lg" onclick="zeige('bauen')">Doch kein Krieg</button>`;
  },

  diplomatie(){
    const kr = G._kr;
    const frag = G.spieler[kr.fragen[kr.frageIdx]];
    const ang = G.spieler[kr.a], ver = G.spieler[kr.d];
    const aufWeg = kr.weg.includes(kr.fragen[kr.frageIdx]);
    return `
      <div class="hero" style="padding-top:30px">
        <span class="crown">📜</span>
        <h2 style="font-size:24px">Botschaft an ${titelName(frag)} ${frag.name}</h2>
        <p style="margin:12px auto;max-width:560px">
          <b class="gold">${titelName(ang)} ${ang.name}</b> zieht gegen
          <b class="cyan">${titelName(ver)} ${ver.name}</b> in den Krieg.
          ${aufWeg?"Der Heerzug führt durch <b>Euer</b> Gebiet.":""}
          Wie haltet Ihr es, ${titelName(frag)} ${frag.name}?</p>
        <p class="muted small" style="margin-bottom:18px">Unterstützt Ihr eine Seite, kämpft Euer
        stehendes Heer (${fmt(heerGroesse(frag.heer))} Mann) mit — Eure Miliz bleibt daheim.</p>
        <div>
          <button class="btn-lg" onclick="diploWahl('atk')">⚔️ Angreifer unterstützen</button>
          <button class="btn-lg" onclick="diploWahl('def')">🛡️ Verteidiger unterstützen</button>
        </div>
        <div>
          ${aufWeg
            ? `<button class="btn-lg" onclick="diploWahl('frei')">🕊️ Neutral — Durchmarsch gewähren</button>
               <button class="btn-lg" onclick="diploWahl('sperr')">🚫 Neutral — Durchmarsch verweigern</button>`
            : `<button class="btn-lg" onclick="diploWahl('frei')">🕊️ Neutral bleiben</button>`}
        </div>
      </div>`;
  },

  kriegAbbruch(){
    const kr = G._kr;
    const sperrer = kr.weg.filter(i=>!["atk","frei"].includes(kr.wahl[i])).map(i=>G.spieler[i].name).join(", ");
    return `
      <h2>Feldzug abgebrochen</h2>
      <div class="card">
        <p class="red" style="font-size:16px">Kein Durchkommen! ${sperrer} verweigert Euren Truppen
        den Durchmarsch — das Heer kehrt unverrichteter Dinge heim.</p>
        <p class="muted" style="margin-top:8px">Die Gelegenheit dieses Jahres ist vertan.</p>
      </div>
      <button class="btn-primary btn-lg" onclick="zeige('bauen')">Weiter</button>`;
  },

  schlacht(){
    const s = G._s, kr = G._kr;
    const ang = G.spieler[kr.a], ver = G.spieler[kr.d];
    const pctA = clamp(seiteStaerke(s.A)/s.strA0*100,0,100);
    const pctD = clamp(seiteStaerke(s.D)*1.2/s.strD0*100,0,100);
    const seite = (S,t,helfer) => `
      <div class="armee ${s.tick>0 && !s.fertig ? 'shake':''}">
        <h4>${t}</h4>
        <div class="u"><span>⚔️ Infanterie</span><b>${fmt(S.inf)}</b></div>
        <div class="u"><span>🐎 Kavallerie</span><b>${fmt(S.kav)}</b></div>
        <div class="u"><span>💣 Artillerie</span><b>${fmt(S.art)}</b></div>
        <div class="u"><span>🛡️ Miliz</span><b>${fmt(S.miliz)}</b></div>
        ${S.aufgebot?`<div class="u"><span>🔥 Volksaufgebot</span><b>${fmt(S.aufgebot)}</b></div>`:""}
        ${helfer.length?`<p class="muted small" style="margin-top:6px">Verbündete: ${helfer.map(i=>G.spieler[i].name).join(", ")}</p>`:""}
      </div>`;
    return `
      <h2>⚔️ Schlacht um ${ver.name}s Land — Gefecht ${Math.min(s.tick,s.maxTicks)}/${s.maxTicks}</h2>
      <div class="battlefield">
        <div>
          ${seite(s.A, `Angreifer: ${ang.name}`, s.helferA)}
          <div class="strbar a"><div style="width:${pctA}%"></div></div>
          <p class="muted small center">Kampfkraft ${Math.round(pctA)} %</p>
        </div>
        <div class="vs">⚔️</div>
        <div>
          ${seite(s.D, `Verteidiger: ${ver.name}`, s.helferD)}
          <div class="strbar d"><div style="width:${pctD}%"></div></div>
          <p class="muted small center">Kampfkraft ${Math.round(pctD)} %</p>
        </div>
      </div>
      <div class="card battlelog">${s.log.map(l=>`<p>${l}</p>`).join("")||'<p class="muted">Die Heere rücken vor …</p>'}</div>
      ${s.fertig
        ? `<div class="card" style="border-color:${s.sieger==='A'?'var(--green)':'var(--red)'}">
             <p class="${s.sieger==='A'?'green':'red'}" style="font-size:17px;font-weight:700">${s.ergebnis}</p>
           </div>
           <button class="btn-primary btn-lg" onclick="zeige('bauen')">Weiter</button>`
        : `<button class="btn-lg" onclick="schlachtUeberspringen()">Schlacht überspringen ⏩</button>`}`;
  },

  bilanz(){
    const p = cur(), r = p.report;
    const evHtml = r.ereignisse.length
      ? r.ereignisse.map(e=>`<div class="event ${e.c}">${e.t}</div>`).join("") : "";
    const row = (lbl,val,cls="") => `<tr><td>${lbl}</td><td class="r ${cls}">${val}</td></tr>`;
    return `
      ${stepper("Bilanz")}
      <h2>Jahresbilanz Anno ${G.jahr}</h2>
      <div class="event ${r.wetter.f>=1.1?'good':r.wetter.f<=0.8?'bad':''}">
        ${r.wetter.ico} <b>Wetter:</b> ${r.wetter.t}
      </div>
      ${evHtml}
      <div class="grid g2">
        <div class="card">
          <h3>Wirtschaft</h3>
          <table>
            ${row("Ernte ("+fmt(Math.min(p.pop*4,anbau(p)))+" ha bestellt)", "+"+fmt(r.ernte)+" Fuder", "delta-pos")}
            ${row("Kornspeicher jetzt", fmt(p.korn)+" Fuder")}
            ${row("Steuern & Wirtschaft", "+"+fmt(r.steuern)+" Taler", "delta-pos")}
            ${r.unterhalt?row("Heer-Unterhalt", "−"+fmt(r.unterhalt)+" Taler", "delta-neg"):""}
            ${row("Vermögen jetzt", fmt(p.geld)+" Taler", p.geld<0?"red":"")}
          </table>
        </div>
        <div class="card">
          <h3>Reich</h3>
          <table>
            ${row("Untertanen", fmt(p.pop))}
            ${row("Stimmung", p.stimmung+"/100")}
            ${row("Städte", staedte(p))}
            ${row("Heer", fmt(heerGroesse(p.heer))+" Mann")}
          </table>
        </div>
      </div>
      ${r.ueberzeit>0?`<div class="event bad">Ihr habt ${Math.round(r.ueberzeit)} Sekunden zu lange regiert — die Sorgen nagen an Eurer Gesundheit.</div>`:""}
      <button class="btn-primary btn-lg" onclick="nachBilanz()">Weiter</button>`;
  },

  befoerderung(){
    const p = cur();
    if(p.titel===8){ G.sieger = p; }
    setTimeout(()=>{ konfetti(p.titel===8?140:70); (p.titel===8?sKroenung:sFanfare)(); }, 150);
    return `
      <div class="hero">
        <span class="crown">🎺</span>
        <p class="gold" style="font-size:17px;letter-spacing:2px">Trompeten erschallen!</p>
        <h1 style="font-size:30px;margin:18px 0">${p.name} wird zu${p.w?"r":"m"} <span class="gold">${titelName(p)}</span> erhoben!</h1>
        ${p.titel===8
          ? `<p class="green" style="font-size:16px">Die Kathedrale ist vollendet — das Reich hat einen neuen ${titelName(p)}!</p>
             <div style="margin-top:24px"><button class="btn-primary btn-lg" onclick="zeige('sieg')">Zur Krönung</button></div>`
          : `<div style="margin-top:24px"><button class="btn-primary btn-lg" onclick="naechsterSpieler()">Weiter</button></div>`}
      </div>`;
  },

  tod(){
    const p = cur();
    return `
      <div class="hero">
        <span class="crown">🕯️</span>
        <h1 class="red" style="font-size:28px">Die Glocken läuten …</h1>
        <p style="font-size:17px;margin:14px 0">${titelName(p)} ${p.name} ist Anno ${G.jahr} verstorben.</p>
        <p class="muted">Höchster Rang: ${titelName(p)} · ${fmt(p.land)} ha · ${fmt(p.pop)} Untertanen</p>
        <div style="margin-top:24px"><button class="btn-primary btn-lg" onclick="naechsterSpieler()">Weiter</button></div>
      </div>`;
  },

  sieg(){
    const p = G.sieger;
    setTimeout(()=>{ konfetti(160); sKroenung(); }, 200);
    return `
      <div class="hero">
        <span class="crown">👑</span>
        <h1 style="font-size:36px">Heil ${p.w?"der Kaiserin":"dem Kaiser"} ${p.name}!</h1>
        <div class="monu" style="margin:16px 0">${svgPalast(p.palast)}${svgDom(p.dom)}</div>
        <p style="margin:14px 0">Anno ${G.jahr} · ${fmt(p.pop)} Untertanen · ${fmt(p.land)} ha · ${fmt(p.geld)} Taler</p>
        <p class="muted">Vom einfachen ${p.w?"Fräulein":"Herrn"} zur Herrschaft über das Reich — das Spiel ist gewonnen.</p>
        <div style="margin-top:24px"><button class="btn-primary btn-lg" onclick="zeige('ende')">Schlusswertung</button></div>
      </div>`;
  },

  ende(){
    const sortiert = [...G.spieler].sort((a,b)=>score(b)-score(a));
    const rows = sortiert.map((p,i)=>`
      <tr style="${i===0?'color:var(--gold);font-weight:700':''}">
        <td>${i+1}.</td><td>${titelName(p)} ${p.name}${p.tot?" †":""}</td>
        <td class="r">${fmt(p.pop)}</td><td class="r">${fmt(p.land)}</td>
        <td class="r">${fmt(p.geld)}</td><td class="r">${fmt(score(p))}</td>
      </tr>`).join("");
    return `
      <h2>Schlusswertung Anno ${G.jahr}</h2>
      <div class="card">
        <table>
          <tr><th></th><th>Name</th><th class="r">Untertanen</th><th class="r">Land (ha)</th><th class="r">Taler</th><th class="r">Punkte</th></tr>
          ${rows}
        </table>
      </div>
      <button class="btn-primary btn-lg" onclick="G.spieler=[];zeige('title')">Neues Spiel</button>`;
  }
};

/* ---------- Aktionen ---------- */
function setupAnzahl(){
  const n = +$("#anz").value;
  for(let i=0;i<9;i++){
    const on = i<n;
    $("#prow"+i).style.opacity = on?1:.3;
    $("#pname"+i).disabled = !on;
    $("#pw"+i).disabled = !on;
  }
}
function setupStart(){
  const n = +$("#anz").value;
  const namen=[], w=[];
  for(let i=0;i<n;i++){
    namen.push(($("#pname"+i).value.trim()||("Spieler "+(i+1))));
    w.push($("#pw"+i).value==="1");
  }
  starteSpiel(n, namen, w, +$("#tempo").value);
}
function kornAusgeben(){
  const p = cur();
  const a = clamp(Math.floor(+$("#ausg").value||0), 0, p.korn);
  p.ausgabe = a; p.korn -= a;
  zeige("handel");
}
function handelFertig(){
  zwischenbilanz(cur());
  zeige("zwbilanz");
}
function handelKorn(dir){
  const p = cur();
  if(dir>0){
    const m = Math.floor(+$("#kkauf").value||0);
    const kosten = m*p.kornPreis;
    if(m<=0) return;
    if(kosten>p.geld){ $("#hmsg").textContent="Zu wenig Taler!"; return; }
    p.geld -= kosten; p.korn += m; sMuenze();
  } else {
    const m = clamp(Math.floor(+$("#kverk").value||0),0,p.korn);
    if(m<=0) return;
    p.korn -= m; p.geld += Math.round(m*p.kornPreis*0.9); sMuenze();
  }
  render();
}
function handelLand(dir){
  const p = cur();
  if(dir>0){
    const m = Math.floor(+$("#lkauf").value||0);
    const kosten = m*p.landPreis;
    if(m<=0) return;
    if(kosten>p.geld){ $("#hmsg").textContent="Zu wenig Taler!"; return; }
    p.geld -= kosten; p.land += m; sMuenze();
  } else {
    const m = clamp(Math.floor(+$("#lverk").value||0),0,freiLand(p));
    if(m<=0) return;
    p.land -= m; p.geld += Math.round(m*p.landPreis*0.9); sMuenze();
  }
  render();
}
function steuernSetzen(){
  const p = cur();
  p.zoll = +$("#zoll").value; p.einkSt = +$("#einkSt").value;
  p.mwSt = +$("#mwSt").value; p.justiz = +$("#justiz").value;
  zeige("bauen");
}
function baue(was){
  const p = cur();
  const platz = (p.maerkte+p.muehlen) < bauplaetze(p);
  if(was==="markt"  && p.geld>=KOSTEN.markt  && platz){ p.geld-=KOSTEN.markt; p.maerkte++; }
  if(was==="muehle" && p.geld>=KOSTEN.muehle && platz){ p.geld-=KOSTEN.muehle; p.muehlen++; }
  if(was==="palast" && p.palast<PALAST_TEILE && p.geld>=KOSTEN.palastTeil && p.land>=LAND.palast){ p.geld-=KOSTEN.palastTeil; p.palast++; }
  if(was==="dom"    && p.dom<DOM_TEILE && p.geld>=KOSTEN.domTeil && p.land>=LAND.dom){ p.geld-=KOSTEN.domTeil; p.dom++; }
  sMuenze();
  render();
}
function werbe(art, n){
  const p = cur();
  const kosten = KOSTEN[art]*n;
  if(p.geld < kosten) return;
  p.geld -= kosten; p.heer[art] += n; sMuenze();
  render();
}
function entlassen(){
  const p = cur();
  p.heer = {inf:0,kav:0,art:0};
  render();
}
function jahrAbschliessen(){
  jahresschluss(cur());
  zeige("bilanz");
}
function nachBilanz(){
  const p = cur();
  if(pruefeBefoerderung(p)){ zeige("befoerderung"); return; }
  naechsterSpieler();
}

/* ---------- Tastatur: Enter = Hauptaktion ---------- */
document.addEventListener("keydown", e => {
  if(e.key !== "Enter") return;
  if(["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName) &&
     document.activeElement.type === "text") return;
  const b = $("#screen .btn-primary");
  if(b && !b.disabled){ e.preventDefault(); b.click(); }
});

render();
</script>
</body>
</html>
