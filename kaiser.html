<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kaiser — Wirtschaftssimulation</title>
<meta name="description" content="Kaiser — Wirtschaftssimulation im 18. Jahrhundert. Steige vom einfachen Herrn zum Kaiser auf: Korn, Land, Steuern, Städte, Diplomatie und Schlachten. 1-9 Spieler, Solo gegen KI-Regenten.">
<meta name="theme-color" content="#0e1117">
<meta property="og:title" content="KAISER — Wirtschaftssimulation im 18. Jahrhundert">
<meta property="og:description" content="Vom einfachen Herrn zum Kaiser: Korn, Land, Steuern, Städte, Diplomatie und Schlachten. 1-9 Spieler, Solo gegen KI-Regenten. Kostenlos im Browser.">
<meta property="og:type" content="website">
<meta property="og:image" content="icon-512.png">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230e1117'/%3E%3Cpath d='M12 44 L16 22 L26 34 L32 16 L38 34 L48 22 L52 44 Z' fill='%23e0b458'/%3E%3Crect x='12' y='46' width='40' height='6' rx='2' fill='%23c79a3d'/%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0e1117; --panel:#161c26; --panel2:#1d2532; --border:#2a3446;
    --txt:#dbe2ee; --muted:#8b96a8; --gold:#e0b458; --gold2:#c79a3d;
    --green:#4cc38a; --red:#e5636f; --cyan:#5fb8d4; --orange:#d9973f;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:radial-gradient(1200px 600px at 50% -100px,#1a2233 0%,var(--bg) 60%);
    color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    min-height:100vh;overflow-x:hidden;
  }
  header{
    position:sticky;top:0;z-index:10;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:12px 20px;background:rgba(14,17,23,.85);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);
  }
  .brand{font-weight:800;font-size:20px;letter-spacing:2px;color:var(--gold);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;}
  /* --- Systemmenü --- */
  details.menu{position:relative;}
  details.menu summary{
    list-style:none;cursor:pointer;font-size:14.5px;font-weight:600;
    background:var(--panel2);border:1px solid var(--border);border-radius:10px;
    padding:6px 12px;user-select:none;
  }
  details.menu summary::-webkit-details-marker{display:none;}
  details.menu[open] summary{border-color:var(--gold);}
  .menu-inhalt{
    position:absolute;right:0;top:calc(100% + 6px);z-index:60;
    background:var(--panel2);border:1px solid var(--border);border-radius:12px;
    padding:8px;min-width:200px;box-shadow:0 14px 40px rgba(0,0,0,.55);
    display:flex;flex-direction:column;gap:2px;
  }
  .menu-inhalt button{margin:0;text-align:left;border:none;background:transparent;border-radius:8px;}
  .menu-inhalt button:hover{background:var(--panel);border:none;}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel2);border:1px solid var(--border);border-radius:999px;
    padding:5px 12px;font-size:13px;color:var(--muted);
  }
  .chip b{color:var(--txt);font-weight:600;}
  .chip.warn{border-color:var(--red);color:var(--red);}
  .spacer{flex:1;}
  main{max-width:1080px;margin:0 auto;padding:22px 20px 60px;}
  #screen{animation:fadein .28s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  h1{font-size:30px;font-weight:800;margin-bottom:6px;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;letter-spacing:.5px;}
  h2{font-size:21px;font-weight:700;margin-bottom:14px;
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;letter-spacing:.3px;}
  h3{font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  p{line-height:1.6;}
  .muted{color:var(--muted);} .gold{color:var(--gold);} .green{color:var(--green);}
  .red{color:var(--red);} .cyan{color:var(--cyan);}
  .small{font-size:13px;} .center{text-align:center;}
  .card{
    background:linear-gradient(180deg,var(--panel2) 0%,var(--panel) 100%);
    border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:16px;
    transition:border-color .2s, transform .15s, box-shadow .2s;
  }
  .card:hover{border-color:#3a4759;}
  ::selection{background:rgba(224,180,88,.35);}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#2a3446;border-radius:99px;}
  ::-webkit-scrollbar-track{background:transparent;}
  #titelbild{width:100%;height:auto;display:block;border-radius:14px;border:1px solid var(--border);}
  .wetter-ico{font-size:30px;display:inline-block;vertical-align:middle;margin-right:8px;
    animation:wippen 3s ease-in-out infinite;}
  @keyframes wippen{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-4px) rotate(3deg);}}
  .grid{display:grid;gap:14px;}
  .g2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
  .stat{
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 16px;
  }
  .stat .ico{font-size:20px;}
  .stat .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:4px 0 2px;}
  .stat .val{font-size:19px;font-weight:700;}
  .bar{height:8px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:8px;}
  .bar>div{height:100%;border-radius:99px;background:var(--gold);transition:width .5s;}
  .stepper{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .step{
    font-size:12px;letter-spacing:.5px;padding:6px 12px;border-radius:999px;
    border:1px solid var(--border);color:var(--muted);background:var(--panel);
  }
  .step.act{background:var(--gold);border-color:var(--gold);color:#1a1509;font-weight:700;}
  .step.done{color:var(--green);border-color:var(--green);}
  button{
    font-family:inherit;font-size:14.5px;font-weight:600;
    background:var(--panel2);color:var(--txt);
    border:1px solid var(--border);border-radius:10px;
    padding:10px 18px;cursor:pointer;margin:4px 8px 4px 0;
    transition:transform .06s, background .15s, border-color .15s, filter .15s;
  }
  button:hover:not(:disabled){border-color:var(--gold);}
  button:active:not(:disabled){transform:scale(.97);}
  button:disabled{opacity:.35;cursor:default;}
  .btn-primary{background:linear-gradient(180deg,var(--gold) 0%,var(--gold2) 100%);color:#1a1509;border-color:var(--gold2);}
  .btn-primary:hover:not(:disabled){filter:brightness(1.08);border-color:var(--gold);}
  .btn-danger{background:transparent;color:var(--red);border-color:var(--red);}
  .btn-danger:hover:not(:disabled){background:var(--red);color:#fff;border-color:var(--red);}
  .btn-lg{font-size:16px;padding:13px 26px;border-radius:12px;}
  .btn-sm{font-size:12.5px;padding:6px 10px;margin:2px 4px 2px 0;}
  input[type=text],input[type=number],select{
    font-family:inherit;font-size:15px;
    background:var(--bg);color:var(--txt);
    border:1px solid var(--border);border-radius:10px;
    padding:9px 12px;width:150px;
  }
  input[type=text]{width:210px;}
  input:focus,select:focus{outline:none;border-color:var(--gold);}
  input[type=range]{width:100%;accent-color:var(--gold);}
  table{width:100%;border-collapse:collapse;}
  td,th{padding:7px 6px;text-align:left;font-size:14.5px;}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums;}
  tr+tr td{border-top:1px solid var(--border);}
  th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;}
  #map{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 12px;}
  .tile{
    width:26px;height:26px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:rgba(0,0,0,.65);
  }
  .t-frei{background:#2e4638;} .t-acker{background:#6f8f3f;}
  .t-markt{background:var(--orange);} .t-muehle{background:var(--cyan);}
  .t-palast{background:#e8e6df;} .t-dom{background:var(--gold);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);margin-bottom:6px;}
  .legend .tile{width:16px;height:16px;border-radius:4px;display:inline-flex;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .delta-pos{color:var(--green);font-weight:600;}
  .delta-neg{color:var(--red);font-weight:600;}
  .hero{padding:56px 20px;text-align:center;}
  .hero .crown{font-size:64px;display:block;margin-bottom:14px;}
  .hero h1{font-size:44px;letter-spacing:6px;color:var(--gold);}
  .event{
    border-left:3px solid var(--border);padding:8px 12px;margin:8px 0;
    background:var(--panel);border-radius:0 10px 10px 0;font-size:14.5px;
  }
  .event.bad{border-color:var(--red);} .event.good{border-color:var(--green);}
  .rowflex{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0;}
  .sliderrow{display:grid;grid-template-columns:170px 1fr 64px;gap:12px;align-items:center;margin:12px 0;}
  .sliderrow .v{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;}
  .goal{background:rgba(224,180,88,.08);border:1px solid rgba(224,180,88,.35);}
  footer{margin-top:26px;text-align:center;font-size:12px;color:var(--muted);}
  /* --- Schlacht --- */
  .battlefield{display:grid;grid-template-columns:1fr 60px 1fr;gap:12px;align-items:start;}
  .armee{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
  .armee h4{font-size:15px;margin-bottom:8px;}
  .armee .u{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;font-variant-numeric:tabular-nums;}
  .vs{font-size:26px;text-align:center;padding-top:40px;color:var(--gold);}
  .strbar{height:12px;background:var(--border);border-radius:99px;overflow:hidden;margin:10px 0 4px;}
  .strbar>div{height:100%;transition:width .5s;}
  .strbar.a>div{background:var(--cyan);} .strbar.d>div{background:var(--orange);}
  .battlelog{max-height:180px;overflow-y:auto;font-size:13.5px;}
  .battlelog p{padding:2px 0;border-bottom:1px dashed var(--border);}
  .shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:none;}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .floatdmg{position:absolute;font-weight:800;color:var(--red);animation:floatup 1s ease-out forwards;pointer-events:none;}
  @keyframes floatup{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-40px);}}
  /* --- Konfetti --- */
  .confetti{position:fixed;top:-12px;width:9px;height:14px;z-index:99;animation:cfall linear forwards;pointer-events:none;border-radius:2px;}
  @keyframes cfall{to{transform:translateY(105vh) rotate(720deg);opacity:.6;}}
  /* --- Monumente --- */
  .monu{display:flex;gap:20px;align-items:flex-end;justify-content:center;padding:6px 0 2px;}
  .monu svg{display:block;}
  /* --- Reichskarte --- */
  #karte, #karteS{width:100%;height:auto;display:block;border-radius:12px;
    border:1px solid var(--border);margin:4px 0 10px;}
  .schild{display:inline-flex;align-items:center;justify-content:center;
    width:70px;height:80px;font-size:34px;border:3px solid var(--gold);
    border-radius:10px 10px 46% 46%/10px 10px 55% 55%;
    background:linear-gradient(180deg,var(--panel2),#0c1016);
    box-shadow:0 6px 22px rgba(0,0,0,.45);}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:baseline;}
  .kiber{border-left:3px solid var(--cyan);}
  .setup-tabelle{table-layout:fixed;width:100%;}
  .setup-tabelle td{padding:4px 3px;overflow:hidden;}
  .setup-tabelle td:first-child{width:26px;}
  .setup-tabelle input[type=text]{width:100%;min-width:70px;padding:8px 8px;}
  .setup-tabelle select{width:100%;padding:8px 4px;}
  .blink{animation:blinkA 1.6s ease-in-out infinite;}
  @keyframes blinkA{0%,100%{opacity:.45;}50%{opacity:1;}}
  /* --- Schlachtfeld-Canvas --- */
  #feld{width:100%;height:auto;display:block;border-radius:12px;border:1px solid var(--border);
    background:linear-gradient(180deg,#1c2637 0%,#2a3a2a 45%,#22301f 100%);margin-bottom:12px;}
  .phasebadge{display:inline-block;padding:4px 14px;border-radius:999px;background:var(--panel2);
    border:1px solid var(--gold);color:var(--gold);font-size:13px;font-weight:700;margin-bottom:10px;}
  .moral{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px;}
  .moral>div{height:100%;background:var(--green);transition:width .4s;}
  /* --- Taktik-Wahl --- */
  .taktik{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:12px 0;}
  .taktik .opt{border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;
    background:var(--panel);text-align:left;transition:border-color .15s, background .15s;}
  .taktik .opt:hover{border-color:var(--gold);}
  .taktik .opt.sel{border-color:var(--gold);background:rgba(224,180,88,.1);}
  .taktik .opt b{display:block;margin-bottom:4px;}
  .taktik .opt span{font-size:12.5px;color:var(--muted);line-height:1.4;display:block;}
  /* --- Sparkline & Deltas --- */
  .spark{display:block;width:100%;height:58px;margin-top:6px;}
  .up{color:var(--green);font-size:12px;font-weight:700;} .down{color:var(--red);font-size:12px;font-weight:700;}
  /* --- Titel-Glanz --- */
  .pulse{animation:pulse 2.6s ease-in-out infinite;display:inline-block;}
  @keyframes pulse{0%,100%{text-shadow:0 0 16px rgba(224,180,88,.2);transform:scale(1);}
    50%{text-shadow:0 0 42px rgba(224,180,88,.7);transform:scale(1.04);}}
  .shine{background:linear-gradient(90deg,var(--gold) 20%,#fff3cf 50%,var(--gold) 80%);
    background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shine 4.5s linear infinite;}
  @keyframes shine{to{background-position:-200% center;}}
  /* --- Toasts & Berater --- */
  #toasts{position:fixed;right:16px;bottom:16px;z-index:120;display:flex;flex-direction:column;gap:8px;}
  .toast{background:var(--panel2);border:1px solid var(--gold);border-radius:12px;
    padding:11px 16px;box-shadow:0 8px 30px rgba(0,0,0,.55);max-width:330px;
    animation:toastIn .3s ease;font-size:14px;line-height:1.45;}
  @keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .tut{border-color:var(--cyan) !important;background:rgba(95,184,212,.06);}
  .erfolg-k{display:flex;gap:12px;align-items:center;padding:10px 12px;border:1px solid var(--border);
    border-radius:12px;background:var(--panel);}
  .erfolg-k.zu{opacity:.35;filter:grayscale(.7);}
  .erfolg-k .ei{font-size:26px;}
  /* --- Zeremonien & Jahres-Vignette --- */
  .zer{opacity:0;animation:zerAuf .7s ease forwards;}
  .z1{animation-delay:.1s;} .z2{animation-delay:.5s;} .z3{animation-delay:1.2s;}
  .z4{animation-delay:1.7s;} .z5{animation-delay:2.2s;}
  @keyframes zerAuf{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .krone-fall{
    position:absolute;left:50%;top:-12px;transform:translateX(-50%);
    font-size:52px;z-index:2;pointer-events:none;
    animation:kroneFall 1.4s cubic-bezier(.3,1.6,.5,1) .8s both;
    filter:drop-shadow(0 6px 14px rgba(224,180,88,.45));
  }
  @keyframes kroneFall{
    from{opacity:0;transform:translateX(-50%) translateY(-110px) rotate(-16deg) scale(1.5);}
    60%{opacity:1;transform:translateX(-50%) translateY(6px) rotate(4deg);}
    to{opacity:1;transform:translateX(-50%) translateY(0) rotate(0);}
  }
  #wipe{position:fixed;inset:0;pointer-events:none;z-index:90;opacity:0;
    background:linear-gradient(105deg,transparent 30%,rgba(224,180,88,.10) 46%,rgba(224,180,88,.22) 50%,rgba(224,180,88,.10) 54%,transparent 70%);
    transform:translateX(-110%);}
  #wipe.an{animation:wipeAn .45s ease;}
  @keyframes wipeAn{from{opacity:1;transform:translateX(-110%);}to{opacity:1;transform:translateX(110%);}}
  .anno-pop{animation:annoPop .9s cubic-bezier(.2,1.4,.4,1) both;}
  @keyframes annoPop{from{opacity:0;transform:scale(1.7);letter-spacing:14px;}to{opacity:1;transform:scale(1);}}
  @media (max-width:640px){
    .hero h1{font-size:32px;}
    .sliderrow{grid-template-columns:110px 1fr 46px;gap:8px;}
    .battlefield{grid-template-columns:1fr;} .vs{padding:4px;}
    main{padding:14px 12px 50px;}
    .stats{grid-template-columns:repeat(2,1fr);gap:9px;}
    .stat{padding:11px 12px;} .stat .val{font-size:16px;}
    header{padding:10px 12px;gap:7px;}
    .chip{padding:4px 9px;font-size:12px;}
    .btn-lg{width:100%;margin-right:0;}
    td,th{font-size:13px;padding:6px 4px;}
    .card{padding:14px 14px;}
    h2{font-size:18px;}
  }
</style>
</head>
<body>
<header>
  <span class="brand">👑 KAISER</span>
  <span class="chip" id="hJahr" style="display:none"></span>
  <span class="chip" id="hSpieler" style="display:none"></span>
  <span class="chip" id="hTimer" style="display:none"></span>
  <span class="spacer"></span>
  <button class="btn-sm" id="btnMusik" onclick="toggleMusik()" title="Hintergrundmusik">🎼</button>
  <button class="btn-sm" id="btnMute" onclick="toggleMute()" title="Klänge">🔊</button>
  <details class="menu" id="sysmenu">
    <summary>☰ Menü</summary>
    <div class="menu-inhalt" onclick="$('#sysmenu').removeAttribute('open')">
      <button id="btnExport" style="display:none" onclick="exportSpielstand()">💾 Spielstand speichern</button>
      <button onclick="$('#importFile').click()">📂 Spielstand laden</button>
      <button onclick="erfolgeAuf()">🏅 Erfolge</button>
      <button onclick="ruhmAuf()">🏆 Ruhmeshalle</button>
      <button onclick="hilfeAuf()">❓ Spielhilfe</button>
      <div style="padding:8px 10px" onclick="event.stopPropagation()">
        <p class="muted small">🎵 Musik</p>
        <input type="range" min="0" max="1" step="0.05" style="width:100%"
          oninput="lautSetzen('musik', this.value)" id="lautMusik">
        <p class="muted small" style="margin-top:6px">🔔 Effekte</p>
        <input type="range" min="0" max="1" step="0.05" style="width:100%"
          oninput="lautSetzen('fx', this.value)" id="lautFx">
      </div>
    </div>
  </details>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importSpielstand(this)">
</header>
<main><div id="screen"></div>
<footer>Kaiser v2.2 · Hommage an den C64-Klassiker von 1984 · eigenständige Neuimplementierung</footer>
</main>
<div id="toasts"></div>
<div id="wipe"></div>
<script>
"use strict";
/* ============================================================
   KAISER — Hommage an den C64-Klassiker von 1984
   Eigenständige Neu-Implementierung · Hotseat · 1-9 Spieler
   ============================================================ */

const TITEL = [
  ["Herr","Dame"],["Baron","Baronin"],["Landgraf","Landgräfin"],["Markgraf","Markgräfin"],
  ["Fürst","Fürstin"],["Herzog","Herzogin"],["Kurfürst","Kurfürstin"],["König","Königin"],["Kaiser","Kaiserin"]
];
const NAMEN = ["Friedrich","Anna","Wilhelm","Luise","Karl","Sophie","Otto","Marie","Georg"];
const FARBEN = ["#5fb8d4","#e0b458","#4cc38a","#e5636f","#b58fd4","#d9973f","#7fd4c1","#e08ab8","#a8c46a"];
const WAPPEN = ["🦅","🦁","🐺","🌹","⚔️","⭐","🐉","🛡️","🌙"];
const KOSTEN = { markt:1000, muehle:2000, hafen:3000, palastTeil:5000, domTeil:9000, inf:100, kav:250, art:500 };
const LAND   = { palast:13000, dom:25000 };
const PALAST_TEILE = 16, DOM_TEILE = 14;
const JUSTIZ = ["","sehr fair","fair","streng","gierig"];
const PHASEN = ["Status","Korn","Handel","Zw.-Bilanz","Steuern","Bauen","Bilanz"];
const WETTER = [
  { t:"Dürre — die Felder verdorren",        ico:"☀️", f:0.55, w:8  },
  { t:"Verregneter Sommer",                  ico:"🌧️", f:0.78, w:12 },
  { t:"Wechselhaftes Jahr",                  ico:"⛅",  f:0.95, w:34 },

/* ---------- Sound-Design (Web Audio: Synthese, Rauschen, Hall) ---------- */
let _ac = null, muted = false, _master = null, _delay = null;
/* Getrennte Lautstärken für Musik und Effekte (persistent) */
let LAUT = { musik: 0.65, fx: 0.85 };
try{ LAUT = Object.assign(LAUT, JSON.parse(window.localStorage.getItem("kaiser_laut")||"{}")); }catch(e){}
function lautSetzen(art, wert){
  LAUT[art] = clamp(+wert, 0, 1);
  try{ window.localStorage.setItem("kaiser_laut", JSON.stringify(LAUT)); }catch(e){}
}
let _musikModus = false;
function toggleMute(){ muted = !muted; $("#btnMute").textContent = muted ? "🔇" : "🔊"; }
function audioCtx(){
  if(_ac) return _ac;
  _ac = new (window.AudioContext||window.webkitAudioContext)();
  _master = _ac.createGain(); _master.gain.value = 0.9;
  _master.connect(_ac.destination);
  /* leichter Echo-Hall für Fanfaren, Glocken und Kanonen */
  _delay = _ac.createDelay(0.7); _delay.delayTime.value = 0.22;
  const rueck = _ac.createGain(); rueck.gain.value = 0.28;
  const nass  = _ac.createGain(); nass.gain.value  = 0.16;
  _delay.connect(rueck); rueck.connect(_delay);
  _delay.connect(nass);  nass.connect(_master);
  return _ac;
}
function beep(freq, dur, delay=0, type="triangle", vol=0.12, hall=false){
  if(muted) return;
  try{
    const ac = audioCtx();
    const t = ac.currentTime + delay;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(_master); if(hall) g.connect(_delay);
    vol *= _musikModus ? LAUT.musik : LAUT.fx;
    if(vol <= 0.0005) return;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.014);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  }catch(e){}
}
function rausch(dur, delay=0, vol=0.2, tief=false, hall=false){
  if(muted) return;
  try{
    const ac = audioCtx();
    const t = ac.currentTime + delay;
    const len = Math.max(1, Math.ceil(ac.sampleRate * dur));
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2);
    const src = ac.createBufferSource(); src.buffer = buf;
    const f = ac.createBiquadFilter();
    f.type = tief ? "lowpass" : "highpass";
    f.frequency.value = tief ? 320 : 2400;
    const g = ac.createGain(); g.gain.value = vol * (_musikModus ? LAUT.musik : LAUT.fx);
    if(g.gain.value <= 0.0005) return;
    src.connect(f); f.connect(g); g.connect(_master); if(hall) g.connect(_delay);
    src.start(t);
  }catch(e){}
}

/* Vogelzwitschern: kurze Glissandi */
function sVogel(){
  if(muted) return;
  try{
    const ac = audioCtx();
    const n = ri(2,4);
    for(let i=0;i<n;i++){
      const t = ac.currentTime + i*rf(0.09,0.16);
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = "sine";
      const f0 = rf(2100,3300), f1 = f0 * rf(0.75,1.35);
      o.frequency.setValueAtTime(f0, t);
      o.frequency.exponentialRampToValueAtTime(f1, t+0.08);
      o.connect(g); g.connect(_master);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.018, t+0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.09);
      o.start(t); o.stop(t+0.12);
    }
  }catch(e){}
}

function starteMusik(){
  clearInterval(musikIv);
  let pos = 3;

    if(muted || !musikAn) return;

    try{
      if(G.screen === "title" || G.screen === "setup" || G.screen === "online" || G.screen === "lobby"){
        /* Titelthema (eigene Komposition) */
        const T = THEMA_TITEL, i = themaPos % T.melodie.length;

        /* Kriegsthema: treibende Trommel + Moll-Motiv */
        const T = THEMA_KRIEG, i = themaPos % T.melodie.length;
        if(i % 4 === 0) rausch(.09, 0, .12, true);
        if(T.melodie[i]) beep(T.melodie[i], .32, 0, "sawtooth", .035, true);
        if(T.bass[i])    beep(T.bass[i],    .6,  0, "sine",     .05);

        /* Friedens-Laute: generativ, moduliert mit der Jahreszeit */
        const skala = G.spieler.length ? (SKALEN[saison().n] || SKALEN["Sommer"]) : SKALEN["Sommer"];
        pos = clamp(pos + ri(-2,2), 0, skala.length-1);

  for(let i=0;i<DOM_TEILE;i++){
    const x = 10 + (i%7)*14, y = 52 - Math.floor(i/7)*17;
    b += `<rect x="${x}" y="${y}" width="12" height="15" rx="1.5"
      fill="${i<teile?'#e0b458':'none'}" stroke="${i<teile?'#e0b458':'#3a4558'}" stroke-width="1"/>`;
  }
  const fertig = teile>=DOM_TEILE;
  return `<svg width="118" height="86" viewBox="0 0 118 86" role="img" aria-label="Kathedrale">
    <rect x="2" y="70" width="114" height="6" rx="2" fill="#3a4558"/>
    ${b}
    <polygon points="59,2 46,30 72,30" fill="${fertig?'#c79a3d':'none'}" stroke="${fertig?'#c79a3d':'#3a4558'}"/>
    ${fertig?'<path d="M59 -2 v8 M55 1 h8" stroke="#e0b458" stroke-width="2"/>':''}
  </svg>`;
}

/* ---------- Zwischenbilanz (nach Kornausgabe & Handel) ---------- */
function zwischenbilanz(p){
  const r = { ereignisse:[] };
  const noetig = noetigKorn(p);
  const f = noetig>0 ? p.ausgabe/noetig : 1;

  const ev = Math.random() / diffFaktor();
  if(ev < 0.05 && p.pop > 1200){
    const opfer = Math.round(p.pop * rf(0.12,0.28));
    p.pop -= opfer;
    geschichte("💀", `Die Pest sucht ${p.name}s Reich heim — ${fmt(opfer)} Tote.`);
    r.ereignisse.push({t:`Die Pest wütet im Land! ${fmt(opfer)} Untertanen sterben.`,c:"bad"});
  } else if(ev < 0.10){
    const zuzug = Math.round(p.pop * rf(0.02,0.05));
    p.pop += zuzug;
    r.ereignisse.push({t:`Ein Treck von Siedlern trifft ein: +${fmt(zuzug)} Einwohner.`,c:"good"});
  }

  p.stimmung = Math.round(clamp(
    90 - (p.einkSt+p.mwSt)*0.8 - p.zoll*0.4 - (p.justiz-2)*10 + (f-1)*40, 5, 100));

  const g = G.tempo;
  r.geburten   = Math.round(p.pop * 0.04 * (0.5 + p.stimmung/100) * g);
  r.tote       = Math.round(p.pop * 0.018);
  r.verhungert = f < 1 ? Math.round(p.pop * (1-f) * 0.5) : 0;
  r.migration  = Math.round(p.pop * 0.05 * (p.stimmung-50)/100 * g);
  p.pop = Math.max(50, p.pop + r.geburten - r.tote - r.verhungert + r.migration);
  if(p.stimmung >= 90) erfolg("volk");
  r.f = f;
  p.zb = r;
}

/* ---------- Jahresschluss (Ernte, Steuern, Heer) ---------- */
function jahresschluss(p){
  const r = { ereignisse:[] };

  /* Wetter & Ernte */
  const summe = WETTER.reduce((s,w)=>s+w.w,0);
  let roll = Math.random()*summe, wetter = WETTER[2];
  for(const w of WETTER){ roll -= w.w; if(roll<=0){ wetter = w; break; } }
  r.wetter = wetter;
  const bearbeitet = Math.min(p.pop*4, anbau(p));
  const ertrag = rf(0.038,0.050) * wetter.f * (1 + Math.min(p.muehlen*0.05, 1.0));
  r.ernte = Math.round(bearbeitet * ertrag);
  p.korn += r.ernte;

  /* Wirtschafts-Ereignisse */
  const ev = Math.random() / diffFaktor();
  if(ev < 0.07){
    const verlust = Math.round(p.korn * rf(0.2,0.4));
    p.korn -= verlust;
    r.ereignisse.push({t:`Ratten im Kornspeicher! ${fmt(verlust)} Fuder vernichtet.`,c:"bad"});
  } else if(ev < 0.11 && (p.maerkte>0 || p.muehlen>0)){
    if(p.maerkte>0 && (p.muehlen===0 || Math.random()<0.5)){ p.maerkte--; entferneGebaeude(p,"m"); r.ereignisse.push({t:"Feuersbrunst! Ein Markt brennt nieder.",c:"bad"}); }
    else { p.muehlen--; entferneGebaeude(p,"k"); r.ereignisse.push({t:"Feuersbrunst! Eine Mühle brennt nieder.",c:"bad"}); }
  }

  /* Steuern & Heer-Unterhalt */
  r.steuern = Math.round(p.pop*(p.einkSt*0.08 + p.mwSt*0.05)/10)*10
            + p.zoll*p.maerkte*6 + p.maerkte*150 + staedte(p)*2000 + (p.haefen||0)*700;
  if(p.berater && p.berater.schatz) r.steuern = Math.round(r.steuern * 1.08);
  p.geld += r.steuern;
  p.stat.steuern += r.steuern;
  r.unterhalt = unterhalt(p);
  p.geld -= r.unterhalt;
  r.gehaelter = beraterGehalt(p);
  p.geld -= r.gehaelter;
  /* Berater-Agenden: gelegentliche Zwischenfälle */
  if(p.berater && p.berater.schatz && Math.random() < 0.05){
    p.geld -= 1000;
    delete p.berater.schatz;
    r.ereignisse.push({t:"Der Schatzmeister hat 1.000 Taler veruntreut und ist geflohen!",c:"bad"});
  } else if(beraterGehalt(p) > 0 && p.geld < 0 && Math.random() < 0.5){
    const aktiv = BERATER.filter(b=>p.berater[b.k]);
    if(aktiv.length){ const b = aktiv[ri(0,aktiv.length-1)]; delete p.berater[b.k];
      r.ereignisse.push({t:`${b.person} quittiert den Dienst — die Kasse ist leer.`,c:"bad"}); }
  }
  if(r.unterhalt > 0 && p.geld < 0){
    const rest = Math.max(0, Math.round(heerGroesse(p.heer)*0.7));
    const verlust = heerGroesse(p.heer) - rest;
    if(verlust > 0){
      const q = rest / Math.max(1, heerGroesse(p.heer));
      p.heer.inf = Math.floor(p.heer.inf*q); p.heer.kav = Math.floor(p.heer.kav*q); p.heer.art = Math.floor(p.heer.art*q);
      r.ereignisse.push({t:`Der Sold bleibt aus — ${fmt(verlust)} Söldner desertieren!`,c:"bad"});
    }
  }

  /* Zeitfaktor */
  const dauer = (Date.now() - p.turnStart)/1000;
  r.ueberzeit = Math.max(0, dauer - 90);
  if(r.ueberzeit > 0) p.todesJahr -= r.ueberzeit/180;

  if(G.jahr >= 1750 && !p.ki) erfolg("chronist");
  p.report = r;
  p.chronik = (p.chronik||[]).concat({ j:G.jahr, pop:p.pop, geld:Math.round(p.geld), land:p.land }).slice(-80);
  quicksave();
}

function pruefeBefoerderung(p){
  if(p.titel >= 8) return false;
  const b = BEDINGUNGEN[p.titel+1];
  if(p.geld > 0 && b.ok(p)){
    p.titel++;
    geschichte(p.titel===8?"👑":"🎖️", `${p.name} wird zu${p.w?"r":"m"} ${titelName(p)} erhoben.`);
    if(!p.ki){ erfolg("baron"); if(p.titel===8) erfolg("kaiser"); }
    return true;
  }
  return false;
}

/* ---------- Krieg: Nachbarschaft & Diplomatie ---------- */
function lebende(){ return G.spieler.map((p,i)=>({p,i})).filter(x=>!x.p.tot); }
function nachbarn(i){
  const l = lebende().map(x=>x.i);
  if(l.length<=2) return l.filter(x=>x!==i);
  const pos = l.indexOf(i);
  return [ l[(pos-1+l.length)%l.length], l[(pos+1)%l.length] ];
}
/* kürzester Weg (über lebende Spieler im Sitzkreis) von a nach b, exklusive Endpunkte */
function wegZwischen(a,b){
  const l = lebende().map(x=>x.i);
  const pa = l.indexOf(a), pb = l.indexOf(b), n = l.length;
  const d1 = (pb-pa+n)%n, d2 = (pa-pb+n)%n;
  const richtung = d1<=d2 ? 1 : -1, dist = Math.min(d1,d2);
  const weg = [];
  for(let s=1;s<dist;s++) weg.push(l[(pa+richtung*s+n)%n]);
  return weg;
}

function kriegVorbereiten(zielIdx){
  const a = G.aktiv, d = zielIdx;
  const weg = wegZwischen(a,d);
  const alle = lebende().map(x=>x.i).filter(i=>i!==a && i!==d);
  const kr = { a, d, weg, fragen:[], frageIdx:0, wahl:{}, abgebrochen:false,
               taktikA: G._taktikA || "sturm", taktikD: null };
  kr.gelaende = wuerfleGelaende();
  /* KI-Regenten antworten sofort, Menschen werden am Gerät befragt */
  for(const i of alle){
    const s = G.spieler[i];
    if(s.ki) kr.wahl[i] = kiDiploWahl(s, kr);
    else kr.fragen.push(i);
  }
  G._kr = kr;
  diploWeiter();
}
function diploWeiter(){
  const kr = G._kr;
  if(kr.frageIdx < kr.fragen.length){
    const f = kr.fragen[kr.frageIdx];
    if(mpMein(f)) zeige("diplomatie");
    else mpPend("diplo", f);
    return;
  }
  diploFertig();
}
function diploWahl(wahl){
  const kr = G._kr;
  kr.wahl[kr.fragen[kr.frageIdx]] = wahl;
  kr.frageIdx++;
  diploWeiter();
}
function diploFertig(){
  const kr = G._kr;
  /* Durchmarsch prüfen: jeder Wegspieler muss Angreifer unterstützen oder Durchmarsch gewähren */
  const blockiert = kr.weg.some(i => !["atk","frei"].includes(kr.wahl[i]));
  if(blockiert){
    kr.abgebrochen = true;
    G.spieler[kr.a].kriegGefuehrt = true;
    if(mpMein(kr.a)) zeige("kriegAbbruch");
    else mpPend("kriegAbbruch", kr.a);
    return;
  }
  if(mpMein(kr.a)){ G._aufW = [2,2,2,2,2]; zeige("aufstellungA"); }
  else mpPend("schlachtplan", kr.a);
}
function aufstellungGewicht(i, v){
  G._aufW[i] = +v;
  const feld = document.getElementById("aufVorschau");
  if(feld && G._aufE) zeichneAufstellung("aufVorschau", G._aufE, G._aufW, G._aufFarbe, G._aufRechts);
  const lbl = document.getElementById("gw"+i);
  if(lbl) lbl.textContent = v;
}
function aufstellungPreset(k){
  G._aufW = [...AUFSTELLUNGEN[k].g];
  render();
}
function aufstellungAFertig(){
  G._kr.aufA = [...G._aufW];
  if(G.spieler[G._kr.d].ki){ G._kr.aufD = kiAufstellung(); schlachtStarten(); }
  else if(mpMein(G._kr.d)){ G._aufW = [2,2,2,2,2]; zeige("aufstellungD"); }
  else mpPend("aufD", G._kr.d);
}
function aufstellungDFertig(){
  G._kr.aufD = [...G._aufW];
  if(mpMein(G._kr.a)) schlachtStarten();
  else mpPend("schlacht", G._kr.a);
}

/* ---------- Schlacht (animiert) ---------- */
function seiteBauen(besitzerIdx, unterstuetzer, verteidigt){
  const eig = G.spieler[besitzerIdx];
  const pools = [{ idx:besitzerIdx, name:eig.name, inf:eig.heer.inf, kav:eig.heer.kav, art:eig.heer.art }];
  for(const ui of unterstuetzer){
    const u = G.spieler[ui];
    pools.push({ idx:ui, name:u.name, inf:u.heer.inf, kav:u.heer.kav, art:u.heer.art });
  }
  const m = miliz(eig);
  const aufgebot = verteidigt ? Math.round(eig.pop*0.02) : 0;
  return { pools, miliz:m, aufgebot,
    inf: pools.reduce((s,x)=>s+x.inf,0),
    kav: pools.reduce((s,x)=>s+x.kav,0),
    art: pools.reduce((s,x)=>s+x.art,0) };
}
const seiteStaerke = s =>
  s.inf + s.kav*2.5 + s.art*4 + s.miliz*0.8 + s.aufgebot*0.5;

/* ============================================================
   Schlacht nach Original-Vorbild: Truppen werden vor der Schlacht
   auf fünf Abschnitte aufgestellt, dann rücken die Linien vor —
   Fernkampf der Artillerie, Nahkampf am Berührungspunkt,
   Durchbrüche in die Nachbarabschnitte, Moral und Flucht.
   ============================================================ */
const LANES = 5;
const LANE_NAMEN = ["Linker Flügel","Halblinks","Zentrum","Halbrechts","Rechter Flügel"];
const AUFSTELLUNGEN = [
  { n:"Breite Linie",       g:[2,2,2,2,2] },
  { n:"Massiertes Zentrum", g:[1,2,4,2,1] },
  { n:"Schwerpunkt links",  g:[4,3,2,1,1] },
  { n:"Schwerpunkt rechts", g:[1,1,2,3,4] },
  { n:"Doppelflanke",       g:[3,1,1,1,3] }
];
function verteileEinheiten(einheiten, gewichte){
  const summe = gewichte.reduce((a,b)=>a+b,0) || 1;
  const lanes = Array.from({length:LANES}, ()=>({inf:0,kav:0,art:0,miliz:0,auf:0}));
  for(const typ of ["inf","kav","art","miliz","auf"]){
    const gesamt = einheiten[typ]||0;
    const roh = gewichte.map(g => gesamt*g/summe);
    const basis = roh.map(Math.floor);
    let vergeben = basis.reduce((a,b)=>a+b,0);
    const reste = roh.map((r,i)=>({i, r:r-basis[i]})).sort((a,b)=>b.r-a.r);
    for(let k=0; vergeben<gesamt; k++,vergeben++) basis[reste[k%LANES].i]++;
    basis.forEach((n,i)=>lanes[i][typ]=n);
  }
  return lanes;
}
const laneGroesse = u => u.inf+u.kav+u.art+u.miliz+u.auf;
const laneNahkampf = u => u.inf + u.kav*2.5 + u.art*0.4 + u.miliz*0.8 + u.auf*0.5;
function laneVerlust(u, anzahl){
  let g = laneGroesse(u);
  if(g<=0 || anzahl<=0) return 0;
  const echt = Math.min(g, Math.round(anzahl));
  for(const typ of ["inf","kav","art","miliz","auf"]){
    const teil = Math.round(echt * (u[typ]/g));
    u[typ] = Math.max(0, u[typ]-teil);
  }
  /* Rundungsreste beim größten Posten abziehen */
  let diff = g - echt - laneGroesse(u);
  while(diff !== 0){
    const typ = ["inf","miliz","auf","kav","art"].find(k=>u[k]>0 || diff>0 && u[k]>=0);
    if(diff < 0){ u[typ]++; diff++; } else if(u[typ]>0){ u[typ]--; diff--; } else break;
  }
  return echt;
}
function schlachtStarten(){
  const kr = G._kr;
  const helferA = kr.fragen.filter(i=>kr.wahl[i]==="atk");
  const helferD = kr.fragen.filter(i=>kr.wahl[i]==="def");
  const A = seiteBauen(kr.a, helferA, false);
  const D = seiteBauen(kr.d, helferD, true);
  const eA = { inf:A.inf, kav:A.kav, art:A.art, miliz:A.miliz, auf:0 };
  const eD = { inf:D.inf, kav:D.kav, art:D.art, miliz:D.miliz, auf:D.aufgebot };
  const lanesA = verteileEinheiten(eA, kr.aufA || [2,2,2,2,2]);
  const lanesD = verteileEinheiten(eD, kr.aufD || [2,2,2,2,2]);
  G._s = {
    poolsA:A.pools, poolsD:D.pools, helferA, helferD,
    lanes: Array.from({length:LANES}, (_,i)=>({ A:lanesA[i], D:lanesD[i], dist:100 })),
    start:{ A:{...eA}, D:{...eD} },
    startG:{ A:Math.max(1,laneGroesse(eA)), D:Math.max(1,laneGroesse(eD)) },
    gelaende: kr.gelaende || wuerfleGelaende(), regen: Math.random()<0.22,
    moralA:100, moralD:100, routA:false, routD:false,
    tick:0, maxTicks:40, log:[], partikel:[], fertig:false, sieger:null, iv:null, still:false
  };
  cur().kriegGefuehrt = true;
  sTrommel();
  zeige("schlacht");
  G._s.iv = setInterval(schlachtTick, 600);
}
const sRest = (s,seite) => s.lanes.reduce((a,l)=>a+laneGroesse(l[seite]),0);
const sRestTyp = (s,seite,typ) => s.lanes.reduce((a,l)=>a+l[seite][typ],0);
function einTick(s, leise){
  s.tick++;
  const jetzt = performance.now();
  /* Verlauf für das Zeitraffer-Replay aufzeichnen */
  s.verlauf = s.verlauf || [];
  if(s.verlauf.length < 60)
    s.verlauf.push(s.lanes.map(l=>({ dist:l.dist, A:{...l.A}, D:{...l.D} })));
  let gefA = 0, gefD = 0;
  s.lanes.forEach((lane,i)=>{
    const a = lane.A, d = lane.D;
    const gA = laneGroesse(a), gD = laneGroesse(d);
    if(gA===0 && gD===0) return;
    const ry = 0.30 + (i+0.5)*0.135;
    const gel = (s.gelaende && s.gelaende[i]) || GELAENDE[0];
    if(lane.dist > 0 && gA > 0 && gD > 0){
      /* Vormarsch — Kavallerie beschleunigt, Furten bremsen */
      lane.dist = Math.max(0, lane.dist - (9 + (a.kav/Math.max(1,gA))*16) * (gel.tempo || 1));
      /* Artillerie-Fernkampf beider Seiten — Regen macht das Pulver feucht */
      const artFx = (gel.artFaktor || 1) * (s.regen ? 0.65 : 1);
      const feuerA = a.art * rf(0.7,1.3) * artFx;
      const feuerD = d.art * rf(0.7,1.3) * 1.15 * artFx;
      gefD += laneVerlust(d, feuerA*0.30);
      gefA += laneVerlust(a, feuerD*0.30);
      if(!leise){
        if(a.art>0) s.partikel.push({ typ:"kugel", von:"A", lane:i, born:jetzt+rf(0,250) });
        if(d.art>0) s.partikel.push({ typ:"kugel", von:"D", lane:i, born:jetzt+rf(0,250) });
      }
    } else if(gA > 0 && gD > 0){
      /* Nahkampf im Abschnitt — Hügel schützen, Wald bremst die Reiterei */
      const kavFx = gel.kavFaktor || 1;
      const nah = u => u.inf + u.kav*2.5*kavFx + u.art*0.4 + u.miliz*0.8 + u.auf*0.5;
      const stA = nah(a) * rf(0.85,1.15);
      const stD = nah(d) * 1.15 * (gel.defBonus || 1) * rf(0.85,1.15);
      gefD += laneVerlust(d, gD * stA/(stA+stD) * 0.15);
      gefA += laneVerlust(a, gA * stD/(stA+stD) * 0.15);
      if(!leise){
        s.partikel.push({ typ:"staub", lane:i, born:jetzt });
        if(Math.random()<0.5) s.partikel.push({ typ:"boom", rx:0.5+rf(-0.03,0.03), ry, born:jetzt });
        for(let k=0;k<2;k++)
          s.partikel.push({ typ:"gefallen", lane:i, off:rf(-0.05,0.05), seite:Math.random()<0.5?"A":"D", born:jetzt+rf(0,400) });
      }
    }
    /* Durchbruch: Sieger eines leeren Abschnitts verstärkt die Nachbarn */
    for(const [mein,gegner] of [["A","D"],["D","A"]]){
      if(laneGroesse(lane[gegner])===0 && laneGroesse(lane[mein])>4 && !lane["durch"+mein]){
        lane["durch"+mein] = true;
        const nachbarn = [i-1,i+1].filter(k=>k>=0 && k<LANES);
        for(const typ of ["inf","kav","miliz","auf"]){
          const abgabe = Math.floor(lane[mein][typ]*0.3);
          lane[mein][typ] -= abgabe*nachbarn.length;
          for(const k of nachbarn) s.lanes[k][mein][typ] += abgabe;
        }
        s.log.unshift(`⚡ Durchbruch im Abschnitt „${LANE_NAMEN[i]}" — ${mein==="A"?"die Angreifer":"die Verteidiger"} fallen den Nachbarn in die Flanke!`);
      }
    }
  });
  /* Moral aus Gesamtverlusten und gebrochenen Abschnitten */
  const lossA = 1 - sRest(s,"A")/s.startG.A;
  const lossD = 1 - sRest(s,"D")/s.startG.D;
  const leerA = s.lanes.filter(l=>laneGroesse(l.A)===0).length;
  const leerD = s.lanes.filter(l=>laneGroesse(l.D)===0).length;
  s.moralA = clamp(100 - lossA*150 - leerA*7 + rf(-2,2), 0, 100);
  s.moralD = clamp(100 - lossD*140 - leerD*7 + rf(-2,2), 0, 100);
  if(gefA+gefD > 0 && (s.tick%2===0 || gefA+gefD>20))
    s.log.unshift(`Gefecht ${s.tick}: Angreifer verliert ${fmt(gefA)}, Verteidiger ${fmt(gefD)} Mann.`);
  if(s.log.length>14) s.log.length = 14;
  if(!leise){
    const fern = s.lanes.some(l=>l.dist>0 && laneGroesse(l.A)>0 && laneGroesse(l.D)>0 && (l.A.art>0||l.D.art>0));
    const nah  = s.lanes.some(l=>l.dist===0 && laneGroesse(l.A)>0 && laneGroesse(l.D)>0);
    if(fern && s.tick%2===0) sKanone();
    if(nah) sKlirren();
  }
  if(s.partikel.length>70) s.partikel.splice(0, s.partikel.length-70);
  /* Ende: Flucht, Vernichtung oder Erschöpfung */
  const endeA = sRest(s,"A")===0, endeD = sRest(s,"D")===0;
  if(s.moralA < 30 || s.moralD < 30 || endeA || endeD || s.tick >= s.maxTicks){
    s.routA = s.moralA < 30 || endeA;
    s.routD = s.moralD < 30 || endeD;
    if(s.routA && !s.routD){
      s.sieger = "D";
      s.lanes.forEach(l=>laneVerlust(l.A, laneGroesse(l.A)*0.08));
      s.log.unshift("Die Moral der Angreifer bricht — das Heer flieht vom Feld!");
    } else if(s.routD && !s.routA){
      s.sieger = "A";
      s.lanes.forEach(l=>laneVerlust(l.D, laneGroesse(l.D)*0.08));
      s.log.unshift("Die Verteidiger werfen die Waffen fort und fliehen!");
    } else {
      const kA = s.lanes.reduce((x,l)=>x+laneNahkampf(l.A),0);
      const kD = s.lanes.reduce((x,l)=>x+laneNahkampf(l.D),0)*1.15;
      s.sieger = kA > kD ? "A" : "D";
      s.log.unshift("Erschöpft trennen sich die Heere — der Feldherr mit der stärkeren Linie behält das Feld.");
    }
    s.fertig = true;
  }
}
/* Verluste anteilig in die stehenden Heere der Besitzer zurückschreiben */
function verlusteZurueck(s){
  for(const [seite, pools] of [["A",s.poolsA],["D",s.poolsD]]){
    for(const typ of ["inf","kav","art"]){
      const q = s.start[seite][typ] > 0 ? sRestTyp(s,seite,typ)/s.start[seite][typ] : 1;
      for(const pool of pools) pool[typ] = Math.floor(pool[typ]*q);
    }
    for(const pool of pools) Object.assign(G.spieler[pool.idx].heer,
      { inf:pool.inf, kav:pool.kav, art:pool.art });
  }
}
function schlachtTick(){
  const s = G._s;
  if(!s || s.fertig) return;
  einTick(s, false);
  if(s.fertig){ clearInterval(s.iv); schlachtAbschliessen(); }
  if(G.screen === "schlacht") render();
}
function schlachtUeberspringen(){
  const s = G._s;
  if(!s) return;
  clearInterval(s.iv);
  while(!s.fertig) einTick(s, true);
  schlachtAbschliessen();
  render();
}
/* Zeitraffer-Replay der geschlagenen Schlacht */
function replayStarten(){
  const s = G._s;
  if(!s || !s.fertig || !s.verlauf || s.replayAktiv) return;
  s.replayAktiv = true;
  s._lanesEcht = s.lanes;
  s.partikel = [];
  let idx = 0, vorher = null;
  const iv = setInterval(()=>{
    if(idx >= s.verlauf.length || G.screen !== "schlacht"){
      clearInterval(iv);
      s.lanes = s._lanesEcht;
      s.replayAktiv = false;
      if(G.screen === "schlacht") zeichneFeld(performance.now());
      return;
    }
    const frame = s.verlauf[idx];
    /* Explosionen dort, wo Verluste passierten */
    if(vorher){
      frame.forEach((l,i)=>{
        const verlust = (laneGroesse(vorher[i].A)+laneGroesse(vorher[i].D))
                      - (laneGroesse(l.A)+laneGroesse(l.D));
        if(verlust > 0)
          s.partikel.push({ typ:"boom", rx:0.5+rf(-0.04,0.04), ry:0.30+(i+0.5)*0.135, born:performance.now() });
      });
    }
    s.lanes = frame.map(f=>({ dist:f.dist, A:{...f.A}, D:{...f.D} }));
    vorher = frame;
    idx++;
    zeichneFeld(performance.now());
  }, 150);
}
/* ---------- Regenten-Porträt (prozedural: Rang, Geschlecht, Alter) ---------- */
function zeichnePortraet(cid, p){
  const c = document.getElementById(cid);
  if(!c || !p) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  const idx = Math.max(0, G.spieler.indexOf(p));
  const rng = mulberry(idx*131 + 11 + (p.gen||1)*57);
  const aj = alterJahre(p);
  const grau = clamp((aj-45)/22, 0, 1);            /* Ergrauen ab ~45 */
  ctx.clearRect(0,0,W,H);

  /* Hintergrund: Vorhang in Hausfarbe */
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#1c2434"); bg.addColorStop(1,"#0d1119");
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = p.farbe + "26";
  ctx.beginPath(); ctx.arc(W/2, H*0.44, W*0.5, 0, 7); ctx.fill();
  ctx.strokeStyle = p.titel>=4 ? "#e0b458" : "#2a3446";
  ctx.lineWidth = p.titel>=7 ? 4 : 2.5;
  ctx.strokeRect(5,5,W-10,H-10);

  const cx = W/2, kopfY = H*0.40, kr = W*0.185;
  const haut = `rgb(${226+Math.floor(rng()*14)},${186+Math.floor(rng()*14)},${146+Math.floor(rng()*16)})`;
  const haarBasis = [[62,42,28],[96,64,32],[30,26,24],[128,70,36],[168,132,60]][Math.floor(rng()*5)];
  const haar = `rgb(${haarBasis.map(v=>Math.round(v+(200-v)*grau)).join(",")})`;

  /* Gewand / Schultern */
  ctx.fillStyle = GEWAND[p.titel];
  ctx.beginPath();
  ctx.moveTo(cx-W*0.40, H+2);
  ctx.quadraticCurveTo(cx-W*0.36, H*0.66, cx-W*0.17, H*0.615);
  ctx.lineTo(cx+W*0.17, H*0.615);
  ctx.quadraticCurveTo(cx+W*0.36, H*0.66, cx+W*0.40, H+2);
  ctx.closePath(); ctx.fill();
  /* Stickerei-Borte */
  ctx.strokeStyle = "rgba(224,180,88,.5)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, H*0.62); ctx.lineTo(cx, H); ctx.stroke();
  /* Pelz-/Hermelinkragen */
  if(p.titel>=7){
    ctx.fillStyle = "#efece2";
    ctx.beginPath();
    ctx.moveTo(cx-W*0.19, H*0.63);
    ctx.quadraticCurveTo(cx, H*0.585, cx+W*0.19, H*0.63);
    ctx.lineTo(cx+W*0.15, H*0.78); ctx.quadraticCurveTo(cx, H*0.73, cx-W*0.15, H*0.78);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#20242c";
    for(let i=0;i<7;i++) ctx.fillRect(cx-W*0.14+i*W*0.047, H*0.66+ (i%2)*8, 3, 6);
  } else if(p.titel>=3){
    ctx.strokeStyle = "#d8d0bd"; ctx.lineWidth = 9; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(cx-W*0.16, H*0.66); ctx.quadraticCurveTo(cx, H*0.60, cx+W*0.16, H*0.66); ctx.stroke();
  }
  /* Amtskette + Medaillon */
  if(p.titel>=4){
    ctx.strokeStyle = "#e0b458"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx-W*0.13, H*0.65); ctx.quadraticCurveTo(cx, H*0.78, cx+W*0.13, H*0.65); ctx.stroke();
    ctx.fillStyle = "#e0b458";
    ctx.beginPath(); ctx.arc(cx, H*0.775, 7, 0, 7); ctx.fill();
    ctx.fillStyle = p.farbe;
    ctx.beginPath(); ctx.arc(cx, H*0.775, 3.4, 0, 7); ctx.fill();
  }
  /* Hals & Kopf */
  ctx.fillStyle = haut;
  ctx.fillRect(cx-kr*0.36, kopfY+kr*0.62, kr*0.72, kr*0.75);
  ctx.beginPath(); ctx.ellipse(cx, kopfY, kr*0.82, kr, 0, 0, 7); ctx.fill();
  /* Ohren */
  ctx.beginPath(); ctx.ellipse(cx-kr*0.82, kopfY+kr*0.08, kr*0.13, kr*0.2, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+kr*0.82, kopfY+kr*0.08, kr*0.13, kr*0.2, 0, 0, 7); ctx.fill();
  if(p.w){ /* Ohrringe */
    ctx.fillStyle = "#e0b458";
    ctx.beginPath(); ctx.arc(cx-kr*0.82, kopfY+kr*0.32, 2.6, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+kr*0.82, kopfY+kr*0.32, 2.6, 0, 7); ctx.fill();
  }
  /* Haare */
  ctx.fillStyle = haar;
  if(p.w){
    ctx.beginPath();
    ctx.moveTo(cx-kr*0.95, kopfY+kr*1.5);
    ctx.quadraticCurveTo(cx-kr*1.15, kopfY-kr*0.2, cx-kr*0.5, kopfY-kr*0.95);
    ctx.quadraticCurveTo(cx, kopfY-kr*1.22, cx+kr*0.5, kopfY-kr*0.95);
    ctx.quadraticCurveTo(cx+kr*1.15, kopfY-kr*0.2, cx+kr*0.95, kopfY+kr*1.5);
    ctx.lineTo(cx+kr*0.62, kopfY+kr*1.5);
    ctx.quadraticCurveTo(cx+kr*0.78, kopfY+kr*0.2, cx+kr*0.55, kopfY-kr*0.42);
    ctx.quadraticCurveTo(cx, kopfY-kr*0.72, cx-kr*0.55, kopfY-kr*0.42);
    ctx.quadraticCurveTo(cx-kr*0.78, kopfY+kr*0.2, cx-kr*0.62, kopfY+kr*1.5);
    ctx.closePath(); ctx.fill();
  } else {
    const ansatz = aj>58 ? 0.28 : 0.05;    /* Geheimratsecken im Alter */
    ctx.beginPath();
    ctx.moveTo(cx-kr*0.85, kopfY-kr*0.05);
    ctx.quadraticCurveTo(cx-kr*0.8, kopfY-kr*(1.05-ansatz), cx, kopfY-kr*(1.12-ansatz));
    ctx.quadraticCurveTo(cx+kr*0.8, kopfY-kr*(1.05-ansatz), cx+kr*0.85, kopfY-kr*0.05);
    ctx.quadraticCurveTo(cx+kr*0.6, kopfY-kr*0.42, cx, kopfY-kr*0.5);
    ctx.quadraticCurveTo(cx-kr*0.6, kopfY-kr*0.42, cx-kr*0.85, kopfY-kr*0.05);
    ctx.closePath(); ctx.fill();
    /* Bart ab 40 oder ab Herzog */
    if(aj>=40 || p.titel>=5){
      ctx.beginPath();
      ctx.moveTo(cx-kr*0.55, kopfY+kr*0.35);
      ctx.quadraticCurveTo(cx, kopfY+kr*(aj>=52?1.55:1.3), cx+kr*0.55, kopfY+kr*0.35);
      ctx.quadraticCurveTo(cx, kopfY+kr*0.62, cx-kr*0.55, kopfY+kr*0.35);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = haar; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx-kr*0.3, kopfY+kr*0.48); ctx.quadraticCurveTo(cx, kopfY+kr*0.6, cx+kr*0.3, kopfY+kr*0.48); ctx.stroke();
    }
  }
  /* Augen, Brauen, Nase, Mund */
  const augY = kopfY - kr*0.08;
  for(const s of [-1,1]){
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.ellipse(cx+s*kr*0.35, augY, kr*0.16, kr*0.10, 0, 0, 7); ctx.fill();
    ctx.fillStyle = ["#4a3a28","#3a5a6a","#3f5a3a"][Math.floor(rng()*3)];
    ctx.beginPath(); ctx.arc(cx+s*kr*0.35, augY, kr*0.065, 0, 7); ctx.fill();
    ctx.strokeStyle = haar; ctx.lineWidth = 3; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(cx+s*kr*0.18, augY-kr*0.22); ctx.lineTo(cx+s*kr*0.52, augY-kr*(0.24+rng()*0.05)); ctx.stroke();
  }
  ctx.strokeStyle = "rgba(120,80,50,.55)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, augY+kr*0.1); ctx.quadraticCurveTo(cx+kr*0.09, kopfY+kr*0.28, cx-kr*0.04, kopfY+kr*0.32); ctx.stroke();
  ctx.strokeStyle = p.w ? "#b0524f" : "rgba(120,70,50,.8)"; ctx.lineWidth = p.w ? 4 : 3;
  ctx.beginPath(); ctx.moveTo(cx-kr*0.22, kopfY+kr*0.55); ctx.quadraticCurveTo(cx, kopfY+kr*(0.62+0.04*Math.min(1,p.stimmung/60)), cx+kr*0.22, kopfY+kr*0.55); ctx.stroke();
  /* Falten im Alter */
  if(aj>=48){
    ctx.strokeStyle = "rgba(110,80,60,.4)"; ctx.lineWidth = 1.5;
    for(const s of [-1,1]){
      ctx.beginPath(); ctx.moveTo(cx+s*kr*0.5, augY+kr*0.16); ctx.quadraticCurveTo(cx+s*kr*0.56, augY+kr*0.24, cx+s*kr*0.48, augY+kr*0.3); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(cx-kr*0.4, kopfY-kr*0.52); ctx.quadraticCurveTo(cx, kopfY-kr*0.58, cx+kr*0.4, kopfY-kr*0.52); ctx.stroke();
    if(aj>=58){ ctx.beginPath(); ctx.moveTo(cx-kr*0.38, kopfY-kr*0.4); ctx.quadraticCurveTo(cx, kopfY-kr*0.46, cx+kr*0.38, kopfY-kr*0.4); ctx.stroke(); }
  }
  /* Kopfschmuck nach Rang */
  const kroneY = kopfY - kr*(p.w?1.05:0.98);
  if(p.titel>=1 && p.titel<=2){         /* Silberreif */
    ctx.strokeStyle = "#c9ccd4"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(cx-kr*0.6, kroneY+kr*0.18); ctx.quadraticCurveTo(cx, kroneY, cx+kr*0.6, kroneY+kr*0.18); ctx.stroke();
  } else if(p.titel>=3 && p.titel<=4){  /* Silberreif mit Zacken */
    ctx.strokeStyle = "#c9ccd4"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(cx-kr*0.6, kroneY+kr*0.18); ctx.quadraticCurveTo(cx, kroneY, cx+kr*0.6, kroneY+kr*0.18); ctx.stroke();
    ctx.fillStyle = "#c9ccd4";
    for(const s of [-0.4,0,0.4]){
      ctx.beginPath(); ctx.moveTo(cx+s*kr-5, kroneY+kr*0.08); ctx.lineTo(cx+s*kr, kroneY-kr*0.18); ctx.lineTo(cx+s*kr+5, kroneY+kr*0.08); ctx.closePath(); ctx.fill();
    }
  } else if(p.titel>=5 && p.titel<=6){  /* Goldene Adelskrone */
    ctx.fillStyle = "#e0b458";
    ctx.fillRect(cx-kr*0.62, kroneY, kr*1.24, kr*0.2);
    for(const s of [-0.5,-0.17,0.17,0.5]){
      ctx.beginPath(); ctx.moveTo(cx+s*kr*1.1-6, kroneY+2); ctx.lineTo(cx+s*kr*1.1, kroneY-kr*0.3); ctx.lineTo(cx+s*kr*1.1+6, kroneY+2); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+s*kr*1.1, kroneY-kr*0.3, 2.6, 0, 7); ctx.fill();
    }
  } else if(p.titel===7){               /* Königskrone */
    ctx.fillStyle = "#8a2f3f";
    ctx.beginPath(); ctx.ellipse(cx, kroneY-kr*0.1, kr*0.5, kr*0.28, 0, Math.PI, 0); ctx.fill();
    ctx.fillStyle = "#e0b458";
    ctx.fillRect(cx-kr*0.62, kroneY, kr*1.24, kr*0.22);
    for(const s of [-0.45,0,0.45]){
      ctx.beginPath(); ctx.moveTo(cx+s*kr-7, kroneY+2); ctx.lineTo(cx+s*kr, kroneY-kr*0.42); ctx.lineTo(cx+s*kr+7, kroneY+2); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = "#e5636f";
    for(const s of [-0.4,0,0.4]) { ctx.beginPath(); ctx.arc(cx+s*kr, kroneY+kr*0.11, 3, 0, 7); ctx.fill(); }
  } else if(p.titel===8){               /* Kaiserkrone mit Bügel und Kreuz */
    ctx.fillStyle = "#8a2f3f";
    ctx.beginPath(); ctx.ellipse(cx, kroneY-kr*0.12, kr*0.52, kr*0.3, 0, Math.PI, 0); ctx.fill();
    ctx.fillStyle = "#e0b458";
    ctx.fillRect(cx-kr*0.66, kroneY, kr*1.32, kr*0.24);
    ctx.strokeStyle = "#e0b458"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(cx-kr*0.6, kroneY); ctx.quadraticCurveTo(cx, kroneY-kr*0.72, cx+kr*0.6, kroneY); ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(cx, kroneY-kr*0.55); ctx.lineTo(cx, kroneY-kr*0.85);
    ctx.moveTo(cx-kr*0.1, kroneY-kr*0.72); ctx.lineTo(cx+kr*0.1, kroneY-kr*0.72); ctx.stroke();
    ctx.fillStyle = "#fff";
    for(let i=0;i<7;i++){ ctx.beginPath(); ctx.arc(cx-kr*0.55+i*kr*0.183, kroneY+kr*0.12, 2.4, 0, 7); ctx.fill(); }
  }
}

/* ---------- Titelpanorama (prozedural gemalt) ---------- */
function zeichneTitel(t){
  const c = document.getElementById("titelbild");
  if(!c) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  /* Morgenhimmel */
  const himmel = ctx.createLinearGradient(0,0,0,H);
  himmel.addColorStop(0,"#1b2436"); himmel.addColorStop(0.55,"#3a3552"); himmel.addColorStop(1,"#7a5a48");
  ctx.fillStyle = himmel; ctx.fillRect(0,0,W,H);
  /* Sonne mit Strahlen */
  const sx = W*0.72, sy = H*0.62;
  ctx.save(); ctx.translate(sx,sy); ctx.rotate(t/14000);
  for(let i=0;i<12;i++){
    ctx.rotate(Math.PI/6);
    ctx.fillStyle = "rgba(224,180,88,.06)";
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(240,-26); ctx.lineTo(240,26); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
  const sonne = ctx.createRadialGradient(sx,sy,4,sx,sy,46);
  sonne.addColorStop(0,"#ffe9b0"); sonne.addColorStop(0.5,"#e0b458"); sonne.addColorStop(1,"rgba(224,180,88,0)");
  ctx.fillStyle = sonne; ctx.beginPath(); ctx.arc(sx,sy,46,0,7); ctx.fill();
  /* Wolken ziehen */
  ctx.fillStyle = "rgba(220,215,230,.10)";
  for(let i=0;i<4;i++){
    const wx = ((t/(90+i*25) + i*260) % (W+260)) - 130;
    const wy = 34 + i*26;
    for(let b=0;b<4;b++){ ctx.beginPath(); ctx.arc(wx+b*26, wy+(b%2)*5, 16+(b%3)*6, 0, 7); ctx.fill(); }
  }
  /* Hügel */
  ctx.fillStyle = "#22301f";
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.quadraticCurveTo(W*0.2,H-58,W*0.45,H-30);
  ctx.quadraticCurveTo(W*0.7,H-10,W,H-40);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  /* Burg-Silhouette */
  ctx.fillStyle = "#10151d";
  const bx = W*0.28, by = H-28;
  ctx.fillRect(bx-90, by-70, 180, 70);
  for(let z=0;z<7;z++) ctx.fillRect(bx-90+z*28, by-80, 14, 12);
  const turm = (tx,th,tw)=>{
    ctx.fillRect(tx-tw/2, by-th, tw, th);
    ctx.beginPath(); ctx.moveTo(tx-tw/2-5, by-th); ctx.lineTo(tx, by-th-26); ctx.lineTo(tx+tw/2+5, by-th); ctx.closePath(); ctx.fill();
  };
  turm(bx-90, 108, 34); turm(bx+90, 108, 34); turm(bx, 150, 42);
  /* Wehende Fahne auf dem Hauptturm */
  ctx.strokeStyle = "#10151d"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(bx, by-176); ctx.lineTo(bx, by-206); ctx.stroke();
  ctx.fillStyle = "#e0b458";
  const wehen = Math.sin(t/300)*4;
  ctx.beginPath();
  ctx.moveTo(bx, by-206);
  ctx.quadraticCurveTo(bx+16, by-204+wehen, bx+30, by-200+wehen);
  ctx.quadraticCurveTo(bx+16, by-196+wehen*0.5, bx, by-192);
  ctx.closePath(); ctx.fill();
  /* Vögel */
  ctx.strokeStyle = "rgba(200,205,220,.4)"; ctx.lineWidth = 1.5;
  for(let i=0;i<3;i++){
    const vx = ((t/(30+i*8) + i*300) % (W+80)) - 40;
    const vy = 50 + i*22 + Math.sin(t/400+i)*6;
    ctx.beginPath(); ctx.moveTo(vx-6,vy); ctx.quadraticCurveTo(vx-2,vy-4,vx,vy);
    ctx.quadraticCurveTo(vx+2,vy-4,vx+6,vy); ctx.stroke();
  }
}

/* ---------- Reichskarte (prozedural, deterministisch pro Reich) ---------- */
function mulberry(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed>>>15, 1|seed);
    t = t + Math.imul(t ^ t>>>7, 61|t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
function territoriumsRadius(land){
  return 105 + 165 * Math.sqrt(Math.min(land,50000)/50000);
}
function blobPunkte(rng, cx, cy, rr){
  const pts = [];
  for(let i=0;i<16;i++){
    const a = i/16*6.2832;
    const r = rr * (0.8 + rng()*0.36);
    pts.push([cx + Math.cos(a)*r*1.35, cy + Math.sin(a)*r*0.82]);
  }
  return pts;
}
function malBlob(ctx, pts){
  ctx.beginPath();
  ctx.moveTo((pts[0][0]+pts[15][0])/2, (pts[0][1]+pts[15][1])/2);
  for(let i=0;i<16;i++){
    const n = pts[(i+1)%16];
    ctx.quadraticCurveTo(pts[i][0], pts[i][1], (pts[i][0]+n[0])/2, (pts[i][1]+n[1])/2);
  }
  ctx.closePath();
}
function malHaus(ctx, x, y, s, wand, dach){
  ctx.fillStyle = wand; ctx.fillRect(x-s/2, y-s/2, s, s*0.8);
  ctx.fillStyle = dach;
  ctx.beginPath(); ctx.moveTo(x-s*0.65,y-s/2); ctx.lineTo(x,y-s*1.15); ctx.lineTo(x+s*0.65,y-s/2); ctx.closePath(); ctx.fill();
}
function malBaum(ctx, x, y, s, c1="#1e3a1c", c2="#25491f", schnee=false){
  ctx.fillStyle = c1;
  ctx.beginPath(); ctx.moveTo(x-s,y); ctx.lineTo(x,y-s*1.9); ctx.lineTo(x+s,y); ctx.closePath(); ctx.fill();
  ctx.fillStyle = c2;
  ctx.beginPath(); ctx.moveTo(x-s*0.8,y-s*0.7); ctx.lineTo(x,y-s*2.3); ctx.lineTo(x+s*0.8,y-s*0.7); ctx.closePath(); ctx.fill();
  if(schnee){
    ctx.fillStyle = "rgba(240,245,250,.85)";
    ctx.beginPath(); ctx.moveTo(x-s*0.6,y-s*1.1); ctx.lineTo(x,y-s*2.3); ctx.lineTo(x+s*0.6,y-s*1.1); ctx.closePath(); ctx.fill();
  }
}
const SAISON = [
  { n:"Frühling", g1:"#3f6338", g2:"#2f5030", f1:"#7d9a46", f2:"#95b054", b1:"#2a5426", b2:"#356b2b", fluss:"#3a6f8f", schnee:false },
  { n:"Sommer",   g1:"#3d5c35", g2:"#2c4527", f1:"#7d8f36", f2:"#95a344", b1:"#1e3a1c", b2:"#25491f", fluss:"#3a6f8f", schnee:false },
  { n:"Herbst",   g1:"#5a5230", g2:"#484226", f1:"#a3813a", f2:"#b9974a", b1:"#7a4a20", b2:"#96622a", fluss:"#41718a", schnee:false },
  { n:"Winter",   g1:"#87919c", g2:"#707a86", f1:"#a8b2ba", f2:"#c0cad2", b1:"#22402a", b2:"#2c5236", fluss:"#7fa8c4", schnee:true }
];
const saison = () => SAISON[(G.jahr - 1700) % 4];
function malMarkt(ctx, x, y){
  ctx.fillStyle = "#8a5a2a"; ctx.fillRect(x-8, y-5, 16, 9);
  ctx.fillStyle = "#d9973f";
  ctx.beginPath(); ctx.moveTo(x-10,y-5); ctx.lineTo(x,y-13); ctx.lineTo(x+10,y-5); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "#8a5a2a"; ctx.lineWidth = 1;
  for(let i=-6;i<=6;i+=4){ ctx.beginPath(); ctx.moveTo(x+i,y-5-(6-Math.abs(i))*0.7); ctx.lineTo(x+i*0.8,y-12+Math.abs(i)*0.5); ctx.stroke(); }
}
function malMuehle(ctx, x, y, t=0){
  ctx.fillStyle = "#c8beab";
  ctx.beginPath(); ctx.moveTo(x-5,y+4); ctx.lineTo(x-3,y-9); ctx.lineTo(x+3,y-9); ctx.lineTo(x+5,y+4); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "#e8e0cf"; ctx.lineWidth = 2;
  const dreh = t/900 + x*0.1;           /* Flügel drehen sich gemächlich */
  for(let f=0; f<4; f++){
    const w = dreh + f*Math.PI/2;
    ctx.beginPath(); ctx.moveTo(x, y-9); ctx.lineTo(x+Math.cos(w)*10, y-9+Math.sin(w)*10); ctx.stroke();
  }
}
function malPalastKarte(ctx, x, y, teile){
  const reihen = Math.min(2, Math.ceil(teile/8));
  ctx.fillStyle = "#4a5568"; ctx.fillRect(x-26, y+2, 52, 5);
  for(let i=0;i<teile;i++){
    const sp = i%8, re = Math.floor(i/8);
    ctx.fillStyle = "#e8e6df";
    ctx.fillRect(x-24+sp*6, y-4-re*8, 5, 7);
  }
  if(teile>=PALAST_TEILE){
    ctx.fillStyle = "#e0b458";
    ctx.beginPath(); ctx.moveTo(x-26,y-12); ctx.lineTo(x,y-24); ctx.lineTo(x+26,y-12); ctx.closePath(); ctx.fill();
  } else if(teile>0){
    ctx.strokeStyle = "rgba(232,230,223,.4)"; ctx.lineWidth = 1;
    ctx.strokeRect(x-24.5, y-12.5, 47, 16);
  }
}
function malDomKarte(ctx, x, y, teile){
  ctx.fillStyle = "#4a5568"; ctx.fillRect(x-22, y+2, 44, 5);
  for(let i=0;i<teile;i++){
    const sp = i%7, re = Math.floor(i/7);
    ctx.fillStyle = "#e0b458";
    ctx.fillRect(x-20+sp*6, y-4-re*9, 5, 8);
  }
  if(teile>=DOM_TEILE){
    ctx.fillStyle = "#c79a3d";
    ctx.beginPath(); ctx.moveTo(x-8,y-14); ctx.lineTo(x,y-34); ctx.lineTo(x+8,y-14); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#e0b458"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x,y-34); ctx.lineTo(x,y-41); ctx.moveTo(x-3,y-38); ctx.lineTo(x+3,y-38); ctx.stroke();
  } else if(teile>0){
    ctx.strokeStyle = "rgba(224,180,88,.4)"; ctx.lineWidth = 1;
    ctx.strokeRect(x-20.5, y-13.5, 43, 18);
  }
}
function zeichneKarte(p, canvasId, t=0){
  const c = document.getElementById(canvasId);
  if(!c || !p) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  const idx = G.spieler.indexOf(p);
  const rng = mulberry(idx*7919 + 4242);
  const cx = W/2, cy = H/2 + 8;
  const rr = territoriumsRadius(p.land) * (H/430);
  ctx.clearRect(0,0,W,H);
  /* Umland (fremdes Gebiet) */
  ctx.fillStyle = "#131a24"; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = "rgba(46,70,56,.25)";
  for(let i=0;i<26;i++){ const x=rng()*W, y=rng()*H; ctx.beginPath(); ctx.arc(x,y,rng()*26+6,0,7); ctx.fill(); }
  /* Territorium */
  const sn = saison();
  const pts = blobPunkte(rng, cx, cy, rr);
  ctx.save();
  malBlob(ctx, pts); ctx.clip();
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,sn.g1); grad.addColorStop(1,sn.g2);
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
  /* Wiesenflecken */
  for(let i=0;i<30;i++){
    ctx.fillStyle = rng()<0.5 ? "rgba(255,255,255,.03)" : "rgba(0,0,0,.06)";
    ctx.beginPath(); ctx.arc(cx+(rng()-0.5)*rr*2.6, cy+(rng()-0.5)*rr*1.6, rng()*22+8, 0, 7); ctx.fill();
  }
  /* Fluss */
  const fy = cy + rr*0.28;
  ctx.strokeStyle = sn.fluss; ctx.lineWidth = 11; ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(cx-rr*1.5, fy-rr*0.4);
  ctx.bezierCurveTo(cx-rr*0.5, fy+rr*0.35, cx+rr*0.4, fy-rr*0.45, cx+rr*1.5, fy+rr*0.1);
  ctx.stroke();
  ctx.strokeStyle = "#4f89aa"; ctx.lineWidth = 4;
  ctx.stroke();
  /* Wasserglitzern (wandernde Strichel-Linie) */
  ctx.save();
  ctx.strokeStyle = "rgba(220,240,255,.35)"; ctx.lineWidth = 1.6;
  ctx.setLineDash([7,13]); ctx.lineDashOffset = -t/45;
  ctx.beginPath();
  ctx.moveTo(cx-rr*1.5, fy-rr*0.4);
  ctx.bezierCurveTo(cx-rr*0.5, fy+rr*0.35, cx+rr*0.4, fy-rr*0.45, cx+rr*1.5, fy+rr*0.1);
  ctx.stroke();
  ctx.restore();
  /* Brücke */
  ctx.strokeStyle = "#7a5c37"; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(cx-14, fy+2); ctx.lineTo(cx+14, fy-4); ctx.stroke();
  /* Berge im Norden */
  for(let m=0;m<3;m++){
    const mx = cx + (rng()-0.5)*rr*1.6, my = cy - rr*0.62 + rng()*14;
    const ms = 14 + rng()*12;
    ctx.fillStyle = "#4d5563";
    ctx.beginPath(); ctx.moveTo(mx-ms,my+ms*0.6); ctx.lineTo(mx,my-ms); ctx.lineTo(mx+ms,my+ms*0.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#e7ecf2";
    ctx.beginPath(); ctx.moveTo(mx-ms*0.32,my-ms*0.36); ctx.lineTo(mx,my-ms); ctx.lineTo(mx+ms*0.32,my-ms*0.36); ctx.closePath(); ctx.fill();
  }
  /* Wälder am Rand */
  for(let w=0; w<7; w++){
    const a = rng()*6.2832, d = rr*(0.72+rng()*0.2);
    const wx = cx+Math.cos(a)*d*1.2, wy = cy+Math.sin(a)*d*0.75;
    for(let b=0;b<6;b++) malBaum(ctx, wx+(rng()-0.5)*34, wy+(rng()-0.5)*22, 5+rng()*3, sn.b1, sn.b2, sn.schnee);
  }
  /* Winter: Schneegestöber-Tupfen */
  if(sn.schnee){
    ctx.fillStyle = "rgba(245,248,252,.5)";
    for(let i=0;i<60;i++){
      ctx.beginPath(); ctx.arc(cx+(rng()-0.5)*rr*2.6, cy+(rng()-0.5)*rr*1.6, rng()*1.8+0.6, 0, 7); ctx.fill();
    }
  }
  /* Wege vom Dorf zu den Bauwerken */
  ctx.strokeStyle = "rgba(209,187,138,.30)"; ctx.lineWidth = 3; ctx.lineCap = "round";
  (p.gebaeude||[]).forEach(g=>{
    const gx = cx + Math.cos(g.ang)*g.dist*rr*1.25;
    const gy = cy + Math.sin(g.ang)*g.dist*rr*0.75;
    ctx.beginPath(); ctx.moveTo(cx, cy+12);
    ctx.quadraticCurveTo((cx+gx)/2 + (g.ang%1-0.5)*26, (cy+gy)/2, gx, gy+3);
    ctx.stroke();
  });
  if(p.palast>0){ ctx.beginPath(); ctx.moveTo(cx,cy+12); ctx.quadraticCurveTo(cx-rr*0.24,cy-rr*0.1,cx-rr*0.5,cy-rr*0.30); ctx.stroke(); }
  if(p.dom>0){    ctx.beginPath(); ctx.moveTo(cx,cy+12); ctx.quadraticCurveTo(cx+rr*0.26,cy-rr*0.12,cx+rr*0.52,cy-rr*0.32); ctx.stroke(); }
  /* Felder (Anbaufläche) */
  const felder = clamp(Math.round(Math.min(p.pop*4, anbau(p))/1800), 2, 16);
  for(let i=0;i<felder;i++){
    const a = rng()*6.2832, d = rr*(0.3+rng()*0.34);
    const fx = cx+Math.cos(a)*d*1.15, fyy = cy+Math.sin(a)*d*0.7;
    ctx.save(); ctx.translate(fx,fyy); ctx.rotate((rng()-0.5)*0.5);
    for(let s=0;s<4;s++){ ctx.fillStyle = s%2 ? sn.f1 : sn.f2; ctx.fillRect(-17, -10+s*5, 34, 5); }
    ctx.restore();
  }
  /* Dorf/Häuser (Bevölkerung) */
  const haeuser = clamp(Math.round(p.pop/1100), 3, 26);
  for(let i=0;i<haeuser;i++){
    const a = rng()*6.2832, d = rng()*rr*0.24;
    malHaus(ctx, cx+Math.cos(a)*d*1.3, cy+10+Math.sin(a)*d*0.7, 9, "#b09877", "#8a4a35");
  }
  /* Schornsteinrauch aus dem Dorf */
  for(let r=0;r<3;r++){
    const phase = (t/2600 + r*0.37) % 1;
    const sx2 = cx - 10 + r*12, sy2 = cy + 2 - phase*30;
    ctx.fillStyle = `rgba(200,200,205,${0.20*(1-phase)})`;
    ctx.beginPath(); ctx.arc(sx2 + Math.sin(phase*7+r)*4, sy2, 2.5+phase*5, 0, 7); ctx.fill();
  }
  /* Städte: Mauerringe */
  for(let s=0;s<staedte(p);s++){
    const a = 1.1 + s*1.35, d = rr*0.52;
    const sx = cx+Math.cos(a)*d*1.15, sy = cy+Math.sin(a)*d*0.7;
    ctx.strokeStyle = "#9aa3ad"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(sx, sy, 21, 0, 7); ctx.stroke();
    ctx.fillStyle = "#9aa3ad";
    for(let z=0;z<8;z++){ const za=z/8*6.2832; ctx.fillRect(sx+Math.cos(za)*21-1.5, sy+Math.sin(za)*21-1.5, 3.5, 3.5); }
    for(let h=0;h<4;h++) malHaus(ctx, sx+(rng()-0.5)*18, sy+3+(rng()-0.5)*12, 7, "#c4b190", "#96543c");
    ctx.fillStyle = p.farbe;
    ctx.fillRect(sx-1, sy-33, 2, 13);
    const sw = Math.sin(t/280 + s)*2;
    ctx.beginPath(); ctx.moveTo(sx+1,sy-33);
    ctx.quadraticCurveTo(sx+6, sy-32+sw, sx+11, sy-30+sw);
    ctx.quadraticCurveTo(sx+6, sy-28+sw*0.5, sx+1, sy-26);
    ctx.closePath(); ctx.fill();
  }
  /* Märkte & Mühlen an ihren gebauten Plätzen (mit Schatten) */
  (p.gebaeude||[]).forEach((g,i)=>{
    const gx = cx + Math.cos(g.ang)*g.dist*rr*1.25;
    const gy = cy + Math.sin(g.ang)*g.dist*rr*0.75;
    ctx.fillStyle = "rgba(0,0,0,.22)";
    ctx.beginPath(); ctx.ellipse(gx+2, gy+6, 11, 4, 0, 0, 7); ctx.fill();
    if(p._neu===i){
      const puls = 1 + Math.sin(t/220)*0.15;
      ctx.strokeStyle = "rgba(224,180,88,.9)"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(gx, gy-4, 17*puls, 0, 7); ctx.stroke();
      ctx.strokeStyle = "rgba(224,180,88,.35)";
      ctx.beginPath(); ctx.arc(gx, gy-4, 23*puls, 0, 7); ctx.stroke();
    }
    if(g.t==="m") malMarkt(ctx, gx, gy); else malMuehle(ctx, gx, gy, t);
  });
  /* Häfen am Fluss */
  for(let h=0; h<(p.haefen||0); h++){
    const hx = cx + (h===0 ? -rr*0.55 : rr*0.62), hy = fy + (h===0 ? -rr*0.10 : rr*0.02);
    ctx.fillStyle = "#7a5c37";
    ctx.fillRect(hx-9, hy-3, 18, 5);              /* Kai */
    ctx.fillRect(hx-2, hy-10, 4, 8);              /* Lagerhaus */
    ctx.fillStyle = "#c8beab";
    ctx.beginPath(); ctx.moveTo(hx+6, hy-2); ctx.lineTo(hx+13, hy-2); ctx.lineTo(hx+10, hy+3); ctx.closePath(); ctx.fill(); /* Boot */
    ctx.strokeStyle = "#e8e0cf"; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(hx+9, hy-2); ctx.lineTo(hx+9, hy-9); ctx.stroke();
    ctx.fillStyle = p.farbe;
    ctx.beginPath(); ctx.moveTo(hx+9, hy-9); ctx.lineTo(hx+14, hy-7.5); ctx.lineTo(hx+9, hy-6); ctx.closePath(); ctx.fill();
    if(p._neu === "hafen" && h === (p.haefen||0)-1){
      ctx.strokeStyle = "rgba(224,180,88,.9)"; ctx.lineWidth = 2;

    ctx.strokeRect(cx-rr*0.5-32, cy-rr*0.34-30, 64, 42);
  }
  if(p._neu==="dom" && p.dom>0){

  /* Saison-Partikel: Schnee, fallende Blätter, Blütenblätter */
  if(sn.n === "Winter"){
    ctx.fillStyle = "rgba(250,252,255,.8)";
    for(let i=0;i<38;i++){
      const seedX = ((i*73)%97)/97, seedS = ((i*41)%89)/89;
      const fx2 = cx - rr*1.4 + ((seedX*rr*2.8 + Math.sin(t/900 + i)*18 + t/(60+seedS*40)) % (rr*2.8));
      const fy2 = cy - rr*0.9 + ((t/(22+seedS*26) + i*53) % (rr*1.8));

    }

    for(let i=0;i<14;i++){

      const fx2 = cx - rr*1.3 + ((seedX*rr*2.6 + Math.sin(t/500 + i*2)*30 + t/(70+seedS*50)) % (rr*2.6));

      ctx.fillStyle = i%2 ? "rgba(190,120,50,.75)" : "rgba(160,90,40,.7)";
      ctx.fillRect(-2.6, -1.6, 5.2, 3.2);
      ctx.restore();
    }
  } else if(sn.n === "Frühling"){
    ctx.fillStyle = "rgba(240,190,210,.7)";
    for(let i=0;i<12;i++){
      const seedX = ((i*59)%87)/87, seedS = ((i*37)%79)/79;
      const fx2 = cx - rr*1.3 + ((seedX*rr*2.6 + Math.sin(t/700 + i)*24 + t/(90+seedS*60)) % (rr*2.6));
      const fy2 = cy - rr*0.85 + ((t/(45+seedS*35) + i*61) % (rr*1.7));
      ctx.beginPath(); ctx.ellipse(fx2, fy2, 2.2, 1.3, t/600+i, 0, 7); ctx.fill();
    }
  }
  /* Wolkenschatten ziehen über das Land */
  for(let w=0;w<2;w++){
    const wx2 = cx - rr*1.4 + (((t/95) + w*rr*1.7) % (rr*3.2));
    ctx.fillStyle = "rgba(0,0,10,.07)";
    ctx.beginPath(); ctx.ellipse(wx2, cy + (w?rr*0.3:-rr*0.25), rr*0.5, rr*0.22, 0.3, 0, 7); ctx.fill();

  malBlob(ctx, pts);
  ctx.strokeStyle = p.farbe; ctx.lineWidth = 2.5; ctx.setLineDash([9,6]);
  ctx.stroke(); ctx.setLineDash([]);
  /* Grenzbanner (wehen im Wind) */
  for(const bi of [2,7,12]){
    const [bx,by] = pts[bi];
    ctx.fillStyle = "#6b5433"; ctx.fillRect(bx-1, by-20, 2.5, 20);
    ctx.fillStyle = p.farbe;
    const wf = Math.sin(t/260 + bi)*2.5;

    ctx.closePath(); ctx.fill();
  }
  /* Kartusche */
  ctx.fillStyle = "rgba(13,17,23,.78)";
  ctx.fillRect(10, H-34, 240, 26);
  ctx.strokeStyle = "#2a3446"; ctx.strokeRect(10, H-34, 240, 26);
  ctx.fillStyle = "#dbe2ee"; ctx.font = "600 13px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(`${p.wappen} ${titelName(p)} ${p.name}s Reich · ${fmt(p.land)} ha · ${sn.n}`, 18, H-16);
  /* Kompass */
  ctx.strokeStyle = "#8b96a8"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(W-30, 30, 13, 0, 7); ctx.stroke();
  ctx.fillStyle = "#e0b458";
  ctx.beginPath(); ctx.moveTo(W-30,18); ctx.lineTo(W-26,32); ctx.lineTo(W-30,29); ctx.lineTo(W-34,32); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#8b96a8"; ctx.font = "10px sans-serif"; ctx.textAlign="center";
  ctx.fillText("N", W-30, 14);
}

/* ---------- Gesamtkarte: alle Reiche im Nachbarschaftskreis ---------- */
function zeichneWelt(t=0){
  const c = document.getElementById("welt");
  if(!c) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = "#111b26"; ctx.fillRect(0,0,W,H);
  const wr = mulberry(999);
  ctx.fillStyle = "rgba(46,70,56,.16)";
  for(let i=0;i<30;i++){ ctx.beginPath(); ctx.arc(wr()*W, wr()*H, wr()*30+8, 0, 7); ctx.fill(); }
  const n = G.spieler.length;
  const cx = W/2, cy = H/2 + 4, ex = W*0.36, ey = H*0.32;
  const pos = G.spieler.map((_,i)=>{
    const a = -Math.PI/2 + i/n*6.2832;
    return [cx + Math.cos(a)*ex*(n>1?1:0), cy + Math.sin(a)*ey*(n>1?1:0)];
  });
  /* Handelswege zwischen lebenden Nachbarn */
  const leb = lebende().map(x=>x.i);
  if(leb.length > 1){
    ctx.strokeStyle = "rgba(209,187,138,.25)"; ctx.lineWidth = 2; ctx.setLineDash([5,7]);
    const paare = leb.length===2 ? [[leb[0],leb[1]]] : leb.map((a,k)=>[a, leb[(k+1)%leb.length]]);
    for(const [a,b] of paare){
      ctx.beginPath(); ctx.moveTo(pos[a][0], pos[a][1]);
      ctx.quadraticCurveTo(cx, cy, pos[b][0], pos[b][1]); ctx.stroke();
    }
    ctx.setLineDash([]);
  }
  /* Reiche */
  G.spieler.forEach((p,i)=>{
    const [px,py] = pos[i];
    const rrW = 24 + 34*Math.sqrt(Math.min(p.land,50000)/50000);
    const rngB = mulberry(i*97+5);
    ctx.save();
    if(p.tot) ctx.globalAlpha = 0.45;
    const bl = [];
    for(let k=0;k<10;k++){
      const a = k/10*6.2832;
      bl.push([px+Math.cos(a)*rrW*(0.8+rngB()*0.35)*1.25, py+Math.sin(a)*rrW*(0.8+rngB()*0.35)*0.8]);
    }
    ctx.beginPath();
    ctx.moveTo((bl[0][0]+bl[9][0])/2,(bl[0][1]+bl[9][1])/2);
    for(let k=0;k<10;k++){
      const nx = bl[(k+1)%10];
      ctx.quadraticCurveTo(bl[k][0], bl[k][1], (bl[k][0]+nx[0])/2, (bl[k][1]+nx[1])/2);
    }
    ctx.closePath();
    ctx.fillStyle = p.tot ? "#39404a" : saison().g2;
    ctx.fill();
    ctx.strokeStyle = p.farbe; ctx.lineWidth = 2; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
    if(i===G.aktiv && !p.tot){
      ctx.strokeStyle = "rgba(224,180,88,"+(0.55+Math.sin(t/300)*0.3)+")"; ctx.lineWidth = 3; ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(px, py, rrW*1.35, 0, 7); ctx.stroke();
    }
    ctx.font = `${Math.round(rrW*0.62)}px sans-serif`; ctx.textAlign = "center";
    ctx.fillText(p.wappen, px, py + rrW*0.2);
    ctx.font = "600 13px sans-serif"; ctx.fillStyle = "#dbe2ee";
    ctx.fillText(`${titelName(p)} ${p.name}${p.tot?" †":""}`, px, py + rrW*0.85 + 16);
    ctx.font = "11px sans-serif"; ctx.fillStyle = "#8b96a8";
    ctx.fillText(`${fmt(p.land)} ha · ${fmt(p.pop)} Einw.`, px, py + rrW*0.85 + 30);
    ctx.restore();
  });
  ctx.fillStyle = "rgba(13,17,23,.78)";
  ctx.fillRect(10, H-32, 250, 24);
  ctx.strokeStyle = "#2a3446"; ctx.strokeRect(10, H-32, 250, 24);
  ctx.fillStyle = "#dbe2ee"; ctx.font = "600 12px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(`Die bekannte Welt · Anno ${G.jahr} · ${saison().n}`, 18, H-15);
}
/* Animierte Wetterszene für die Jahresbilanz */
function zeichneWetter(t=0){
  const c = document.getElementById("wetterBild");
  const p = cur();
  if(!c || !p || !p.report) return;
  const ctx = c.getContext("2d");
  const W = c.width, H = c.height;
  const f = p.report.wetter.f;
  const art = f<=0.6 ? "duerre" : f<=0.85 ? "regen" : f<1.12 ? "wechsel" : f<1.3 ? "gut" : "pracht";
  ctx.clearRect(0,0,W,H);
  const himmel = ctx.createLinearGradient(0,0,0,H);
  if(art==="duerre"){ himmel.addColorStop(0,"#7a5c30"); himmel.addColorStop(1,"#8a6a38"); }
  else if(art==="regen"){ himmel.addColorStop(0,"#28313f"); himmel.addColorStop(1,"#39434f"); }
  else if(art==="wechsel"){ himmel.addColorStop(0,"#3a4456"); himmel.addColorStop(1,"#55607a"); }
  else { himmel.addColorStop(0,"#3d4a68"); himmel.addColorStop(1,"#7a6a48"); }
  ctx.fillStyle = himmel; ctx.fillRect(0,0,W,H);
  /* Hügelkamm */
  ctx.fillStyle = art==="duerre" ? "#5c4a26" : "#22301f";
  ctx.beginPath(); ctx.moveTo(0,H);
  ctx.quadraticCurveTo(W*0.3, H-26, W*0.55, H-14);
  ctx.quadraticCurveTo(W*0.8, H-4, W, H-18);
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  if(art==="duerre"){
    /* gleißende Sonne mit Hitzeflimmern */
    const sx = W*0.78, sy = H*0.35;
    const grad = ctx.createRadialGradient(sx,sy,2,sx,sy,34);
    grad.addColorStop(0,"#fff0c0"); grad.addColorStop(0.6,"#e8c05a"); grad.addColorStop(1,"rgba(232,192,90,0)");
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(sx,sy,34,0,7); ctx.fill();
    ctx.strokeStyle = "rgba(255,240,200,.25)"; ctx.lineWidth = 1.5;
    for(let i=0;i<8;i++){
      const x0 = W*0.08 + i*W*0.11;
      ctx.beginPath();
      for(let y=H-16; y>H*0.45; y-=6)
        ctx.lineTo(x0 + Math.sin(y/9 + t/160 + i)*3.5, y);
      ctx.stroke();
    }
  } else if(art==="regen" || art==="wechsel"){
    /* Wolkenbänke */
    ctx.fillStyle = "rgba(210,214,224,.16)";
    for(let i=0;i<5;i++){
      const wx = ((t/(60+i*18) + i*220) % (W+240)) - 120;
      for(let b=0;b<4;b++){ ctx.beginPath(); ctx.arc(wx+b*30, 22+i*7+(b%2)*6, 18+(b%3)*7, 0, 7); ctx.fill(); }
    }
    if(art==="regen"){
      ctx.strokeStyle = "rgba(170,200,230,.45)"; ctx.lineWidth = 1.3;
      for(let i=0;i<46;i++){
        const seed = ((i*61)%97)/97;
        const rx2 = (seed*W + t/(2.2+seed)) % W;
        const ry2 = (t/(3+seed*2) + i*37) % H;
        ctx.beginPath(); ctx.moveTo(rx2, ry2); ctx.lineTo(rx2-3, ry2+11); ctx.stroke();
      }
      /* Blitz alle paar Sekunden */
      const blitzPhase = (t % 4200);
      if(blitzPhase < 160){
        ctx.fillStyle = `rgba(255,255,240,${0.35*(1-blitzPhase/160)})`;
        ctx.fillRect(0,0,W,H);
        const bx = W*0.3 + (Math.floor(t/4200)%3)*W*0.2;
        ctx.strokeStyle = "#fff8d0"; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(bx, 6);
        ctx.lineTo(bx-8, H*0.35); ctx.lineTo(bx+4, H*0.4); ctx.lineTo(bx-6, H*0.75);
        ctx.stroke();
      }
    }
  } else {
    /* goldene Strahlen und Sonne */
    const sx = W*0.72, sy = H*0.4;
    ctx.save(); ctx.translate(sx,sy); ctx.rotate(t/9000);
    ctx.fillStyle = art==="pracht" ? "rgba(255,220,120,.10)" : "rgba(230,205,140,.07)";
    for(let i=0;i<10;i++){ ctx.rotate(Math.PI/5); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(190,-18); ctx.lineTo(190,18); ctx.closePath(); ctx.fill(); }
    ctx.restore();
    const grad = ctx.createRadialGradient(sx,sy,3,sx,sy,30);
    grad.addColorStop(0,"#fff3cf"); grad.addColorStop(0.6,"#e0b458"); grad.addColorStop(1,"rgba(224,180,88,0)");
    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(sx,sy,30,0,7); ctx.fill();
    if(art==="pracht"){
      ctx.strokeStyle = "rgba(200,205,220,.5)"; ctx.lineWidth = 1.5;
      for(let i=0;i<2;i++){
        const vx = ((t/(26+i*9) + i*300) % (W+60)) - 30;
        const vy = 26 + i*16 + Math.sin(t/400+i)*5;
        ctx.beginPath(); ctx.moveTo(vx-5,vy); ctx.quadraticCurveTo(vx-1.5,vy-3.5,vx,vy);
        ctx.quadraticCurveTo(vx+1.5,vy-3.5,vx+5,vy); ctx.stroke();
      }
    }
  }
  /* Textzeile */
  ctx.fillStyle = "rgba(13,17,23,.72)"; ctx.fillRect(10, H-28, 300, 20);
  ctx.fillStyle = "#dbe2ee"; ctx.font = "600 12px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(`${p.report.wetter.ico} ${p.report.wetter.t}`, 16, H-14);
}
