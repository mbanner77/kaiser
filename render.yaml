# Render Blueprint — https://render.com/docs/blueprint-spec
# Deployment: Render-Dashboard -> New -> Blueprint -> dieses Repo auswaehlen.
services:
  - type: web
    name: kaiser
    runtime: static
    # Eine einzige HTML-Datei — als index.html veroeffentlichen:
    buildCommand: mkdir -p public && cp kaiser.html public/index.html && cp manifest.webmanifest sw.js icon-192.png icon-512.png public/
    staticPublishPath: public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
